<!DOCTYPE html>
<html lang="en">
<head>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>Logged</title>
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Logged%22%2C%22short_name%22%3A%22Logged%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23080b12%22%2C%22theme_color%22%3A%22%23080b12%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.svg%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D"/>

<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  /* Dark theme (default) */
  :root {
    --bg: #080b12;
    --bg-grad: radial-gradient(ellipse at 0% 0%, #1a0a2e 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, #0d1f2d 0%, transparent 55%), radial-gradient(ellipse at 100% 100%, #00251a 0%, transparent 60%), radial-gradient(ellipse at 0% 100%, #130d28 0%, transparent 55%), #080b12;
    --surface: #0f1318;
    --surface2: #111418;
    --border: #1a2030;
    --border2: #1e2530;
    --border3: #2d3748;
    --text: #e2e8f0;
    --text2: #a0aec0;
    --text3: #718096;
    --text4: #4a5568;
    --text5: #2d3748;
    --nav-bg: rgba(8,11,18,0.75);
    --ticker-bg: rgba(8,11,18,0.5);
    --tag-bg: #1a2030;
    --input-bg: #111418;
    --accent: #00e5a0;
    --accent-dim: #00e5a060;
    --accent-bg: #00e5a015;
  }

  /* Light theme — inverted dark theme */
  .light {
    --bg: #e2e8f0;
    --bg-grad: radial-gradient(ellipse at 0% 0%, #d4c5f0 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, #c5d4e0 0%, transparent 55%), radial-gradient(ellipse at 100% 100%, #b8e8d8 0%, transparent 60%), radial-gradient(ellipse at 0% 100%, #ccc0e8 0%, transparent 55%), #e2e8f0;
    --surface: #f0f4f8;
    --surface2: #eef0f7;
    --border: #d0d8e8;
    --border2: #c0cad8;
    --border3: #a0adc0;
    --text: #0a0c10;
    --text2: #1a2030;
    --text3: #2d3748;
    --text4: #4a5568;
    --text5: #718096;
    --nav-bg: rgba(226,232,240,0.88);
    --ticker-bg: rgba(226,232,240,0.75);
    --tag-bg: #d8e0ec;
    --input-bg: #eef0f7;
    --accent: #007a52;
    --accent-dim: #007a5290;
    --accent-bg: #007a5218;
  }

  html,body{height:100%;height:100dvh;overflow:hidden;color:var(--text);font-family:'DM Mono','Courier New',monospace;
    background: var(--bg);
  }
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;height:-webkit-fill-available;overflow:hidden;
    background: var(--bg-grad);
    background-attachment: fixed;
    transition: background 0.4s ease;
  }
  .content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;padding-top:20px;padding-bottom:120px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
  input,select,textarea{font-family:'DM Mono',monospace;font-size:16px;color:var(--text);}
  input[type="date"],input[type="time"],input[type="number"]{font-size:16px;}

  .header{flex-shrink:0;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:relative;background:var(--nav-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);height:calc(52px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);}
  .bottom-nav{flex-shrink:0;position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;gap:4px;cursor:pointer;background:none;border:none;color:var(--text4);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s;}
  .nav-icon-wrap{width:48px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:12px;transition:all 0.2s;}
  .nav-item.active svg{filter:drop-shadow(0 0 5px var(--accent-dim));}
  .nav-item.active{color:var(--accent);}
  .nav-icon{font-size:18px;}

  .ticker{border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:24px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;background:var(--ticker-bg);}
  .ticker::-webkit-scrollbar{display:none;}
  .tick-item{flex-shrink:0;}
  .tick-label{font-size:8px;letter-spacing:0.15em;color:var(--text4);text-transform:uppercase;margin-bottom:2px;}
  .tick-value{font-size:13px;font-weight:500;color:var(--text);}

  .field-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text4);margin-bottom:6px;display:block;}
  .field-input{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;padding:12px;color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;appearance:none;}
  .field-input:focus{border-color:var(--accent);}
  .field-group{margin-bottom:16px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .dir-btn{flex:1;padding:12px;border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-size:14px;font-family:'DM Mono',monospace;background:var(--input-bg);color:var(--text4);transition:all 0.15s;}
  .dir-btn.long-active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
  .dir-btn.short-active{border-color:#ff4d6d;background:#ff4d6d10;color:#ff4d6d;}

  .pnl-preview{background:var(--surface);border-radius:8px;padding:14px;margin-bottom:14px;display:flex;gap:24px;}
  .pnl-box label{font-size:8px;letter-spacing:0.15em;color:var(--text4);text-transform:uppercase;display:block;margin-bottom:3px;}
  .pnl-box span{font-size:22px;font-weight:500;}

  .btn-primary{width:100%;background:var(--accent);color:#0a0c10;border:none;border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
  .btn-ghost{background:none;border:1px solid var(--border3);border-radius:6px;padding:8px 14px;color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;}
  .btn-danger{background:none;border:1px solid #ff4d6d30;border-radius:6px;padding:8px 14px;color:#ff4d6d60;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;}

  .swipe-wrap{position:relative;overflow:hidden;border-radius:10px;margin-bottom:10px;}
  .swipe-delete-bg{position:absolute;inset:0;background:#ff4d6d;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:10px;}
  .swipe-card{position:relative;transition:transform 0.15s ease;will-change:transform;}
  @keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .confetti-piece{position:fixed;width:8px;height:8px;animation:confetti-fall linear forwards;z-index:9999;pointer-events:none;}
  .trade-card-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;}
  .trade-card-body{padding:0 14px 14px;border-top:1px solid var(--border);}
  .trade-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .tag{display:inline-block;background:var(--tag-bg);border-radius:4px;padding:3px 9px;font-size:10px;letter-spacing:0.04em;color:var(--text3);}

  .date-sep{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text4);padding:10px 0 6px;display:flex;align-items:center;gap:10px;}
  .date-sep::after{content:"";flex:1;height:1px;background:var(--border);}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .stat-label{font-size:8px;letter-spacing:0.15em;color:var(--text4);text-transform:uppercase;margin-bottom:8px;}
  .stat-value{font-size:20px;font-weight:500;color:var(--text);}
  .stat-sub{font-size:11px;color:var(--text4);margin-top:2px;}

  .upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:var(--bg);margin-bottom:10px;}
  .upload-zone.drag{border-color:var(--accent);background:var(--accent-bg);}
  .thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .thumb-wrap{position:relative;}
  .thumb-wrap img{width:80px;height:56px;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
  .thumb-del{position:absolute;top:-6px;right:-6px;background:#ff4d6d;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .lightbox img{max-width:95vw;max-height:80vh;object-fit:contain;border-radius:6px;}
  .lightbox-close{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;background:none;border:none;color:var(--text3);font-size:26px;cursor:pointer;}
  .lightbox-nav{display:flex;gap:16px;margin-top:16px;align-items:center;}
  .lightbox-nav button{background:var(--border3);border:none;color:var(--text);border-radius:6px;padding:8px 18px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;}
  .lightbox-nav button:disabled{background:var(--border);color:var(--text4);cursor:default;}

  .export-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;width:100%;margin-bottom:14px;}
  .streak-badge{display:inline-flex;align-items:center;gap:4px;background:var(--tag-bg);border-radius:20px;padding:4px 10px;font-size:11px;}
  .empty{text-align:center;padding:40px 20px;}
  .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--text);margin-bottom:16px;line-height:1.3;display:block;text-transform:uppercase;letter-spacing:0.02em;}
  .settings-section-label{font-size:9px;letter-spacing:0.15em;color:var(--text4);text-transform:uppercase;margin-top:20px;margin-bottom:8px;display:block;}
  .settings-row-label{font-size:11px;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;display:block;}
  .settings-toggle-row{display:flex;justify-content:space-between;align-items:center;}
  .toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
  .toggle-thumb{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left 0.2s;}

  /* Confirm dialog */
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:998;display:flex;align-items:flex-end;}
  .confirm-sheet{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
  .confirm-title{font-family:'Syne',sans-serif;font-size:16px;color:var(--text);margin-bottom:6px;}
  .confirm-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
  .confirm-btns{display:flex;flex-direction:column;gap:10px;}

  .empty-icon{font-size:44px;margin-bottom:14px;}
  .empty-title{font-family:'Syne',sans-serif;font-size:16px;color:var(--text4);margin-bottom:8px;letter-spacing:0.05em;text-transform:uppercase;}
  .empty-sub{font-size:12px;color:var(--text5);margin-bottom:24px;}

  

  .install-banner{background:var(--accent-bg);border:1px solid var(--accent-dim);border-radius:10px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
  .install-banner p{font-size:11px;color:var(--text2);line-height:1.5;flex:1;}
  .install-banner button{background:var(--accent);color:var(--bg);border:none;border-radius:6px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;}

  /* Splash Screen */
  .splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;
    background:radial-gradient(ellipse at 0% 0%,#1a0a2e 0%,transparent 60%),radial-gradient(ellipse at 100% 100%,#00251a 0%,transparent 60%),#080b12;
    transition:opacity 0.7s ease;
  }
  .splash.fade{opacity:0;pointer-events:none;}
  @keyframes logoIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes subIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes barGrow{0%{width:0%}100%{width:100%}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 10px #00e5a030}50%{box-shadow:0 0 30px #00e5a060}}
  .splash-logo{animation:logoIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;}
  .splash-sub{animation:subIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s both;}
  .splash-bar-wrap{width:140px;height:2px;background:#1a2030;border-radius:1px;overflow:hidden;margin-top:40px;}
  .splash-bar{height:100%;background:linear-gradient(90deg,#00e5a020,#00e5a0,#00e5a020);border-radius:1px;animation:barGrow 1.6s cubic-bezier(0.4,0,0.2,1) 0.4s both;}

  /* PIN Screen */
  .pin-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;padding-top:env(safe-area-inset-top);z-index:500;}
  .pin-dots{display:flex;gap:14px;margin:28px 0 36px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border3);transition:all 0.15s;}
  .pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent-dim);}
  .pin-dot.error{background:#ff4d6d;border-color:#ff4d6d;}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
  .pin-btn{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:18px;font-size:22px;font-family:'Syne',sans-serif;font-weight:700;color:#e2e8f0;cursor:pointer;transition:all 0.1s;text-align:center;}
  .pin-btn:active{background:var(--accent-bg);border-color:var(--accent-dim);transform:scale(0.95);}
  .pin-btn.del{font-size:18px;color:#718096;}
  .pin-name-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid #1e2530;border-radius:10px;padding:14px;color:#e2e8f0;font-size:18px;text-align:center;outline:none;font-family:'DM Mono',monospace;letter-spacing:0.05em;}
  .pin-name-input:focus{border-color:var(--accent);}
  .pin-name-input::placeholder{color:#2d3748;}

  .pos{color:var(--accent);}.neg{color:#ff4d6d;}
  svg text{font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script>
window.addEventListener('error', function(e) {
  document.body.innerHTML = '<div style="padding:20px;color:#ff4d6d;font-family:monospace;font-size:13px;background:#0a0c10;min-height:100vh">'
    + '<div style="font-size:16px;margin-bottom:12px">Script Error:</div>'
    + '<div>' + (e.message || 'Unknown') + '</div>'
    + '<div style="margin-top:8px;color:#718096">Line: ' + e.lineno + ' Col: ' + e.colno + '</div>'
    + '</div>';
});
window.addEventListener('DOMContentLoaded', function() {
  try {
    var src = document.getElementById('app-source');
    if (!src) return;
    var code = src.textContent;
    var transformed = Babel.transform(code, {presets:['react']});
    var script = document.createElement('script');
    script.textContent = transformed.code;
    document.head.appendChild(script);
  } catch(e) {
    document.body.innerHTML = '<div style="padding:20px;color:#ff4d6d;font-family:monospace;font-size:13px;background:#0a0c10;min-height:100vh">'
      + '<div style="font-size:16px;margin-bottom:12px">Babel Parse Error:</div>'
      + '<div style="white-space:pre-wrap">' + e.message + '</div>'
      + '</div>';
  }
});
</script>
<script id="app-source" type="text/babel-source">
const { useState, useEffect, useMemo, useRef } = React;

const INSTRUMENTS = [
  { symbol:"ES", name:"E-mini S&P 500", tickSize:0.25, tickValue:12.5 },
  { symbol:"MES", name:"Micro E-mini S&P", tickSize:0.25, tickValue:1.25 },
  { symbol:"NQ", name:"E-mini Nasdaq-100", tickSize:0.25, tickValue:5 },
  { symbol:"MNQ", name:"Micro Nasdaq-100", tickSize:0.25, tickValue:0.5 },
  { symbol:"YM", name:"E-mini Dow Jones", tickSize:1, tickValue:5 },
  { symbol:"MYM", name:"Micro E-mini Dow", tickSize:1, tickValue:0.5 },
  { symbol:"GC", name:"Gold", tickSize:0.10, tickValue:10 },
  { symbol:"MGC", name:"Micro Gold", tickSize:0.10, tickValue:1 },
  { symbol:"CL", name:"Crude Oil", tickSize:0.01, tickValue:10 },
  { symbol:"SI", name:"Silver", tickSize:0.005, tickValue:25 },
];
const STRATEGIES = ["Breakout","Mean Reversion","Trend Follow","VWAP Fade","Open Drive","Failed Auction","Scalp","Swing","Other"];
const SESSIONS = ["Asia","London","New York"];
const SETUPS = ["A+","A","B","C"];
const EMOTIONS = ["😌 Calm","💪 Confident","😰 Anxious","😤 Frustrated","🤑 Greedy","😨 FOMO","😡 Revenge","🎯 Focused"];
const STORAGE_KEY = "logged_v1";
const BALANCE_KEY = "logged_balance_v1";
const ACCOUNTS_KEY = "logged_accounts_v1";

const DEFAULT_ACCOUNT = {id:"default", name:"Main Account", colour:"#00e5a0"};
const ACCOUNT_COLOURS = ["#00e5a0","#f6ad55","#a78bfa","#ff4d6d","#60a5fa","#34d399"];
const CURRENCY_KEY = "logged_currency_v1";
const THEME_KEY = "logged_theme_v1";
const GOAL_COLOUR_KEY = "logged_goal_colour_v1";
const GOALS_KEY = "logged_goals_v1";
const CURRENCIES = [
  {code:"USD", symbol:"$", locale:"en-US"},
  {code:"GBP", symbol:"£", locale:"en-GB"},
  {code:"EUR", symbol:"€", locale:"de-DE"},
];

function calc(t) {
  const inst = INSTRUMENTS.find(i=>i.symbol===t.instrument);
  if(!inst||!t.entry) return {pnl:0,ticks:0,r:null,avgExit:null};
  const dir = t.direction==="Long"?1:-1;

  // SL outcome — use stop price
  if(t.outcome==="SL"&&t.stop) {
    const ticks = dir*(parseFloat(t.stop)-parseFloat(t.entry))/inst.tickSize;
    const pnl = ticks*inst.tickValue*(parseInt(t.contracts)||1);
    const r = -1; // always -1R when stopped out
    return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:parseFloat(t.stop)};
  }

  // Breakeven outcome
  if(t.outcome==="BE") {
    return {pnl:0, ticks:0, r:0, avgExit:parseFloat(t.entry)};
  }

  const tps = (t.tps||[]).filter(tp=>tp.price&&tp.contracts);

  // Legacy: old trade with exit field
  if(!tps.length && t.exit) {
    const ticks = dir*(parseFloat(t.exit)-parseFloat(t.entry))/inst.tickSize;
    const pnl = ticks*inst.tickValue*(parseInt(t.contracts)||1);
    const st = t.stop ? Math.abs(parseFloat(t.entry)-parseFloat(t.stop))/inst.tickSize : null;
    const r = st ? Math.round(ticks/st*100)/100 : null;
    return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:parseFloat(t.exit)};
  }
  if(!tps.length) return {pnl:0,ticks:0,r:null,avgExit:null};

  // Weighted average exit across all TPs
  const totalContracts = tps.reduce((s,tp)=>s+(parseInt(tp.contracts)||0),0);
  const weightedExit = tps.reduce((s,tp)=>s+(parseFloat(tp.price)||0)*(parseInt(tp.contracts)||0),0) / totalContracts;
  const ticks = dir*(weightedExit-parseFloat(t.entry))/inst.tickSize;
  const gross = tps.reduce((s,tp)=>{
    const tpTicks = dir*(parseFloat(tp.price)-parseFloat(t.entry))/inst.tickSize;
    return s + tpTicks*inst.tickValue*(parseInt(tp.contracts)||0);
  },0);
  const pnl = gross;
  const st = t.stop ? Math.abs(parseFloat(t.entry)-parseFloat(t.stop))/inst.tickSize : null;
  const r = st ? Math.round(ticks/st*100)/100 : null;
  return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:Math.round(weightedExit*100)/100};
}

function getStreak(trades) {
  const sorted = [...trades].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length) return {count:0,type:"—"};
  const first = calc(sorted[0]).pnl;
  const type = first>=0?"W":"L";
  let count=0;
  for(const t of sorted){
    const p=calc(t).pnl;
    if((type==="W"&&p>=0)||(type==="L"&&p<0)) count++;
    else break;
  }
  return {count,type};
}

  return(

      {/* Y axis labels */}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:9,color:"var(--text4)"}}>{fmtV(mx)}</span>

        <span style={{fontSize:9,color:"var(--text4)"}}>{fmtV(mn)}</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:90,overflow:"visible"}}>

        <line x1={0} y1={zy} x2={W} y2={zy} stroke="var(--text5)" strokeWidth={0.8} strokeDasharray="3,3"/>

        {startBal>0&&<line x1={0} y1={zy} x2={W} y2={zy} stroke="#718096" strokeWidth={1.5} strokeDasharray="6,3" opacity={0.5}/>}
        {startBal>0&&<text x={W-4} y={zy-4} fontSize={8} fill="#718096" fillOpacity={0.7} textAnchor="end">Start</text>}
        {/* Fill area under curve */}
        <polygon points={`0,${H} ${pts} ${W},${H}`} fill={col} fillOpacity={0.06}/>

        <text x={4} y={H-((vals[0]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.7}>{fmtV(vals[0])}</text>
        <text x={W-4} y={H-((vals[vals.length-1]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.7} textAnchor="end">{fmtV(vals[vals.length-1])}</text>
      </svg>

      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        <div style={{fontSize:10,color:"var(--text4)"}}>
          {startBal>0?`Start: ${fmtV(startBal)}`:"P&L curve"}

    </div>
  );
}

/* ── Image Uploader ── */
function ImageUploader({images,onChange}){
  const ref=useRef();
  const [drag,setDrag]=useState(false);

  const compress = (file, callback) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 800; // max width/height px
      const QUALITY = 0.6; // 60% quality
      let w = img.width, h = img.height;
      if(w > MAX || h > MAX){
        if(w > h){ h = Math.round(h * MAX/w); w = MAX; }
        else { w = Math.round(w * MAX/h); h = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL("image/jpeg", QUALITY);
      URL.revokeObjectURL(url);
      callback(compressed);
    };
    img.src = url;
  };

  const process=files=>{
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/"))return;
      compress(f, dataUrl => {
        onChange(p=>[...p,{id:Date.now()+Math.random(),dataUrl,label:f.name.replace(/\.[^.]+$/,"")}]);
      });
    });
  };
  return(
    <div>
      <div className={`upload-zone${drag?" drag":""}`}
        onClick={()=>ref.current.click()}
        onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files);}}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}>
        <div style={{fontSize:22,marginBottom:4}}>📸</div>
        <div style={{fontSize:12,color:"var(--text4)"}}>Tap to add chart screenshots</div>
        <div style={{fontSize:10,color:"var(--text5)",marginTop:3}}>PNG · JPG · WEBP</div>
        <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>process(e.target.files)}/>
      </div>
      {images.length>0&&(
        <div>
          <div className="thumb-row">
            {images.map((img)=>(
              <div key={img.id} className="thumb-wrap">
                <img src={img.dataUrl} alt=""/>
                <button className="thumb-del" onClick={()=>onChange(p=>p.filter(x=>x.id!==img.id))}>×</button>
              </div>
            ))}
          </div>
          <div style={{fontSize:9,color:"var(--text4)",marginTop:4,textAlign:"right"}}>
            {images.length} image{images.length!==1?"s":""} · ~{Math.round(images.reduce((s,i)=>s+((i.dataUrl&&i.dataUrl.length)||0),0)/1024)}kb stored
          </div>
        </div>
      )}
    </div>
  );
}

          <input className="pin-name-input" placeholder="Your name..." value={name} onChange={e=>setName(e.target.value)} autoFocus
            onKeyDown={e=>{if(e.key==="Enter"&&name.trim())setStep("setpin");}}/>
          <button className="btn-primary" style={{marginTop:16}} disabled={!name.trim()}
            onClick={()=>setStep("setpin")}>Continue →</button>
        </div>
      )}

      {(step==="setpin"||step==="confirm"||step==="pin")&&(
        <>
          <div style={{fontSize:13,color:"var(--text3)",textAlign:"center",marginTop:24,lineHeight:1.6}}>
            {step==="pin"&&<>
              <InitialAvatar name={profile.name} size={48} fontSize="md" style={{margin:"0 auto 8px",background:"var(--accent-bg)",border:"1px solid #00e5a030"}}/>
              <span style={{color:"var(--text2)",fontWeight:500}}>{profile.name}</span><br/>Enter your PIN
            </>}
            {step==="setpin"&&<span>Set a 4-digit PIN</span>}
            {step==="confirm"&&<span>Confirm your PIN</span>}
          </div>

          {/* Dots */}
          <div className="pin-dots" style={{animation:shake?"shake 0.4s ease":undefined}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{
                width:14,height:14,borderRadius:"50%",
                transition:"all 0.1s ease",
                background: error?"#ff4d6d":success?"var(--accent)":currentEntry.length>i?"var(--accent)":"transparent",
                border: error?"2px solid #ff4d6d":success?"2px solid var(--accent)":currentEntry.length>i?"2px solid var(--accent)":"2px solid var(--border3)",
                transform: currentEntry.length>i?"scale(1.15)":"scale(1)",
                boxShadow: (currentEntry.length>i&&!error)?"0 0 8px var(--accent-dim)":undefined,
              }}/>
            ))}
          </div>

          {/* Keypad */}
          <div className="pin-pad">
            {DIGITS.map((d,i)=>(
              d==="*"?(
                <button key={i} className="pin-btn del" style={{color:"var(--text5)",cursor:"default"}} onClick={()=>{}}>＃</button>
              ):d==="⌫"?(
                <button key={i} className="pin-btn del" onClick={pressDelete}
                  style={{fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
                  </svg>
                </button>
              ):(
                <button key={i} className="pin-btn" onClick={()=>pressDigit(d)}>{d}</button>
              )
            ))}
          </div>
        </>
      )}

      <style>{`
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        .pin-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;}
        .pin-btn:active{background:var(--accent-bg)!important;border-color:var(--accent-dim)!important;transform:scale(0.93);}
      `}</style>
    </div>
  );
}

/* ── Calendar View ── */
function CalendarView({trades, fmt, calc, curr}){
  const today = new Date();
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [selectedDay, setSelectedDay] = useState(null);

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Build day map for current month
  const dayMap = useMemo(()=>{
    const map = {};
    trades.forEach(t=>{
      const d = new Date(t.date);
      if(d.getFullYear()===calYear && d.getMonth()===calMonth){
        const key = t.date;
        if(!map[key]) map[key]={pnl:0,count:0,trades:[]};
        map[key].pnl += calc(t).pnl;
        map[key].count++;
        map[key].trades.push(t);
      }
    });
    return map;
  },[trades, calYear, calMonth]);

  // Monthly summary
  const monthPnl = Object.values(dayMap).reduce((s,d)=>s+d.pnl,0);
  const greenDays = Object.values(dayMap).filter(d=>d.pnl>0).length;
  const redDays = Object.values(dayMap).filter(d=>d.pnl<0).length;

  // Build calendar grid
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const prevMonth = ()=>{ if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); setSelectedDay(null); };
  const nextMonth = ()=>{ if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); setSelectedDay(null); };

  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const selKey = selectedDay ? `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(selectedDay).padStart(2,"0")}` : null;
  const selData = selKey ? dayMap[selKey] : null;

  return(
    <>
      {/* Month header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",color:"var(--text3)",fontSize:20,cursor:"pointer",padding:"4px 8px"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:"var(--text)",lineHeight:1.3,paddingBottom:2}}>{MONTHS[calMonth]}</div>
          <div style={{fontSize:11,color:"var(--text4)"}}>{calYear}</div>
        </div>
        <button onClick={nextMonth} style={{background:"none",border:"none",color:"var(--text3)",fontSize:20,cursor:"pointer",padding:"4px 8px"}}>›</button>
      </div>

      {/* Monthly summary */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[
          {l:"Month P&L",v:fmt(monthPnl),c:monthPnl>=0?"var(--accent)":"#ff4d6d"},
          {l:"Green Days",v:greenDays,c:"#00e5a0"},
          {l:"Red Days",v:redDays,c:"#ff4d6d"},
        ].map(s=>(
          <div key={s.l} className="stat-card" style={{flex:1,padding:"10px 12px"}}>
            <div className="stat-label">{s.l}</div>
            <div style={{fontSize:16,fontWeight:500,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {DAYS.map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:9,letterSpacing:"0.1em",color:"var(--text4)",textTransform:"uppercase",padding:"4px 0"}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:16}}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const key = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const data = dayMap[key];
          const isToday = key===todayStr;
          const isSelected = day===selectedDay;
          const bg = data ? (data.pnl>0?"var(--accent)":"#ff4d6d") : "transparent";
          const intensity = data ? Math.min(0.7, 0.15 + Math.abs(data.pnl)/500*0.4) : 0;
          return(
            <div key={day} onClick={()=>setSelectedDay(day===selectedDay?null:day)}
              style={{aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:data?"pointer":"default",
                background:data?`${bg}${Math.round(intensity*255).toString(16).padStart(2,"0")}`:"var(--surface2)",
                border:isSelected?"2px solid "+(data?bg:"var(--accent)"):"2px solid "+(isToday?"var(--accent)":"transparent"),
                transition:"all 0.15s",position:"relative"}}>
              <div style={{fontSize:11,fontWeight:isToday?700:400,color:data?(data.pnl>0?"var(--accent)":"#ff4d6d"):"var(--text4)"}}>{day}</div>
              {data&&<div style={{fontSize:7,color:data.pnl>0?"#00e5a080":"#ff4d6d80",letterSpacing:"-0.02em",textAlign:"center"}}>
                {curr.symbol}{Math.abs(data.pnl)>=1000?`${(Math.abs(data.pnl)/1000).toFixed(1)}k`:Math.abs(data.pnl).toFixed(0)}
              </div>}
            </div>
          );
        })}
      </div>

      {/* Selected day detail */}
      {selectedDay&&(
        <div className="stat-card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",lineHeight:1.3,paddingBottom:2}}>{MONTHS[calMonth]} {selectedDay}</div>
            {selData&&<div style={{fontSize:18,fontWeight:500,color:selData.pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(selData.pnl)}</div>}
          </div>
          {!selData?(
            <div style={{fontSize:12,color:"var(--text4)",textAlign:"center",padding:"16px 0"}}>No trades on this day</div>
          ):(
            selData.trades.map(t=>{
              const {pnl,ticks,r}=calc(t);
              return(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                  <div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:500,color:"var(--text)"}}>{t.instrument}</span>
                      <span style={{fontSize:11,color:t.direction==="Long"?"var(--accent)":"#ff4d6d"}}>{t.direction==="Long"?"▲":"▼"} {t.direction}</span>
                      {t.emotion&&<span style={{fontSize:11}}>{t.emotion.split(" ")[0]}</span>}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <span className="tag">{t.strategy}</span>
                      <span className="tag">{t.outcome||"TP"}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:500,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</div>
                    <div style={{fontSize:11,color:"var(--text4)"}}>{ticks>=0?"+":""}{ticks} ticks{r!==null?` · ${r>=0?"+":""}${r}R`:""}</div>
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}

      {/* Goals shortcut */}
    </>
  );
}

/* ── Confetti ── */
function fireConfetti(){
  const colors=["#00e5a0","#ff4d6d","#f6ad55","#fff","#a78bfa"];
  const pieces=Array.from({length:60},(_,i)=>{
    const el=document.createElement("div");
    el.className="confetti-piece";
    el.style.left=Math.random()*100+"vw";
    el.style.top="-10px";
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius=Math.random()>0.5?"50%":"2px";
    el.style.width=(Math.random()*8+4)+"px";
    el.style.height=(Math.random()*8+4)+"px";
    el.style.animationDuration=(Math.random()*2+1.5)+"s";
    el.style.animationDelay=(Math.random()*0.5)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(3000));
    return el;
  });
}

/* ── Goals View ── */
function GoalsView({trades, goals, setGoals, fmt, calc, goalColour}){
  const [showAddGoal, setShowAddGoal] = useState(false);
  const [editGroupId, setEditGroupId] = useState(null);
  const [groupForm, setGroupForm] = useState({title:"", period:"Daily", targets:[]});
  const [newTarget, setNewTarget] = useState({type:"PnL", amount:""});

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const todayStr = now.toISOString().split("T")[0];

  const getPeriodTrades = (period) => trades.filter(t=>{
    const d = new Date(t.date);
    if(period==="Daily") return t.date===todayStr;
    if(period==="Weekly") return d>=weekStart;
    if(period==="Monthly") return d>=monthStart;
    return true;
  });

  const getProgress = (type, period) => {
    const pt = getPeriodTrades(period);
    switch(type){
      case "PnL": return pt.reduce((s,t)=>s+calc(t).pnl,0);
      case "WinRate": { const w=pt.filter(t=>calc(t).pnl>0).length; return pt.length?Math.round(w/pt.length*100):0; }
      case "Trades": return pt.length;
      case "AvgR": { const rt=pt.filter(t=>calc(t).r!==null); return rt.length?Math.round(rt.reduce((s,t)=>s+calc(t).r,0)/rt.length*100)/100:0; }
      case "MaxLoss": return pt.length?Math.abs(Math.min(...pt.map(t=>calc(t).pnl),0)):0;
      default: return 0;
    }
  };

  const TYPES = [
    {k:"PnL",l:"Net P&L",unit:"$"},
    {k:"WinRate",l:"Win Rate",unit:"%"},
    {k:"Trades",l:"No. of Trades",unit:""},
    {k:"AvgR",l:"Avg R",unit:"R"},
    {k:"MaxLoss",l:"Max Loss",unit:"$"},
  ];

  const fmtVal = (type, val) => {
    switch(type){
      case "PnL": return fmt(val);
      case "WinRate": return `${val}%`;
      case "Trades": return `${val}`;
      case "AvgR": return `${val>=0?"+":""}${val}R`;
      case "MaxLoss": return `$${Math.abs(val).toFixed(0)}`;
      default: return val;
    }
  };

  const fmtTarget = (type, amt) => {
    switch(type){
      case "PnL": case "MaxLoss": return `$${amt}`;
      case "WinRate": return `${amt}%`;
      case "AvgR": return `${amt}R`;
      default: return `${amt}`;
    }
  };

  const getColor = (type, pct, progress) => {
    if(type==="MaxLoss") return pct<=100?"var(--accent)":"#ff4d6d";
    if(type==="PnL") return progress>=0?"var(--accent)":"#ff4d6d";
    // simple = just green/red, traffic = green/amber/red
    if(goalColour==="traffic"){
      return pct>=100?"#00e5a0":pct>=60?"#f6ad55":"#ff4d6d";
    }
    return pct>=100?"var(--accent)":"#ff4d6d";
  };

  const openNew = () => {
    setGroupForm({title:"", period:"Daily", targets:[]});
    setNewTarget({type:"PnL", amount:""});
    setEditGroupId(null);
    setShowAddGoal(true);
  };

  const addTargetToForm = () => {
    if(!newTarget.amount||isNaN(parseFloat(newTarget.amount))) return;
    setGroupForm(f=>({...f, targets:[...f.targets, {...newTarget, amount:parseFloat(newTarget.amount), id:Date.now()}]}));
    setNewTarget({type:"PnL", amount:""});
  };

  const saveGroup = () => {
    if(!groupForm.title||!groupForm.targets.length) return;
    if(editGroupId){
      setGoals(g=>g.map(gi=>gi.id===editGroupId?{...groupForm,id:editGroupId}:gi));
    } else {
      setGoals(g=>[...g,{...groupForm,id:Date.now()}]);
    }
    setShowAddGoal(false);
  };

  return(
    <>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
        <div className="section-title" style={{marginBottom:0}}>Goals</div>
        <button className="btn-primary" style={{width:"auto",padding:"8px 16px",fontSize:11}} onClick={openNew}>+ Add Goals</button>
      </div>

      {goals.length===0?(
        <div className="empty">
          <div style={{marginBottom:16}}>
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style={{opacity:0.4}}>
                  {/* Podium steps */}
                  <rect x="22" y="28" width="20" height="28" rx="2" stroke="#00e5a0" strokeWidth="2" fill="#00e5a0" fillOpacity="0.15"/>
                  <rect x="4" y="38" width="18" height="18" rx="2" stroke="#00e5a0" strokeWidth="2" fill="#00e5a0" fillOpacity="0.1" opacity="0.7"/>
                  <rect x="42" y="44" width="18" height="12" rx="2" stroke="#00e5a0" strokeWidth="2" fill="#00e5a0" fillOpacity="0.1" opacity="0.5"/>
                  {/* Numbers */}
                  <text x="32" y="22" textAnchor="middle" fontSize="10" fill="#00e5a0" fontWeight="bold">1</text>
                  <text x="13" y="34" textAnchor="middle" fontSize="9" fill="#00e5a0" fontWeight="bold" opacity="0.7">2</text>
                  <text x="51" y="40" textAnchor="middle" fontSize="9" fill="#00e5a0" fontWeight="bold" opacity="0.5">3</text>
                  {/* Crown on top */}
                  <path d="M26 16 L32 10 L38 16 L36 12 L32 15 L28 12 Z" fill="#00e5a0" opacity="0.8"/>
                </svg>
              </div>
          <div className="empty-title">No goals yet</div>
          <div className="empty-sub">Set targets to track your progress</div>
          <div style={{fontSize:12,color:"var(--text5)",marginBottom:24}}>Create a goal group to track multiple targets</div>
          <button className="btn-primary" style={{width:"auto",padding:"12px 32px",marginTop:8}} onClick={openNew}>+ Create Goals</button>
        </div>
      ):(
        goals.map(group=>{
          const allDone = (group.targets||[]).every(t=>{
            const progress = getProgress(t.type, group.period);
            const pct = Math.round(Math.abs(progress)/t.amount*100);
            return t.type==="MaxLoss"?pct<=100:pct>=100;
          });
          return(
            <div key={group.id} className="stat-card" style={{marginBottom:12}}>
              {/* Group header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div>
                  <div style={{fontSize:15,color:"var(--text)",fontWeight:500,marginBottom:4}}>{group.title}</div>
                  <div style={{display:"flex",gap:6}}>
                    <span className="tag">{group.period}</span>
                    <span className="tag">{group.targets.length} target{group.targets.length!==1?"s":""}</span>
                    {allDone&&<span onClick={fireConfetti} style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:"var(--accent-bg)",color:"var(--accent)",letterSpacing:"0.08em",cursor:"pointer"}}>✓ ALL MET 🎉</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button className="btn-ghost" style={{padding:"4px 10px",fontSize:10}} onClick={()=>{setGroupForm({...group});setEditGroupId(group.id);setNewTarget({type:"PnL",amount:""});setShowAddGoal(true);}}>Edit</button>
                  <button onClick={()=>setGoals(g=>g.filter(gi=>gi.id!==group.id))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:18,padding:"2px 4px"}} onMouseEnter={e=>e.target.style.color="#ff4d6d"} onMouseLeave={e=>e.target.style.color="var(--text5)"}>×</button>
                </div>
              </div>
              {/* Individual targets */}
              {(group.targets||[]).map((target,i)=>{
                const progress = getProgress(target.type, group.period);
                const rawPct = Math.round(Math.abs(progress)/target.amount*100);
                const pct = Math.min(rawPct, 100);
                const col = getColor(target.type, rawPct, progress);
                const typeInfo = TYPES.find(t=>t.k===target.type);
                return(
                  <div key={target.id||i} style={{marginBottom:i<group.targets.length-1?14:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <span style={{fontSize:11,color:"var(--text3)"}}>{(typeInfo&&typeInfo.l)}</span>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:11,color:col}}>{fmtVal(target.type,progress)}</span>
                        <span style={{fontSize:10,color:"var(--text4)"}}>/ {fmtTarget(target.type,target.amount)}</span>
                        <span style={{fontSize:11,fontWeight:500,color:col}}>{rawPct}%</span>
                      </div>
                    </div>
                    <div style={{height:5,background:"var(--tag-bg)",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:(pct)+"%",background:col,borderRadius:3,transition:"width 0.5s"}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })
      )}

      {/* Add/Edit Group Sheet */}
      {showAddGoal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"flex-end"}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowAddGoal(false);}}>
          <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px",width:"100%",paddingBottom:`calc(100px + env(safe-area-inset-bottom))`,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",lineHeight:1.3,paddingBottom:2}}>{editGroupId?"Edit Goals":"New Goals"}</div>
              <button onClick={()=>setShowAddGoal(false)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>
            </div>

            {/* Title */}
            <div className="field-group">
              <label className="field-label">Group Title</label>
              <input className="field-input" placeholder="e.g. Daily Targets" value={groupForm.title}
                onChange={e=>setGroupForm(f=>({...f,title:e.target.value}))}/>
            </div>

            {/* Period */}
            <div className="field-group">
              <label className="field-label">Period</label>
              <div style={{display:"flex",gap:8}}>
                {["Daily","Weekly","Monthly","All Time"].map(p=>(
                  <button key={p} onClick={()=>setGroupForm(f=>({...f,period:p}))}
                    style={{flex:1,padding:"10px 4px",border:"1px solid "+(groupForm.period===p?"#00e5a040":"#1e2530"),borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",
                      background:groupForm.period===p?"var(--accent-bg)":"var(--surface2)",
                      color:groupForm.period===p?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{p}</button>
                ))}
              </div>
            </div>

            {/* Existing targets */}
            {groupForm.targets.length>0&&(
              <div className="field-group">

function NumberInput({value, onChange, placeholder, className, style, step}){
  const [display, setDisplay] = React.useState(value||"");

  React.useEffect(()=>{
    if(document.activeElement!==inputRef.current){
      setDisplay(value?Number(value).toLocaleString("en-GB"):"");
    }
  },[value]);

  const inputRef = React.useRef(null);

  const handleChange = (e) => {
    const raw = e.target.value.replace(/,/g,"");
    if(raw===""||raw==="-"||/^-?\d*\.?\d*$/.test(raw)){
      setDisplay(raw);
      onChange({target:{value:raw}});
    }
  };

  const handleBlur = () => {
    const num = parseFloat(display.replace(/,/g,""));
    if(!isNaN(num)) setDisplay(num.toLocaleString("en-GB"));
  };

  const handleFocus = () => {
    setDisplay(display.replace(/,/g,""));
  };

  return(
    <input
      ref={inputRef}
      type="text"
      inputMode="decimal"
      placeholder={placeholder}
      className={className}
      style={style}
      value={display}
      onChange={handleChange}
      onBlur={handleBlur}
      onFocus={handleFocus}
    />
  );
}

/* ── Swipe Actions ── */
function SwipeToDelete({children, onDelete, onEdit}){
  const [offset, setOffset] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const startX = useRef(0);
  const startY = useRef(0);
  const isDragging = useRef(false);
  const THRESHOLD = 80;

  const onTouchStart = e => {
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    isDragging.current = false;
  };

  const onTouchMove = e => {
    const dx = e.touches[0].clientX - startX.current;
    const dy = e.touches[0].clientY - startY.current;
    if(!isDragging.current && Math.abs(dy) > Math.abs(dx)) return;
    isDragging.current = true;
    setSwiping(true);
    setOffset(Math.max(-140, Math.min(100, dx)));
    e.preventDefault();
  };

  const onTouchEnd = () => {
    if(offset < -THRESHOLD){
      setOffset(-140);
      setTimeout(()=>{ onDelete(); setOffset(0); setSwiping(false); }, 200);
    } else if(offset > THRESHOLD && onEdit){
      setOffset(0);
      setSwiping(false);
      onEdit();
    } else {
      setOffset(0);
      setSwiping(false);
    }
    isDragging.current = false;
  };

  return(
    <div className="swipe-wrap">
      {/* Edit bg (right swipe) */}
      {onEdit&&<div style={{position:"absolute",inset:0,background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"flex-start",paddingLeft:20,borderRadius:10}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <span style={{fontSize:9,color:"white",letterSpacing:"0.1em",textTransform:"uppercase"}}>Edit</span>
        </div>
      </div>}
      {/* Delete bg (left swipe) */}
      <div className="swipe-delete-bg">
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
          <span style={{fontSize:9,color:"white",letterSpacing:"0.1em",textTransform:"uppercase"}}>Delete</span>
        </div>
      </div>
      {/* Card */}
      <div className="swipe-card"
        style={{transform:"translateX("+offset+"px)",transition:swiping?"none":"transform 0.25s ease"}}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}>
        {children}
      </div>
    </div>
  );
}
