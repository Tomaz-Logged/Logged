                            <div style={{height:4,background:"var(--tag-bg)",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:(wr)+"%",background:wr>=50?"var(--accent)":"#ff4d6d",borderRadius:2}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}

                {/* By Strategy */}
                {Object.keys(stats.bySt).length>0&&(()=>{
                  const rows=Object.entries(stats.bySt).sort((a,b)=>b[1].pnl-a[1].pnl);
                  const maxAbs=rows.length?Math.max(...rows.map(r=>Math.abs(r[1].pnl))):1;
                  return(
                    <div className="stat-card">
                      <div className="stat-label" style={{marginBottom:14}}>By Strategy</div>
                      {rows.map(([s,d])=>{
                        const wr = d.count?Math.round(d.wins/d.count*100):0;
                        return(
                          <div key={s} style={{marginBottom:14}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                              <span style={{fontSize:12,color:"var(--text2)",fontWeight:500}}>{s}</span>
                              <span style={{fontSize:11,color:"var(--text4)"}}>{d.count} trade{d.count!==1?"s":""}</span>
                            </div>
                            {/* P&L row */}
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                              <span style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>P&L</span>
                              <span style={{fontSize:12,color:d.pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(d.pnl)}</span>
                            </div>
                            <div style={{height:4,background:"var(--tag-bg)",borderRadius:2,overflow:"hidden",marginBottom:6}}>
                              <div style={{height:"100%",width:(Math.min(100,Math.abs(d.pnl)/maxAbs*100))+"%",background:d.pnl>=0?"var(--accent)":"#ff4d6d",borderRadius:2}}/>
                            </div>
                            {/* Win Rate row */}
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                              <span style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Win Rate</span>
                              <span style={{fontSize:12,color:wr>=50?"var(--accent)":"#ff4d6d"}}>{wr}%</span>
                            </div>
                            <div style={{height:4,background:"var(--tag-bg)",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:(wr)+"%",background:wr>=50?"var(--accent)":"#ff4d6d",borderRadius:2}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}

                {/* By Instrument */}
                {Object.keys(stats.byInst).length>0&&(()=>{
                  const rows=Object.entries(stats.byInst).sort((a,b)=>b[1].pnl-a[1].pnl);
                  const maxAbs=rows.length?Math.max(...rows.map(r=>Math.abs(r[1].pnl))):1;
                  return(
                    <div className="stat-card" style={{marginBottom:12}}>
                      <div className="stat-label" style={{marginBottom:14}}>By Instrument</div>
                      {rows.map(([inst,d])=>{
                        const wr=d.count?Math.round(d.wins/d.count*100):0;
                        return(
                          <div key={inst} style={{marginBottom:14}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                              <span style={{fontSize:13,color:"var(--text)",fontWeight:500,fontFamily:"'Syne',sans-serif"}}>{inst}</span>
                              <span style={{fontSize:11,color:"var(--text4)"}}>{d.count} trade{d.count!==1?"s":""}</span>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                              <span style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>P&L</span>
                              <span style={{fontSize:12,color:d.pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(d.pnl)}</span>
                            </div>
                            <div style={{height:4,background:"var(--tag-bg)",borderRadius:2,overflow:"hidden",marginBottom:6}}>
                              <div style={{height:"100%",width:(Math.min(100,Math.abs(d.pnl)/maxAbs*100))+"%",background:d.pnl>=0?"var(--accent)":"#ff4d6d",borderRadius:2}}/>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                              <span style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Win Rate</span>
                              <span style={{fontSize:12,color:wr>=50?"var(--accent)":"#ff4d6d"}}>{wr}%</span>
                            </div>
                            <div style={{height:4,background:"var(--tag-bg)",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:(wr)+"%",background:wr>=50?"var(--accent)":"#ff4d6d",borderRadius:2}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </>
            )}
            </>)}
          </>
        )}


        {/* SETTINGS */}
{view==="settings"&&(
          <>
            <div className="section-title">Settings</div>

            {/* ── ACCOUNT ── */}
            <SettingsSection title="Account" icon="💰" defaultOpen={true}>
              <BalanceCard balance={balance} setBalance={setBalance} stats={stats} currency={currency} setCurrency={setCurrency} curr={curr}/>
            </SettingsSection>

            {/* ── TRADING DEFAULTS ── */}
            <SettingsSection title="Trading Defaults" icon="⚙️">
              <div className="field-group">
                <label className="field-label">Default Instrument</label>
                <select className="field-input" value={defaultInstrument} onChange={e=>setDefaultInstrument(e.target.value)}>
                  {INSTRUMENTS.map(i=><option key={i.symbol} value={i.symbol}>{i.symbol} — {i.name}</option>)}
                </select>
              </div>
              <div className="field-group">
                <label className="field-label">Default Session</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {SESSIONS.map(s=>(
                    <button key={s} onClick={()=>setDefaultSession(s)} style={{padding:"8px 10px",border:"1px solid "+(defaultSession===s?"var(--accent)":"var(--border2)"),borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:defaultSession===s?"var(--accent-bg)":"var(--input-bg)",color:defaultSession===s?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{s}</button>
                  ))}
                </div>
              </div>
              <div className="grid2">
                <div className="field-group" style={{marginBottom:0}}>
                  <label className="field-label">Default Contracts</label>
                  <input type="number" inputMode="numeric" min="1" className="field-input" value={defaultContracts} onChange={e=>setDefaultContracts(parseInt(e.target.value)||1)}/>
                </div>
                <div className="field-group" style={{marginBottom:0}}>
                  <label className="field-label">Risk Per Trade %</label>
                  <input type="number" inputMode="decimal" step="0.1" min="0" className="field-input" value={riskPercent} onChange={e=>setRiskPercent(parseFloat(e.target.value)||1)} placeholder="e.g. 1"/>
                </div>
              </div>
            </SettingsSection>

            {/* ── DISCIPLINE ── */}
            <SettingsSection title="Discipline Rules" icon="🛡️">
              <div className="grid2">
                <div className="field-group">
                  <label className="field-label">Daily Trade Limit</label>
                  <input type="number" inputMode="numeric" min="0" placeholder="0 = off" className="field-input" value={dailyTradeLimit||""} onChange={e=>setDailyTradeLimit(parseInt(e.target.value)||0)}/>
                </div>
                <div className="field-group">
                  <label className="field-label">Max Daily Loss ({curr.symbol})</label>
                  <input type="number" inputMode="decimal" min="0" placeholder="0 = off" className="field-input" value={maxDailyLoss||""} onChange={e=>setMaxDailyLoss(parseFloat(e.target.value)||0)}/>
                </div>
              </div>
              <div className="field-group" style={{marginBottom:0}}>
                <label className="field-label">Trading Hours (optional)</label>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input type="time" className="field-input" style={{flex:1}} value={tradingHoursStart} onChange={e=>setTradingHoursStart(e.target.value)}/>
                  <span style={{color:"var(--text4)",fontSize:12,flexShrink:0}}>to</span>
                  <input type="time" className="field-input" style={{flex:1}} value={tradingHoursEnd} onChange={e=>setTradingHoursEnd(e.target.value)}/>
                </div>
              </div>
            </SettingsSection>

            {/* ── PRE-TRADE CHECKLIST ── */}
            <SettingsSection title="Pre-Trade Checklist" icon="✅">
              <div style={{fontSize:11,color:"var(--text4)",marginBottom:14,lineHeight:1.6}}>Shown as checkboxes when logging each trade.</div>
              {checklistItems.map((item,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{flex:1,fontSize:13,color:"var(--text2)"}}>{item}</span>
                  <button onClick={()=>setChecklistItems(c=>c.filter((_,j)=>j!==i))}
                    style={{background:"none",border:"none",color:"var(--text5)",fontSize:18,cursor:"pointer",padding:"2px 6px",flexShrink:0,transition:"color 0.15s"}}
                    onMouseEnter={e=>e.target.style.color="#ff4d6d"} onMouseLeave={e=>e.target.style.color="var(--text5)"}>×</button>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <input className="field-input" placeholder="Add new item..." value={newCheckItem}
                  onChange={e=>setNewCheckItem(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&newCheckItem.trim()){setChecklistItems(c=>[...c,newCheckItem.trim()]);setNewCheckItem("");}}}
                  style={{flex:1,fontSize:14,padding:"10px 12px"}}/>
                <button className="btn-primary" style={{width:"auto",padding:"0 16px",fontSize:11,flexShrink:0}}
                  onClick={()=>{if(newCheckItem.trim()){setChecklistItems(c=>[...c,newCheckItem.trim()]);setNewCheckItem("");}}}
                >Add</button>
              </div>
            </SettingsSection>

            {/* ── APPEARANCE ── */}
            <SettingsSection title="Appearance" icon="🎨">
              <div className="stat-card" style={{marginBottom:10}}>
                <div className="settings-row-label">Theme</div>
                <div style={{display:"flex",gap:8}}>
                  {[{k:"dark",l:"🌙 Dark"},{k:"light",l:"☀️ Light"}].map(t=>(
                    <button key={t.k} onClick={()=>setTheme(t.k)} style={{flex:1,padding:"11px",border:"1px solid "+(theme===t.k?"var(--accent)":"var(--border2)"),borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace",background:theme===t.k?"var(--accent-bg)":"var(--input-bg)",color:theme===t.k?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{t.l}</button>
                  ))}
                </div>
              </div>
              <div className="stat-card" style={{marginBottom:10}}>
                <div className="settings-row-label">Goal Progress Colours</div>
                <div style={{display:"flex",gap:8}}>
                  {[{k:"simple",l:"🟢 Simple",d:"Green / Red"},{k:"traffic",l:"🚦 Traffic Light",d:"Green / Amber / Red"}].map(t=>(
                    <button key={t.k} onClick={()=>setGoalColour(t.k)} style={{flex:1,padding:"10px 8px",border:"1px solid "+(goalColour===t.k?"var(--accent)":"var(--border2)"),borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:goalColour===t.k?"var(--accent-bg)":"var(--input-bg)",color:goalColour===t.k?"var(--accent)":"var(--text4)",transition:"all 0.15s",textAlign:"left"}}>
                      <div style={{marginBottom:2}}>{t.l}</div>
                      <div style={{fontSize:9,color:"var(--text5)"}}>{t.d}</div>
                    </button>
                  ))}
                </div>
              </div>
              <div className="stat-card" style={{marginBottom:10}}>
                <div className="settings-row-label">Ticker Bar</div>
                <div style={{fontSize:11,color:"var(--text4)",marginBottom:10}}>Balance is always shown. Pick up to 4 more.</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {ALL_STATS.map(key=>{
                    const active = tickerStats.includes(key);
                    const {val,col} = getStatVal(key);
                    return(
                      <button key={key} onClick={()=>{
                        if(active){if(tickerStats.length>1)setTickerStats(t=>t.filter(k=>k!==key));}
                        else{if(tickerStats.length<4)setTickerStats(t=>[...t,key]);}
                      }} style={{background:active?"var(--accent-bg)":"var(--input-bg)",border:"1px solid "+(active?"var(--accent-dim)":"var(--border2)"),borderRadius:8,padding:"10px 12px",cursor:"pointer",textAlign:"left",transition:"all 0.15s",opacity:(!active&&tickerStats.length>=4)?0.4:1}}>
                        <div style={{fontSize:9,letterSpacing:"0.12em",color:active?"var(--accent)":"var(--text4)",textTransform:"uppercase",marginBottom:3}}>{key}</div>
                        <div style={{fontSize:13,fontWeight:500,color:active?col:"var(--text5)"}}>{val}</div>
                      </button>
                    );
                  })}
                </div>
                <div style={{marginTop:10,fontSize:10,color:"var(--text4)",textAlign:"center"}}>{tickerStats.length}/4 selected</div>
              </div>
                <div className="settings-toggle-row">
                  <div>
                    <div style={{fontSize:13,color:"var(--text)"}}>Compact Trade Cards</div>
                    <div style={{fontSize:11,color:"var(--text4)",marginTop:2}}>Smaller cards, see more trades</div>
                  </div>
                  <div className="toggle" style={{background:compactCards?"var(--accent)":"var(--border3)"}} onClick={()=>setCompactCards(v=>!v)}>
                    <div className="toggle-thumb" style={{left:compactCards?22:3}}/>
                  </div>
                </div>
                <div style={{height:1,background:"var(--border)",margin:"12px 0"}}/>
                <div className="settings-toggle-row">
                  <div>
                    <div style={{fontSize:13,color:"var(--text)"}}>Show Checklist Score</div>
                    <div style={{fontSize:11,color:"var(--text4)",marginTop:2}}>Display score on trade cards</div>
                  </div>
                  <div className="toggle" style={{background:showCheckScore?"var(--accent)":"var(--border3)"}} onClick={()=>setShowCheckScore(v=>!v)}>
                    <div className="toggle-thumb" style={{left:showCheckScore?22:3}}/>
                  </div>
                </div>
                <div style={{height:1,background:"var(--border)",margin:"12px 0"}}/>
                <div className="settings-row-label" style={{marginBottom:8}}>Date Format</div>
                <div style={{display:"flex",gap:6}}>
                  {["DD/MM/YYYY","MM/DD/YYYY","YYYY-MM-DD"].map(f=>(
                    <button key={f} onClick={()=>setDateFormat(f)} style={{flex:1,padding:"8px 4px",border:"1px solid "+(dateFormat===f?"var(--accent)":"var(--border2)"),borderRadius:8,cursor:"pointer",fontSize:9,fontFamily:"'DM Mono',monospace",background:dateFormat===f?"var(--accent-bg)":"var(--input-bg)",color:dateFormat===f?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{f}</button>
                  ))}
                </div>
            </SettingsSection>

            {/* ── POINTERS ── */}
            <SettingsSection title="Journaling Pointers" icon="📖">
              <PointersCard/>
            </SettingsSection>
            {/* ── DATA & PRIVACY ── */}
            <SettingsSection title="Data & Privacy" icon="🔐">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontSize:13,color:"var(--text)"}}>Export Backup</div>
                  <div style={{fontSize:11,color:"var(--text4)",marginTop:2}}>Download all data as JSON</div>
                </div>
                <button onClick={()=>{
                  const data={trades,goals,balance,currency,theme,checklistItems};
                  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                  const a=document.createElement("a");
                  a.href=URL.createObjectURL(blob);
                  a.download="logged-backup-"+new Date().toISOString().split("T")[0]+".json";
                  a.click();
                }} style={{background:"none",border:"1px solid var(--border3)",borderRadius:6,padding:"7px 14px",color:"var(--text3)",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer",flexShrink:0}}>Export</button>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#ff4d6d08",border:"1px solid #ff4d6d20",borderRadius:8}}>
                <div>
                  <div style={{fontSize:13,color:"#ff4d6d"}}>Clear All Data</div>
                  <div style={{fontSize:11,color:"var(--text4)",marginTop:2}}>Permanently delete everything</div>
                </div>
                <button onClick={()=>setShowClearConfirm(true)} style={{background:"none",border:"1px solid #ff4d6d40",borderRadius:6,padding:"7px 14px",color:"#ff4d6d80",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer",flexShrink:0}}>Clear</button>
              </div>
            </SettingsSection>

            {showClearConfirm&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
                <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:24,width:"100%",maxWidth:320,textAlign:"center"}}>
                  <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",marginBottom:8}}>Clear All Data?</div>
                  <div style={{fontSize:12,color:"var(--text4)",marginBottom:24,lineHeight:1.7}}>This will permanently delete all your trades, goals and settings. This cannot be undone.</div>
                  <div style={{display:"flex",gap:10}}>
                    <button className="btn-ghost" style={{flex:1}} onClick={()=>setShowClearConfirm(false)}>Cancel</button>
                    <button onClick={()=>{
                      Object.keys(localStorage).filter(k=>k.startsWith("logged")).forEach(k=>localStorage.removeItem(k));
                      window.location.reload();
                    }} style={{flex:1,background:"#ff4d6d",color:"#fff",border:"none",borderRadius:8,padding:"12px",fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",fontWeight:500}}>Delete Everything</button>
                  </div>
                </div>
              </div>
            )}

            <div style={{marginTop:32,textAlign:"center",paddingBottom:8}}>
              <div style={{fontSize:9,letterSpacing:"0.2em",color:"var(--text5)",textTransform:"uppercase"}}>Logged · Futures Journal</div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:8,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'Syne',sans-serif",fontWeight:700}}>LOGGED IT. LEARNED IT. OWNED IT.</div>
              <div style={{fontSize:9,color:"var(--text5)",marginTop:4}}>v1.0</div>
            </div>
          </>
        )}

        {/* GOALS */}
        {view==="goals"&&<GoalsView trades={trades} goals={goals} setGoals={setGoals} fmt={fmt} calc={calc} goalColour={goalColour}/> }
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav">
        <button className={`nav-item${view==="journal"?" active":""}`} onClick={()=>setView("journal")}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          Journal
        </button>
        <button className={`nav-item${view==="stats"?" active":""}`} onClick={()=>setView("stats")}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            </svg>
          </div>
          Stats
        </button>
        <button className={`nav-item${view==="add"?" active":""}`} onClick={()=>{setForm(blankFormWithDefaults());setEditId(null);setView("add");}}>
          <div className="nav-icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </div>
          Log
        </button>
        <button className={`nav-item${view==="goals"?" active":""}`} onClick={()=>setView("goals")}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
            </svg>
          </div>
          Goals
        </button>
        <button className={`nav-item${view==="settings"?" active":""}`} onClick={()=>setView("settings")}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </div>
          Settings
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
