<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  /* Dark theme (default) */
  :root {
    --bg: #080b12;
    --bg-grad: radial-gradient(ellipse at 0% 0%, #1a0a2e 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, #0d1f2d 0%, transparent 55%), radial-gradient(ellipse at 100% 100%, #00251a 0%, transparent 60%), radial-gradient(ellipse at 0% 100%, #130d28 0%, transparent 55%), #080b12;
    --surface: #0f1318;
    --surface2: #111418;
    --border: #1a2030;
    --border2: #1e2530;
    --border3: #2d3748;
    --text: #e2e8f0;
    --text2: #a0aec0;
    --text3: #718096;
    --text4: #4a5568;
    --text5: #2d3748;
    --nav-bg: rgba(8,11,18,0.75);
    --ticker-bg: rgba(8,11,18,0.5);
    --tag-bg: #1a2030;
    --input-bg: #111418;
    --accent: #00e5a0;
    --accent-dim: #00e5a060;
    --accent-bg: #00e5a015;
  }

  /* Light theme — inverted dark theme */
  .light {
    --bg: #e2e8f0;
    --bg-grad: radial-gradient(ellipse at 0% 0%, #d4c5f0 0%, transparent 60%), radial-gradient(ellipse at 100% 0%, #c5d4e0 0%, transparent 55%), radial-gradient(ellipse at 100% 100%, #b8e8d8 0%, transparent 60%), radial-gradient(ellipse at 0% 100%, #ccc0e8 0%, transparent 55%), #e2e8f0;
    --surface: #f0f4f8;
    --surface2: #eef0f7;
    --border: #d0d8e8;
    --border2: #c0cad8;
    --border3: #a0adc0;
    --text: #0a0c10;
    --text2: #1a2030;
    --text3: #2d3748;
    --text4: #4a5568;
    --text5: #718096;
    --nav-bg: rgba(226,232,240,0.88);
    --ticker-bg: rgba(226,232,240,0.75);
    --tag-bg: #d8e0ec;
    --input-bg: #eef0f7;
    --accent: #007a52;
    --accent-dim: #007a5290;
    --accent-bg: #007a5218;
  }

  html,body{height:100%;height:100dvh;overflow:hidden;color:var(--text);font-family:'DM Mono','Courier New',monospace;
    background: var(--bg);
  }
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;height:-webkit-fill-available;overflow:hidden;
    background: var(--bg-grad);
    background-attachment: fixed;
    transition: background 0.4s ease;
  }
  .content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;padding-top:20px;padding-bottom:120px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
  input,select,textarea{font-family:'DM Mono',monospace;font-size:16px;color:var(--text);}
  input[type="date"],input[type="time"],input[type="number"]{font-size:16px;}

  .header{flex-shrink:0;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:relative;background:var(--nav-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);height:calc(52px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);}
  .bottom-nav{flex-shrink:0;position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;gap:4px;cursor:pointer;background:none;border:none;color:var(--text4);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.15s ease;}
  .nav-icon-wrap{width:48px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:12px;transition:all 0.15s ease;}
  .nav-item.active svg{filter:drop-shadow(0 0 5px var(--accent-dim));}
  .nav-item.active{color:var(--accent);}
  .nav-item.active .nav-icon-wrap{background:var(--accent-bg);}
  .nav-icon{font-size:18px;}

<script id="app-source" type="text/babel-source">
const { useState, useEffect, useMemo, useRef } = React;

const INSTRUMENTS = [
  { symbol:"ES", name:"E-mini S&P 500", tickSize:0.25, tickValue:12.5 },
  { symbol:"MES", name:"Micro E-mini S&P", tickSize:0.25, tickValue:1.25 },
  { symbol:"NQ", name:"E-mini Nasdaq-100", tickSize:0.25, tickValue:5 },
  { symbol:"MNQ", name:"Micro Nasdaq-100", tickSize:0.25, tickValue:0.5 },
  { symbol:"YM", name:"E-mini Dow Jones", tickSize:1, tickValue:5 },
  { symbol:"MYM", name:"Micro E-mini Dow", tickSize:1, tickValue:0.5 },
  { symbol:"GC", name:"Gold", tickSize:0.10, tickValue:10 },
  { symbol:"MGC", name:"Micro Gold", tickSize:0.10, tickValue:1 },
  { symbol:"CL", name:"Crude Oil", tickSize:0.01, tickValue:10 },
  { symbol:"SI", name:"Silver", tickSize:0.005, tickValue:25 },
];
const STRATEGIES = ["Breakout","Mean Reversion","Trend Follow","VWAP Fade","Open Drive","Failed Auction","Scalp","Swing","Other"];
const SESSIONS = ["Asia","London","New York"];
const SETUPS = ["A+","A","B","C"];
const EMOTIONS = ["😌 Calm","💪 Confident","😰 Anxious","😤 Frustrated","🤑 Greedy","😨 FOMO","😡 Revenge","🎯 Focused"];
const STORAGE_KEY = "logged_v1";
const BALANCE_KEY = "logged_balance_v1";
const ACCOUNTS_KEY = "logged_accounts_v1";

const DEFAULT_ACCOUNT = {id:"default", name:"Main Account", colour:"#00e5a0"};
const ACCOUNT_COLOURS = ["#00e5a0","#f6ad55","#a78bfa","#ff4d6d","#60a5fa","#34d399"];
const CURRENCY_KEY = "logged_currency_v1";
const THEME_KEY = "logged_theme_v1";
const GOAL_COLOUR_KEY = "logged_goal_colour_v1";
const GOALS_KEY = "logged_goals_v1";
const CURRENCIES = [
  {code:"USD", symbol:"$", locale:"en-US"},
  {code:"GBP", symbol:"£", locale:"en-GB"},
  {code:"EUR", symbol:"€", locale:"de-DE"},
];

function calc(t) {
  const inst = INSTRUMENTS.find(i=>i.symbol===t.instrument);
  if(!inst||!t.entry) return {pnl:0,ticks:0,r:null,avgExit:null};
  const dir = t.direction==="Long"?1:-1;

  // SL outcome — use stop price
  if(t.outcome==="SL"&&t.stop) {
    const ticks = dir*(parseFloat(t.stop)-parseFloat(t.entry))/inst.tickSize;
    const pnl = ticks*inst.tickValue*(parseInt(t.contracts)||1);
    const r = -1; // always -1R when stopped out
    return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:parseFloat(t.stop)};
  }

  // Breakeven outcome
  if(t.outcome==="BE") {
    return {pnl:0, ticks:0, r:0, avgExit:parseFloat(t.entry)};
  }

  const tps = (t.tps||[]).filter(tp=>tp.price&&tp.contracts);

  // Legacy: old trade with exit field
  if(!tps.length && t.exit) {
    const ticks = dir*(parseFloat(t.exit)-parseFloat(t.entry))/inst.tickSize;
    const pnl = ticks*inst.tickValue*(parseInt(t.contracts)||1);
    const st = t.stop ? Math.abs(parseFloat(t.entry)-parseFloat(t.stop))/inst.tickSize : null;
    const r = st ? Math.round(ticks/st*100)/100 : null;
    return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:parseFloat(t.exit)};
  }
  if(!tps.length) return {pnl:0,ticks:0,r:null,avgExit:null};

  // Weighted average exit across all TPs
  const totalContracts = tps.reduce((s,tp)=>s+(parseInt(tp.contracts)||0),0);
  const weightedExit = tps.reduce((s,tp)=>s+(parseFloat(tp.price)||0)*(parseInt(tp.contracts)||0),0) / totalContracts;
  const ticks = dir*(weightedExit-parseFloat(t.entry))/inst.tickSize;
  const gross = tps.reduce((s,tp)=>{
    const tpTicks = dir*(parseFloat(tp.price)-parseFloat(t.entry))/inst.tickSize;
    return s + tpTicks*inst.tickValue*(parseInt(tp.contracts)||0);
  },0);
  const pnl = gross;
  const st = t.stop ? Math.abs(parseFloat(t.entry)-parseFloat(t.stop))/inst.tickSize : null;
  const r = st ? Math.round(ticks/st*100)/100 : null;
  return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:Math.round(weightedExit*100)/100};
}

const _fmt = n=>`${n>=0?"+":"-"}$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const _fmts = n=>`$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})}`;

function exportExcel(trades) {
  // Build a simple XML-based Excel file (works without libraries)
  const headers = ["Date","Instrument","Direction","Contracts","Entry","TP1","TP1 Qty","TP2","TP2 Qty","TP3","TP3 Qty","Avg Exit","Stop","Ticks","P&L","R","Outcome","Strategy","Session","Setup","Notes"];
  const rows = trades.map(t => {
    const {pnl,ticks,r,avgExit} = calc(t);
    const tps = t.tps||[];
    return [t.date,t.instrument,t.direction,t.contracts,t.entry,
      (tps[0]&&tps[0].price)||"",(tps[0]&&tps[0].contracts)||"",
      (tps[1]&&tps[1].price)||"",(tps[1]&&tps[1].contracts)||"",
      (tps[2]&&tps[2].price)||"",(tps[2]&&tps[2].contracts)||"",
      avgExit||"",t.stop||"",ticks,pnl.toFixed(2),r||"",
      t.outcome||"TP",t.strategy,t.session,t.setup,t.notes||""
    ];
  });

  let xml = `<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
<Styles><Style ss:ID="h"><Font ss:Bold="1"/><Interior ss:Color="#0a0c10" ss:Pattern="Solid"/><Font ss:Color="#00e5a0" ss:Bold="1"/></Style></Styles>
<Worksheet ss:Name="Logged Trades"><Table>
<Row>${headers.map(h=>`<Cell ss:StyleID="h"><Data ss:Type="String">${h}</Data></Cell>`).join("")}</Row>
${rows.map(row=>`<Row>${row.map(v=>`<Cell><Data ss:Type="${isNaN(v)||v===""?"String":"Number"}">${String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;")}</Data></Cell>`).join("")}</Row>`).join("\n")}
</Table></Worksheet></Workbook>`;

  const blob = new Blob([xml],{type:"application/vnd.ms-excel"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="logged-trades.xls"; a.click();
  URL.revokeObjectURL(url);
}

function exportPDF(trades, balance) {
  const {totalPnl, winRate, pf, avgR, total} = (() => {
    const c=trades.map(t=>({...t,...calc(t)}));
    const wins=c.filter(t=>t.pnl>0), losses=c.filter(t=>t.pnl<0);
    const totalPnl=c.reduce((s,t)=>s+t.pnl,0);
    const winRate=c.length?(wins.length/c.length)*100:0;
    const avgWin=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((s,t)=>s+t.pnl,0)/losses.length:0;
    const pf=Math.abs(avgLoss)>0?avgWin/Math.abs(avgLoss):0;
    const rT=c.filter(t=>t.r!==null);
    const avgR=rT.length?rT.reduce((s,t)=>s+t.r,0)/rT.length:0;
    return{totalPnl,winRate,wins:wins.length,losses:losses.length,total:c.length,avgWin,avgLoss,pf,avgR};
  })();

  const fmtN = n=>`${n>=0?"+":"-"}$${Math.abs(n).toFixed(2)}`;
  const rows = trades.map(t=>{
    const {pnl,ticks,r} = calc(t);
    const tp1 = (t.tps&&t.tps[0]&&t.tps[0].price)||t.exit||"";
    return `<tr style="border-bottom:1px solid #1a2030;">
      <td>${t.date}</td><td>${t.instrument}</td>
      <td style="color:${t.direction==="Long"?"var(--accent)":"#ff4d6d"}">${t.direction==="Long"?"▲":"▼"} ${t.direction}</td>
      <td>${t.contracts}</td><td>${t.entry}</td><td>${tp1}</td><td>${t.stop||"—"}</td>
      <td style="color:${ticks>=0?"var(--accent)":"#ff4d6d"}">${ticks>=0?"+":""}${ticks}</td>
      <td style="color:${pnl>=0?"var(--accent)":"#ff4d6d"};font-weight:600">${fmtN(pnl)}</td>
      <td style="color:${(r||0)>=0?"#00e5a060":"#ff4d6d60"}">${r!==null?`${r>=0?"+":""}${r}R`:"—"}</td>
      <td><span style="background:${t.outcome==="SL"?"#ff4d6d20":t.outcome==="BE"?"#71809620":"#00e5a020"};color:${t.outcome==="SL"?"#ff4d6d":t.outcome==="BE"?"var(--text3)":"#00e5a0"};padding:2px 6px;border-radius:4px;font-size:10px">${t.outcome||"TP"}</span></td>
      <td>${t.strategy}</td><td>${t.session}</td>
    </tr>`;
  }).join("");

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <title>Logged — Trade Report</title>
  <style>
    body{font-family:'Courier New',monospace;background:#0a0c10;color:#e2e8f0;padding:32px;margin:0;}

    .sub{font-size:11px;letter-spacing:0.2em;color:#4a5568;text-transform:uppercase;margin-bottom:32px;}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px;}
    .stat{background:#0f1318;border:1px solid #1a2030;border-radius:8px;padding:14px;}

function getStreak(trades) {
  const sorted = [...trades].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length) return {count:0,type:"—"};
  const first = calc(sorted[0]).pnl;
  const type = first>=0?"W":"L";
  let count=0;
  for(const t of sorted){
    const p=calc(t).pnl;
    if((type==="W"&&p>=0)||(type==="L"&&p<0)) count++;
    else break;
  }
  return {count,type};
}

/* ── Equity SVG ── */
function EquityCurve({equity, totalPnl, balance, curr}){
  if(equity.length<2) return <div style={{color:"var(--text4)",fontSize:12,textAlign:"center",padding:"30px 0"}}>Log more trades to see your curve</div>;
  const sym = (curr&&curr.symbol)||"$";
  const startBal = balance||0;
  // If balance set, show absolute account value. Otherwise show P&L delta.
  const vals = startBal>0 ? equity.map(e=>startBal+e.eq) : equity.map(e=>e.eq);
  const mn=vals.length?Math.min(...vals, startBal||0):(startBal||0);
  const mx=vals.length?Math.max(...vals, startBal||0):(startBal||0)+1;
  const rng=mx-mn||1;
  const W=300,H=80;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/rng)*H}`).join(" ");
  // baseline = starting balance line if balance set, else zero line
  const baselineVal = startBal>0 ? startBal : 0;
  const zy = H-((baselineVal-mn)/rng)*H;
  const col = totalPnl>=0?"var(--accent)":"#ff4d6d";
  const fmtV = v => {
    if(Math.abs(v)>=1000000) return `${sym}${(v/1000000).toFixed(1)}M`;
    if(Math.abs(v)>=1000) return `${sym}${(v/1000).toFixed(1)}k`;
    return `${sym}${v.toFixed(0)}`;
  };
  return(
    <div>
      {/* Y axis labels */}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:9,color:"var(--text4)"}}>{fmtV(mx)}</span>
        {startBal>0&&<span style={{fontSize:9,color:"#a78bfa"}}>Start: {fmtV(startBal)}</span>}
        <span style={{fontSize:9,color:"var(--text4)"}}>{fmtV(mn)}</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:90,overflow:"visible"}}>
        {/* Baseline */}
        <line x1={0} y1={zy} x2={W} y2={zy} stroke="var(--text5)" strokeWidth={0.8} strokeDasharray="3,3"/>
        {/* Starting balance line */}
        {startBal>0&&<line x1={0} y1={zy} x2={W} y2={zy} stroke="#a78bfa" strokeWidth={1.5} strokeDasharray="6,3" opacity={0.7}/>}
        {startBal>0&&<text x={W-4} y={zy-4} fontSize={8} fill="#a78bfa" fillOpacity={0.9} textAnchor="end">Start</text>}
        {/* Fill area under curve */}
        <polygon points={`0,${H} ${pts} ${W},${H}`} fill={col} fillOpacity={0.06}/>
        {/* Curve */}
        <polyline points={pts} fill="none" stroke={col} strokeWidth={2} strokeLinejoin="round"/>
        {/* Dots */}
        {vals.map((v,i)=>(
          <circle key={i} cx={(i/(vals.length-1))*W} cy={H-((v-mn)/rng)*H} r={2.5} fill={col} opacity={0.6}/>
        ))}
        {/* Start and end labels */}
        <text x={4} y={H-((vals[0]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.7}>{fmtV(vals[0])}</text>
        <text x={W-4} y={H-((vals[vals.length-1]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.7} textAnchor="end">{fmtV(vals[vals.length-1])}</text>
      </svg>
      {/* Summary row */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        <div style={{fontSize:10,color:"var(--text4)"}}>
          {startBal>0?`Start: ${fmtV(startBal)}`:"P&L curve"}
        </div>
        <div style={{fontSize:10,color:totalPnl>=0?"var(--accent)":"#ff4d6d",fontWeight:500}}>
          {totalPnl>=0?"+":""}{sym}{Math.abs(totalPnl).toFixed(2)} ({totalPnl>=0?"+":""}{startBal>0?((totalPnl/startBal)*100).toFixed(2):"—"}%)
        </div>
        <div style={{fontSize:10,color:"var(--text4)"}}>
          {startBal>0?`Now: ${fmtV(startBal+totalPnl)}`:""}
        </div>
      </div>
    </div>
  );
}

/* ── Image Uploader ── */
function ImageUploader({images,onChange}){
  const ref=useRef();
  const [drag,setDrag]=useState(false);

  const compress = (file, callback) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 800; // max width/height px
      const QUALITY = 0.6; // 60% quality
      let w = img.width, h = img.height;
      if(w > MAX || h > MAX){
        if(w > h){ h = Math.round(h * MAX/w); w = MAX; }
        else { w = Math.round(w * MAX/h); h = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL("image/jpeg", QUALITY);
      URL.revokeObjectURL(url);
      callback(compressed);
    };
    img.src = url;
  };

  const process=files=>{
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/"))return;
      compress(f, dataUrl => {
        onChange(p=>[...p,{id:Date.now()+Math.random(),dataUrl,label:f.name.replace(/\.[^.]+$/,"")}]);
      });
    });
  };
  return(
    <div>
      <div className={`upload-zone${drag?" drag":""}`}
        onClick={()=>ref.current.click()}
        onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files);}}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}>
        <div style={{fontSize:22,marginBottom:4}}>📸</div>
        <div style={{fontSize:12,color:"var(--text4)"}}>Tap to add chart screenshots</div>
        <div style={{fontSize:10,color:"var(--text5)",marginTop:3}}>PNG · JPG · WEBP</div>
        <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>process(e.target.files)}/>
      </div>
      {images.length>0&&(
        <div>
          <div className="thumb-row">
            {images.map((img)=>(
              <div key={img.id} className="thumb-wrap">
                <img src={img.dataUrl} alt=""/>
                <button className="thumb-del" onClick={()=>onChange(p=>p.filter(x=>x.id!==img.id))}>×</button>
              </div>
            ))}
          </div>
          <div style={{fontSize:9,color:"var(--text4)",marginTop:4,textAlign:"right"}}>
            {images.length} image{images.length!==1?"s":""} · ~{Math.round(images.reduce((s,i)=>s+((i.dataUrl&&i.dataUrl.length)||0),0)/1024)}kb stored
          </div>
        </div>
      )}
    </div>
  );
}

        const key = t.date;

      </div>

      {/* Monthly summary */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[
          {l:"Month P&L",v:fmt(monthPnl),c:monthPnl>=0?"var(--accent)":"#ff4d6d"},
          {l:"Green Days",v:greenDays,c:"#00e5a0"},
          {l:"Red Days",v:redDays,c:"#ff4d6d"},
        ].map(s=>(
          <div key={s.l} className="stat-card" style={{flex:1,padding:"10px 12px"}}>
            <div className="stat-label">{s.l}</div>
            <div style={{fontSize:16,fontWeight:500,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {DAYS.map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:9,letterSpacing:"0.1em",color:"var(--text4)",textTransform:"uppercase",padding:"4px 0"}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:16}}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const key = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const data = dayMap[key];
          const isToday = key===todayStr;
          const isSelected = day===selectedDay;
          const bg = data ? (data.pnl>0?"var(--accent)":"#ff4d6d") : "transparent";
          const intensity = data ? Math.min(0.35, 0.08 + Math.abs(data.pnl)/500*0.2) : 0;
          return(
            <div key={day} onClick={()=>setSelectedDay(day===selectedDay?null:day)}
              style={{aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:data?"pointer":"default",
                background:data?`${bg}${Math.round(intensity*255).toString(16).padStart(2,"0")}`:"var(--surface2)",
                border:isSelected?"2px solid "+(data?bg:"var(--accent)"):"2px solid "+(isToday?"var(--accent)":"transparent"),
                transition:"all 0.15s",position:"relative"}}>
              <div style={{fontSize:11,fontWeight:isToday?700:400,color:data?(data.pnl>0?"var(--accent)":"#ff4d6d"):"var(--text4)"}}>{day}</div>
              {data&&<div style={{fontSize:7,color:data.pnl>0?"#00e5a080":"#ff4d6d80",letterSpacing:"-0.02em",textAlign:"center"}}>
                {curr.symbol}{Math.abs(data.pnl)>=1000?`${(Math.abs(data.pnl)/1000).toFixed(1)}k`:Math.abs(data.pnl).toFixed(0)}
              </div>}
            </div>
          );
        })}
      </div>

      {/* Selected day detail */}
      {selectedDay&&(
        <div className="stat-card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",lineHeight:1.3,paddingBottom:2}}>{MONTHS[calMonth]} {selectedDay}</div>
            {selData&&<div style={{fontSize:18,fontWeight:500,color:selData.pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(selData.pnl)}</div>}
          </div>
          {!selData?(
            <div style={{fontSize:12,color:"var(--text4)",textAlign:"center",padding:"16px 0"}}>No trades on this day</div>
          ):(
            selData.trades.map(t=>{
              const {pnl,ticks,r}=calc(t);
              return(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                  <div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:500,color:"var(--text)"}}>{t.instrument}</span>
                      <span style={{fontSize:11,color:t.direction==="Long"?"var(--accent)":"#ff4d6d"}}>{t.direction==="Long"?"▲":"▼"} {t.direction}</span>
                      {t.emotion&&<span style={{fontSize:11}}>{t.emotion.split(" ")[0]}</span>}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <span className="tag">{t.strategy}</span>
                      <span className="tag">{t.outcome||"TP"}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:500,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</div>
                    <div style={{fontSize:11,color:"var(--text4)"}}>{ticks>=0?"+":""}{ticks} ticks{r!==null?` · ${r>=0?"+":""}${r}R`:""}</div>
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}

      {/* Goals shortcut */}
    </>
  );
}

/* ── Confetti ── */
function fireConfetti(){
  const colors=["#00e5a0","#ff4d6d","#f6ad55","#fff","#a78bfa"];
  const pieces=Array.from({length:60},(_,i)=>{
    const el=document.createElement("div");
    el.className="confetti-piece";
    el.style.left=Math.random()*100+"vw";
    el.style.top="-10px";
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius=Math.random()>0.5?"50%":"2px";
    el.style.width=(Math.random()*8+4)+"px";
    el.style.height=(Math.random()*8+4)+"px";
    el.style.animationDuration=(Math.random()*2+1.5)+"s";
    el.style.animationDelay=(Math.random()*0.5)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(3000));
    return el;
  });
}

/* ── Goals View ── */
function GoalsView({trades, goals, setGoals, fmt, calc, goalColour}){
  const [showAddGoal, setShowAddGoal] = useState(false);
  const [editGroupId, setEditGroupId] = useState(null);
  const [groupForm, setGroupForm] = useState({title:"", period:"Daily", targets:[]});
  const [newTarget, setNewTarget] = useState({type:"PnL", amount:""});

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const todayStr = now.toISOString().split("T")[0];

  const getPeriodTrades = (period, dateFrom, dateTo) => trades.filter(t=>{
    const d = new Date(t.date);
    if(period==="Daily") return t.date===todayStr;
    if(period==="Weekly") return d>=weekStart;
    if(period==="Monthly") return d>=monthStart;
    if(period==="Custom") {
      if(dateFrom && t.date < dateFrom) return false;
      if(dateTo && t.date > dateTo) return false;
      return true;
    }
    return true;
  });

  const getProgress = (type, period, dateFrom, dateTo) => {
    const pt = getPeriodTrades(period, dateFrom, dateTo);
    switch(type){
      case "PnL": return pt.reduce((s,t)=>s+calc(t).pnl,0);
      case "WinRate": { const w=pt.filter(t=>calc(t).pnl>0).length; return pt.length?Math.round(w/pt.length*100):0; }
      case "Trades": return pt.length;
      case "AvgR": { const rt=pt.filter(t=>calc(t).r!==null); return rt.length?Math.round(rt.reduce((s,t)=>s+calc(t).r,0)/rt.length*100)/100:0; }
      case "MaxLoss": return pt.length?Math.abs(Math.min(...pt.map(t=>calc(t).pnl),0)):0;
      default: return 0;
    }
  };

  const TYPES = [
    {k:"PnL",l:"Net P&L",unit:"$"},
    {k:"WinRate",l:"Win Rate",unit:"%"},
    {k:"Trades",l:"No. of Trades",unit:""},
    {k:"AvgR",l:"Avg R",unit:"R"},
    {k:"MaxLoss",l:"Max Loss",unit:"$"},
  ];

  const fmtVal = (type, val) => {
    switch(type){
      case "PnL": return fmt(val);
      case "WinRate": return `${val}%`;
      case "Trades": return `${val}`;
      case "AvgR": return `${val>=0?"+":""}${val}R`;
      case "MaxLoss": return `$${Math.abs(val).toFixed(0)}`;
      default: return val;
    }
  };

  const fmtTarget = (type, amt) => {
    switch(type){
      case "PnL": case "MaxLoss": return `$${amt}`;
      case "WinRate": return `${amt}%`;
      case "AvgR": return `${amt}R`;
      default: return `${amt}`;
    }
  };

  const getColor = (type, pct, progress) => {
    if(type==="MaxLoss") return pct<=100?"var(--accent)":"#ff4d6d";
    if(type==="PnL") return progress>=0?"var(--accent)":"#ff4d6d";
    // simple = just green/red, traffic = green/amber/red
    if(goalColour==="traffic"){
      return pct>=100?"#00e5a0":pct>=60?"#f6ad55":"#ff4d6d";
    }
    return pct>=100?"var(--accent)":"#ff4d6d";
  };

  const openNew = () => {
    setGroupForm({title:"", period:"Daily", targets:[]});
    setNewTarget({type:"PnL", amount:""});
    setEditGroupId(null);
    setShowAddGoal(true);
  };

  const addTargetToForm = () => {
    if(!newTarget.amount||isNaN(parseFloat(newTarget.amount))) return;
    setGroupForm(f=>({...f, targets:[...f.targets, {...newTarget, amount:parseFloat(newTarget.amount), id:Date.now()}]}));
    setNewTarget({type:"PnL", amount:""});
  };

  const saveGroup = () => {
    if(!groupForm.title||!groupForm.targets.length) return;
    if(editGroupId){
      setGoals(g=>g.map(gi=>gi.id===editGroupId?{...groupForm,id:editGroupId}:gi));
    } else {
      setGoals(g=>[...g,{...groupForm,id:Date.now()}]);
    }
    setShowAddGoal(false);
  };

  return(
    <>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
        <div className="section-title" style={{marginBottom:0}}>Goals</div>
        <button className="btn-primary" style={{width:"auto",padding:"8px 16px",fontSize:11}} onClick={openNew}>+ Add Goals</button>
      </div>

      {goals.length===0?(
        <div className="empty">
          <div style={{marginBottom:16}}>
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style={{opacity:0.4}}>
                  {/* Podium steps */}
                  <rect x="22" y="28" width="20" height="28" rx="2" stroke="#00e5a0" strokeWidth="2" fill="#00e5a0" fillOpacity="0.15"/>
                  <rect x="4" y="38" width="18" height="18" rx="2" stroke="#00e5a0" strokeWidth="2" fill="#00e5a0" fillOpacity="0.1" opacity="0.7"/>
                  <rect x="42" y="44" width="18" height="12" rx="2" stroke="#00e5a0" strokeWidth="2" fill="#00e5a0" fillOpacity="0.1" opacity="0.5"/>
                  {/* Numbers */}
                  <text x="32" y="22" textAnchor="middle" fontSize="10" fill="#00e5a0" fontWeight="bold">1</text>
                  <text x="13" y="34" textAnchor="middle" fontSize="9" fill="#00e5a0" fontWeight="bold" opacity="0.7">2</text>
                  <text x="51" y="40" textAnchor="middle" fontSize="9" fill="#00e5a0" fontWeight="bold" opacity="0.5">3</text>
                  {/* Crown on top */}
                  <path d="M26 16 L32 10 L38 16 L36 12 L32 15 L28 12 Z" fill="#00e5a0" opacity="0.8"/>
                </svg>
              </div>
          <div className="empty-title">No goals yet</div>
          <div className="empty-sub">Set targets to track your progress</div>
          <div style={{fontSize:12,color:"var(--text5)",marginBottom:24}}>Create a goal group to track multiple targets</div>
          <button className="btn-primary" style={{width:"auto",padding:"12px 32px",marginTop:8}} onClick={openNew}>+ Create Goals</button>
        </div>
      ):(
        goals.map(group=>{
          const allDone = (group.targets||[]).every(t=>{
            const progress = getProgress(t.type, group.period, group.dateFrom, group.dateTo);
            const pct = Math.round(Math.abs(progress)/t.amount*100);
            return t.type==="MaxLoss"?pct<=100:pct>=100;
          });
          return(
            <div key={group.id} className="stat-card" style={{marginBottom:12}}>
              {/* Group header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div>
                  <div style={{fontSize:15,color:"var(--text)",fontWeight:500,marginBottom:4}}>{group.title}</div>
                  <div style={{display:"flex",gap:6}}>
                    <span className="tag">{group.period==="Custom"&&group.dateFrom?`${group.dateFrom}→${group.dateTo||"now"}`:group.period}</span>
                    <span className="tag">{group.targets.length} target{group.targets.length!==1?"s":""}</span>
                    {allDone&&<span onClick={fireConfetti} style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:"var(--accent-bg)",color:"var(--accent)",letterSpacing:"0.08em",cursor:"pointer"}}>✓ ALL MET 🎉</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button className="btn-ghost" style={{padding:"4px 10px",fontSize:10}} onClick={()=>{setGroupForm({...group});setEditGroupId(group.id);setNewTarget({type:"PnL",amount:""});setShowAddGoal(true);}}>Edit</button>
                  <button onClick={()=>setGoals(g=>g.filter(gi=>gi.id!==group.id))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:18,padding:"2px 4px"}} onMouseEnter={e=>e.target.style.color="#ff4d6d"} onMouseLeave={e=>e.target.style.color="var(--text5)"}>×</button>
                </div>
              </div>
              {/* Individual targets */}
              {(group.targets||[]).map((target,i)=>{
                const progress = getProgress(target.type, group.period);
                const rawPct = Math.round(Math.abs(progress)/target.amount*100);
                const pct = Math.min(rawPct, 100);
                const col = getColor(target.type, rawPct, progress);
                const typeInfo = TYPES.find(t=>t.k===target.type);
                return(
                  <div key={target.id||i} style={{marginBottom:i<group.targets.length-1?14:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <span style={{fontSize:11,color:"var(--text3)"}}>{(typeInfo&&typeInfo.l)}</span>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:11,color:col}}>{fmtVal(target.type,progress)}</span>
                        <span style={{fontSize:10,color:"var(--text4)"}}>/ {fmtTarget(target.type,target.amount)}</span>
                        <span style={{fontSize:11,fontWeight:500,color:col}}>{rawPct}%</span>
                      </div>
                    </div>
                    <div style={{height:5,background:"var(--tag-bg)",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:(pct)+"%",background:col,borderRadius:3,transition:"width 0.5s"}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })
      )}

      {/* Add/Edit Group Sheet */}
      {showAddGoal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"flex-end"}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowAddGoal(false);}}>
          <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px",width:"100%",paddingBottom:`calc(100px + env(safe-area-inset-bottom))`,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",lineHeight:1.3,paddingBottom:2}}>{editGroupId?"Edit Goals":"New Goals"}</div>
              <button onClick={()=>setShowAddGoal(false)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>
            </div>

            {/* Title */}
            <div className="field-group">
              <label className="field-label">Group Title</label>
              <input className="field-input" placeholder="e.g. Daily Targets" value={groupForm.title}
                onChange={e=>setGroupForm(f=>({...f,title:e.target.value}))}/>
            </div>

            {/* Period */}
            <div className="field-group">
              <label className="field-label">Period</label>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {["Daily","Weekly","Monthly","All Time","Custom"].map(p=>(
                  <button key={p} onClick={()=>setGroupForm(f=>({...f,period:p}))}
                    style={{flex:1,padding:"10px 4px",border:"1px solid "+(groupForm.period===p?"var(--accent-dim)":"var(--border2)"),borderRadius:8,cursor:"pointer",fontSize:10,fontFamily:"'DM Mono',monospace",
                      background:groupForm.period===p?"var(--accent-bg)":"var(--surface2)",
                      color:groupForm.period===p?"var(--accent)":"var(--text4)",transition:"all 0.15s",minWidth:60}}>{p}</button>
                ))}
              </div>
              {groupForm.period==="Custom"&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
                  <div>
                    <label className="field-label">From</label>
                    <input type="date" className="field-input" value={groupForm.dateFrom||""} onChange={e=>setGroupForm(f=>({...f,dateFrom:e.target.value}))}/>
                  </div>
                  <div>
                    <label className="field-label">To</label>
                    <input type="date" className="field-input" value={groupForm.dateTo||""} onChange={e=>setGroupForm(f=>({...f,dateTo:e.target.value}))}/>
                  </div>
                </div>
              )}
            </div>

            {/* Targets — all inline */}
            <div className="field-group">
              <label className="field-label">Targets — fill in what you want to track</label>
              {TYPES.map(o=>{
                const existing = groupForm.targets.find(t=>t.type===o.k);
                return(
                  <div key={o.k} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <div style={{flex:1,fontSize:12,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{o.l}</div>
                    <NumberInput
                      placeholder={o.unit==="$"?"e.g. 1,000":o.unit==="%"?"e.g. 60":o.unit==="R"?"e.g. 1.5":"e.g. 5"}
                      className="field-input"
                      style={{width:110,flexShrink:0}}
                      value={existing?existing.amount:""}
                      onChange={e=>{
                        const val = e.target.value;
                        if(!val){
                          setGroupForm(f=>({...f,targets:f.targets.filter(t=>t.type!==o.k)}));
                        } else {
                          setGroupForm(f=>({
                            ...f,
                            targets: existing
                              ? f.targets.map(t=>t.type===o.k?{...t,amount:parseFloat(val)||0}:t)
                              : [...f.targets,{type:o.k,amount:parseFloat(val)||0,id:Date.now()+Math.random()}]
                          }));
                        }
                      }}
                    />
                    <span style={{fontSize:11,color:"var(--text4)",width:20,flexShrink:0}}>{o.unit||"#"}</span>
                  </div>
                );
              })}
            </div>

            <button className="btn-primary" style={{marginTop:4}} onClick={(e)=>{e.stopPropagation();saveGroup();}}>
              {editGroupId?"Update Goals":"Save Goals"}
            </button>
          </div>
        </div>
      )}
    </>
  );
}

/* ── Number Input with comma formatting ── */
function NumberInput({value, onChange, placeholder, className, style, step}){
  const [display, setDisplay] = React.useState(value||"");

  React.useEffect(()=>{
    if(document.activeElement!==inputRef.current){
      setDisplay(value?Number(value).toLocaleString("en-GB"):"");
    }
  },[value]);

  const inputRef = React.useRef(null);

  const handleChange = (e) => {
    const raw = e.target.value.replace(/,/g,"");
    if(raw===""||raw==="-"||/^-?\d*\.?\d*$/.test(raw)){
      setDisplay(raw);
      onChange({target:{value:raw}});
    }
  };

  const handleBlur = () => {
    const num = parseFloat(display.replace(/,/g,""));
    if(!isNaN(num)) setDisplay(num.toLocaleString("en-GB"));
  };

  const handleFocus = () => {
    setDisplay(display.replace(/,/g,""));
  };

  return(
    <input
      ref={inputRef}
      type="text"
      inputMode="decimal"
      placeholder={placeholder}
      className={className}
      style={style}
      value={display}
      onChange={handleChange}
      onBlur={handleBlur}
      onFocus={handleFocus}
    />
  );
}

/* ── Swipe Actions ── */
function SwipeToDelete({children, onDelete, onEdit}){
  const [offset, setOffset] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const startX = useRef(0);
  const startY = useRef(0);
  const isDragging = useRef(false);
  const THRESHOLD = 80;

  const onTouchStart = e => {
    if(offset !== 0) { setOffset(0); setSwiping(false); return; }
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    isDragging.current = false;
  };

  const onTouchMove = e => {
    const dx = e.touches[0].clientX - startX.current;
    const dy = e.touches[0].clientY - startY.current;
    if(!isDragging.current && Math.abs(dy) > Math.abs(dx)) return;
    isDragging.current = true;
    setSwiping(true);
    setOffset(Math.max(-140, Math.min(100, dx)));
    e.preventDefault();
  };

  const onTouchEnd = () => {
    if(offset < -THRESHOLD){
      setOffset(-140);
      setTimeout(()=>{ onDelete(); setOffset(0); setSwiping(false); }, 200);
    } else if(offset > THRESHOLD && onEdit){
      setOffset(0);
      setSwiping(false);
      onEdit();
    } else {
      setOffset(0);
      setSwiping(false);
    }
    isDragging.current = false;
  };

  return(
    <div className="swipe-wrap">
      {/* Edit bg (right swipe) */}
      {onEdit&&<div style={{position:"absolute",inset:0,background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"flex-start",paddingLeft:20,borderRadius:10}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <span style={{fontSize:9,color:"white",letterSpacing:"0.1em",textTransform:"uppercase"}}>Edit</span>
        </div>
      </div>}
      {/* Delete bg (left swipe) */}
      <div className="swipe-delete-bg">
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>

      case "1 Day": return trades.filter(t=>t.date===today);
      case "1 Week": return trades.filter(t=>new Date(t.date)>=week);

    if(filterOutcome&&filterOutcome!=="All"){
      filtered = filtered.filter(t=>{
        const o = t.outcome||"TP";
        return o===filterOutcome;
      });
    }
    if(filterInstrument&&filterInstrument!=="All"){
      filtered = filtered.filter(t=>t.instrument===filterInstrument);
    }
    const q = (searchQuery||"").trim().toLowerCase();
    if(q){
      filtered = filtered.filter(t=>
        (t.notes||"").toLowerCase().includes(q)||
        (t.instrument||"").toLowerCase().includes(q)||
        (t.strategy||"").toLowerCase().includes(q)||
        (t.session||"").toLowerCase().includes(q)||
        (t.emotion||"").toLowerCase().includes(q)
      );
    }

    // Sort newest first
    filtered.sort((a,b)=>(b.date||"").localeCompare(a.date||""));

    // Group by date
    const groups={};
    filtered.forEach(t=>{
      const key = t.date||"Unknown";
      if(!groups[key]) groups[key]=[];
      groups[key].push(t);
    });

    return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
  },[trades, filterOutcome, filterInstrument, searchQuery]);

  const stats=useMemo(()=>{
    const c=trades.map(t=>({...t,...calc(t)}));
    const wins=c.filter(t=>t.pnl>0),losses=c.filter(t=>t.pnl<0);
    const totalPnl=c.reduce((s,t)=>s+t.pnl,0);
    const winRate=c.length?(wins.length/c.length)*100:0;
    const avgWin=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((s,t)=>s+t.pnl,0)/losses.length:0;
    const pf=Math.abs(avgLoss)>0?avgWin/Math.abs(avgLoss):0;
    const best=c.length?Math.max(...c.map(t=>t.pnl)):0;
    const worst=c.length?Math.min(...c.map(t=>t.pnl)):0;
    const rT=c.filter(t=>t.r!==null);
    const avgR=rT.length?rT.reduce((s,t)=>s+t.r,0)/rT.length:0;
    let run=0;
    const equity=[...trades].sort((a,b)=>a.date.localeCompare(b.date)).map(t=>{run+=calc(t).pnl;return{eq:run};});

    // By session
    const bySess={};
    trades.forEach(t=>{const{pnl}=calc(t);if(!bySess[t.session])bySess[t.session]={pnl:0,count:0,wins:0};bySess[t.session].pnl+=pnl;bySess[t.session].count++;if(pnl>0)bySess[t.session].wins++;});

    // By strategy
    const bySt={};
    trades.forEach(t=>{const{pnl}=calc(t);if(!bySt[t.strategy])bySt[t.strategy]={pnl:0,count:0,wins:0};bySt[t.strategy].pnl+=pnl;bySt[t.strategy].count++;if(pnl>0)bySt[t.strategy].wins++;});

    const DAYS_ORDER=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    const byDay={};
    DAYS_ORDER.forEach(d=>byDay[d]={pnl:0,count:0,wins:0,lastDate:""});
    trades.forEach(t=>{
      const d=new Date(t.date+"T12:00:00");
      const day=DAYS_ORDER[d.getDay()===0?6:d.getDay()-1];
      const{pnl}=calc(t);
      byDay[day].pnl+=pnl;
      byDay[day].count++;
      if(pnl>0)byDay[day].wins++;
      if(!byDay[day].lastDate||t.date>byDay[day].lastDate) byDay[day].lastDate=t.date;
    });

    const streak=getStreak(trades);
    const byInst={};
    trades.forEach(t=>{const{pnl}=calc(t);if(!byInst[t.instrument])byInst[t.instrument]={pnl:0,count:0,wins:0};byInst[t.instrument].pnl+=pnl;byInst[t.instrument].count++;if(pnl>0)byInst[t.instrument].wins++;});

    return{totalPnl,winRate,wins:wins.length,losses:losses.length,total:c.length,avgWin,avgLoss,pf,best,worst,avgR,equity,bySess,bySt,byDay,byInst,streak};
  },[trades]);

  const TICKER_KEY = "logged_ticker_v1";
  const CHECKLIST_KEY = "logged_checklist_v1";

  const ALL_STATS = ["Net P&L","Win Rate","Return","Profit Factor","Avg R","Total R","Trades","Streak","Avg Win","Avg Loss","Best Trade","Worst Trade"];

  const [goals, setGoals] = useState(()=>{try{

  const contentRef = useRef(null);
  const pullStartY = useRef(0);
  const pullActive = useRef(false);

  useEffect(()=>{localStorage.setItem(GOALS_KEY,JSON.stringify(goals));},[goals]);

  const getStatVal = (key) => {
    const p = stats.totalPnl;
    switch(key){
      case "Net P&L": return {val:fmt(p),col:p>=0?"var(--accent)":"#ff4d6d"};
      case "Win Rate": return {val:`${stats.winRate.toFixed(1)}%`,col:"var(--text)"};
      case "Return": return balance>0?{val:`${p>=0?"+":""}${((p/balance)*100).toFixed(2)}%`,col:p>=0?"var(--accent)":"#ff4d6d"}:{val:"—",col:"var(--text4)"};
      case "Profit Factor": return {val:stats.pf.toFixed(2),col:"var(--text)"};
      case "Avg R": return {val:stats.avgR?`${stats.avgR>=0?"+":""}${stats.avgR.toFixed(2)}R`:"—",col:stats.avgR>=0?"var(--accent)":"#ff4d6d"};
      case "Total R": {const rT=trades.filter(t=>calc(t).r!==null);const tot=Math.round(rT.reduce((s,t)=>s+(calc(t).r||0),0)*100)/100;return {val:rT.length?`${tot>=0?"+":""}${tot}R`:"—",col:tot>=0?"var(--accent)":"#ff4d6d"};}
      case "Trades": return {val:stats.total,col:"var(--text)"};
      case "Streak": return {val:stats.streak.count>0?`${stats.streak.count}${stats.streak.type}`:"—",col:stats.streak.type==="W"?"var(--accent)":"#ff4d6d"};
      case "Avg Win": return {val:fmts(stats.avgWin),col:"#00e5a0"};
      case "Avg Loss": return {val:fmts(stats.avgLoss),col:"#ff4d6d"};
      case "Best Trade": return {val:fmt(stats.best),col:"#00e5a0"};
      case "Worst Trade": return {val:fmt(stats.worst),col:"#ff4d6d"};
      case "Balance": return balance>0?{val:`${curr.symbol}${(balance+stats.totalPnl).toLocaleString(curr.locale,{minimumFractionDigits:0,maximumFractionDigits:0})}`,col:stats.totalPnl>=0?"var(--accent)":"#ff4d6d"}:{val:"—",col:"var(--text4)"};
      default: return {val:"—",col:"var(--text4)"};
    }
  };

  const curr = CURRENCIES.find(c=>c.code===currency)||CURRENCIES[0];
  const fmt = n=>`${n>=0?"+":"-"}${curr.symbol}${Math.abs(n).toLocaleString(curr.locale,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const fmts = n=>`${curr.symbol}${Math.abs(n).toLocaleString(curr.locale,{minimumFractionDigits:0,maximumFractionDigits:0})}`;

          <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px",width:"100%",paddingBottom:`calc(40px + env(safe-area-inset-bottom))`}}>

      {showProfile&&(

          <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px",width:"100%",paddingBottom:`calc(20px + env(safe-area-inset-bottom))`,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>

                <div style={{fontSize:18,color:"var(--text)",fontWeight:500,marginBottom:2}}>{traderName}</div>

      {/* Content */}
      <div className="content" ref={contentRef} onTouchStart={e=>{pullStartY.current=e.touches[0].clientY;pullActive.current=(contentRef.current&&contentRef.current.scrollTop)===0;}} onTouchMove={e=>{if(!pullActive.current)return;const dy=e.touches[0].clientY-pullStartY.current;if(dy>60&&(contentRef.current&&contentRef.current.scrollTop)===0){setPullRefresh(true);}}} onTouchEnd={()=>{if(pullRefresh){setTimeout(()=>setPullRefresh(false),800);}pullActive.current=false;}}>

                  {isIOS

                </p>
                {!isIOS&&deferredPrompt&&(
                  <button onClick={async()=>{deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==="accepted")dismissInstall();}}>Install</button>
                )}
                {isIOS&&<button onClick={dismissInstall}>Got it</button>}
              </div>

            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:12}}>
              <div className="section-title" style={{marginBottom:0}}>Trade Log</div>

                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace"}}>Filter</span>
                {(filterOutcome!=="All"||filterInstrument!=="All"||searchQuery)&&<div style={{position:"absolute",top:-3,right:-3,width:8,height:8,borderRadius:"50%",background:"var(--accent)"}}/>}
              </button>
            </div>

            {/* Search & Filter panel */}
            {showSearch&&(
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px",marginBottom:14}}>
                {/* Search */}
                <input className="field-input" placeholder="Search notes, instrument, strategy..." value={searchQuery}
                  onChange={e=>setSearchQuery(e.target.value)}

                {/* Outcome filter */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Outcome</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {["All","TP","SL","BE"].map(o=>(
                      <button key={o} onClick={()=>setFilterOutcome(o)} style={{padding:"5px 12px",border:"1px solid "+(filterOutcome===o?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:filterOutcome===o?"var(--accent-bg)":"var(--input-bg)",color:filterOutcome===o?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{o}</button>
                    ))}
                  </div>
                </div>

                {/* Instrument filter */}
                <div>
                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Instrument</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button onClick={()=>setFilterInstrument("All")} style={{padding:"5px 12px",border:"1px solid "+(filterInstrument==="All"?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:filterInstrument==="All"?"var(--accent-bg)":"var(--input-bg)",color:filterInstrument==="All"?"var(--accent)":"var(--text4)"}}>All</button>
                    {INSTRUMENTS.filter(i=>trades.some(t=>t.instrument===i.symbol)).map(i=>(
                      <button key={i.symbol} onClick={()=>setFilterInstrument(i.symbol)} style={{padding:"5px 12px",border:"1px solid "+(filterInstrument===i.symbol?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:filterInstrument===i.symbol?"var(--accent-bg)":"var(--input-bg)",color:filterInstrument===i.symbol?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{i.symbol}</button>
                    ))}
                  </div>
                </div>

                {(searchQuery||filterOutcome!=="All"||filterInstrument!=="All")&&(
                  <button onClick={()=>{setSearchQuery("");setFilterOutcome("All");setFilterInstrument("All");}} style={{marginTop:10,background:"none",border:"none",color:"var(--text4)",fontSize:11,fontFamily:"'DM Mono',monospace",cursor:"pointer",textDecoration:"underline"}}>Clear all</button>

            {/* Consecutive loss warning */}
            {stats.streak.type==="L"&&stats.streak.count>=2&&(
              <div style={{background:"#ff4d6d12",border:"1px solid #ff4d6d30",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:22}}>⚠️</span>
                <div>
                  <div style={{fontSize:13,color:"#ff4d6d",fontWeight:500,marginBottom:2}}>{stats.streak.count} losses in a row</div>
                  <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>Consider stepping away. Protect your capital.</div>
                </div>
              </div>
            )}

            {/* Daily trade limit warning */}
            {dailyTradeLimit>0&&(()=>{
              const todayTrades = trades.filter(t=>t.date===new Date().toISOString().split("T")[0]);
              if(todayTrades.length>=dailyTradeLimit) return(
                <div style={{background:"#f6ad5512",border:"1px solid #f6ad5530",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                  <span style={{fontSize:22}}>🚫</span>
                  <div>
                    <div style={{fontSize:13,color:"#f6ad55",fontWeight:500,marginBottom:2}}>Daily trade limit reached</div>

                  </div>
                </div>
              );
              return null;
            })()}

            {/* Max daily loss warning */}
            {maxDailyLoss>0&&(()=>{
              const todayPnl = trades.filter(t=>t.date===new Date().toISOString().split("T")[0]).reduce((s,t)=>s+calc(t).pnl,0);
              if(todayPnl<=-maxDailyLoss) return(
                <div style={{background:"#ff4d6d12",border:"1px solid #ff4d6d40",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                  <span style={{fontSize:22}}>🛑</span>
                  <div>
                    <div style={{fontSize:13,color:"#ff4d6d",fontWeight:500,marginBottom:2}}>Max daily loss hit — STOP TRADING</div>
                    <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>You've lost {curr.symbol}{Math.abs(todayPnl).toFixed(0)} today. Walk away.</div>
                  </div>
                </div>
              );
              return null;
            })()}

            {trades.length===0?(
              <div className="empty">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style={{marginBottom:16,opacity:0.4}}>

                  <rect x="20" y="30" width="10" height="30" rx="2" fill="#00e5a0" opacity="0.7"/>
                  <rect x="36" y="18" width="10" height="42" rx="2" fill="#00e5a0" opacity="0.5"/>
                  <rect x="52" y="8" width="10" height="52" rx="2" fill="#00e5a0" opacity="0.3"/>
                  <polyline points="9,36 25,22 41,28 57,8" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                  <circle cx="9" cy="36" r="3" fill="#00e5a0"/>
                  <circle cx="25" cy="22" r="3" fill="#00e5a0"/>
                  <circle cx="41" cy="28" r="3" fill="#00e5a0"/>
                  <circle cx="57" cy="8" r="3" fill="#00e5a0"/>
                </svg>
                <div className="empty-title">No trades yet</div>
                <div className="empty-sub">Tap + Log to get started</div>
                <button className="btn-primary" style={{width:"auto",padding:"12px 28px"}} onClick={()=>setView("add")}>+ Log Trade</button>
              </div>
            ):groupedTrades.length===0?(
              <div className="empty">
                <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style={{marginBottom:16,opacity:0.35}}>
                  <circle cx="24" cy="24" r="16" stroke="#00e5a0" strokeWidth="2.5"/>
                  <line x1="35" y1="35" x2="50" y2="50" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round"/>
                  <line x1="18" y1="24" x2="30" y2="24" stroke="#00e5a0" strokeWidth="2" strokeLinecap="round"/>
                  <line x1="24" y1="18" x2="24" y2="30" stroke="#00e5a0" strokeWidth="2" strokeLinecap="round" opacity="0.4"/>
                </svg>
                <div className="empty-title">No matches</div>
                <div className="empty-sub">No trades match your current filters</div>
                <button className="btn-primary" style={{width:"auto",padding:"12px 28px"}} onClick={()=>{setSearchQuery("");setFilterOutcome("All");setFilterInstrument("All");}}>Clear Filters</button>
              </div>
            ):(
              groupedTrades.map(([date, dayTrades])=>{
                const dp=dayPnl(dayTrades);
                return(
                  <div key={date}>
                    <div className="date-sep">
                      <span>{formatDate(date)}</span>
                      <span style={{color:dp>=0?"#00e5a060":"#ff4d6d60",fontSize:11}}>{fmt(dp)}</span>
                    </div>
                    {dayTrades.map(trade=>{
                      const {pnl,ticks,r}=calc(trade);
                      const imgs=trade.images||[];
                      const isExp=expanded===trade.id;
                      return(
                        <SwipeToDelete key={trade.id} onDelete={()=>confirmDelete(trade.id)} onEdit={()=>edit(trade)}>
                        <div className="trade-card">
                          <div className="trade-card-header" onClick={()=>setExpanded(isExp?null:trade.id)}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                                <span style={{fontSize:13,fontWeight:500,color:"var(--text)"}}>{trade.instrument}</span>
                                <span style={{fontSize:11,color:trade.direction==="Long"?"var(--accent)":"#ff4d6d"}}>{trade.direction==="Long"?"▲ Long":"▼ Short"}</span>
                                <span style={{fontSize:11,color:"var(--text3)"}}>{trade.contracts}x</span>
                                {trade.outcome&&<span style={{fontSize:9,letterSpacing:"0.08em",padding:"2px 6px",borderRadius:4,background:
                                  trade.outcome==="SL"?"#ff4d6d20":trade.outcome==="BE"?"#71809620":"var(--accent-bg)",
                                  color:trade.outcome==="SL"?"#ff4d6d":trade.outcome==="BE"?"var(--text3)":"var(--accent)"}}>
                                  {trade.outcome==="SL"?"● SL":trade.outcome==="BE"?"● BE":"● TP"}
                                </span>}
                                {imgs.length>0&&<span style={{fontSize:10,color:"var(--text3)"}}>📷{imgs.length}</span>}
                                {trade.emotion&&<span style={{fontSize:10,color:"var(--text3)"}}>{trade.emotion.split(" ")[0]}</span>}
                                {trade.checklist&&trade.checklist.length>0&&(
                                  <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background: trade.checklist.length===checklistItems.length?"#00e5a020":"var(--border)",color:trade.checklist.length===checklistItems.length?"var(--accent)":"var(--text3)",letterSpacing:"0.05em"}}>
                                    ✓ {trade.checklist.length}/{checklistItems.length}
                                  </span>
                                )}
                              </div>
                              <div style={{display:"flex",gap:16}}>
                                <div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>P&L</div>
                                  <div style={{fontSize:16,fontWeight:500,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</div>
                                </div>
                                <div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Ticks</div>
                                  <div style={{fontSize:16,color:ticks>=0?"var(--accent)":"#ff4d6d"}}>{ticks>=0?"+":""}{ticks}</div>
                                </div>
                                {r!==null&&<div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>R</div>
                                  <div style={{fontSize:16,color:r>=0?"#00e5a060":"#ff4d6d60"}}>{r>=0?"+":""}{r}R</div>
                                </div>}
                              </div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontSize:10,color:"var(--text5)"}}>{isExp?"▲":"▼"}</div>
                            </div>
                          </div>

                          {isExp&&(
                            <div className="trade-card-body" style={{paddingTop:12}}>
                              <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
                                <div style={{flex:1,minWidth:60}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Entry</div>
                                  <div style={{fontSize:13,color:"var(--text2)"}}>{parseFloat(trade.entry).toFixed(2)}</div>
                                </div>
                                {(trade.tps||[]).filter(tp=>tp.price).map((tp,i)=>(
                                  <div key={i} style={{flex:1,minWidth:60}}>
                                    <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>TP{i+1}{i===(trade.tps.filter(tp=>tp.price).length-1)?" (Final)":""}</div>
                                    <div style={{fontSize:13,color:"#00e5a080"}}>{parseFloat(tp.price).toFixed(2)}</div>
                                    <div style={{fontSize:10,color:"var(--text4)"}}>{tp.contracts} ct</div>
                                  </div>
                                ))}
                                {/* Legacy single exit */}
                                {(!trade.tps||trade.tps.length===0)&&trade.exit&&(
                                  <div style={{flex:1,minWidth:60}}>
                                    <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Take Profit</div>
                                    <div style={{fontSize:13,color:"var(--text2)"}}>{parseFloat(trade.exit).toFixed(2)}</div>
                                  </div>
                                )}
                                {trade.stop&&<div style={{flex:1,minWidth:60}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Stop</div>
                                  <div style={{fontSize:13,color:"#ff4d6d80"}}>{parseFloat(trade.stop).toFixed(2)}</div>
                                </div>}
                              </div>

                              <div className="trade-meta">
                                <span className="tag">{trade.strategy}</span>
                                <span className="tag">{trade.setup}</span>
                                {trade.session&&<span className="tag">{trade.session}</span>}
                                {trade.emotion&&<span className="tag">{trade.emotion}</span>}
                              </div>

                              {trade.notes&&<div style={{marginTop:10,fontSize:12,color:"var(--text2)",lineHeight:1.7}}>{trade.notes}</div>}

                              {trade.checklist&&trade.checklist.length>0&&(
                                <div style={{marginTop:10}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Pre-Trade Checklist</div>
                                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                                    {checklistItems.map((item,i)=>{
                                      const checked=(trade.checklist||[]).includes(item);
                                      return(
                                        <span key={i} style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:checked?"var(--accent-bg)":"var(--surface2)",color:checked?"#00e5a0":"var(--text5)",border:"1px solid "+(checked?"#00e5a030":"var(--border)")}}>
                                          {checked?"✓":"✗"} {item}
                                        </span>
                                      );
                                    })}
                                  </div>
                                </div>
                              )}

                              {imgs.length>0&&(
                                <div style={{marginTop:10}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Charts — tap to enlarge</div>
                                  <div className="thumb-row">
                                    {imgs.map((img,i)=>(
                                      <div key={img.id} style={{cursor:"pointer"}} onClick={()=>setLightbox({images:imgs,start:i})}>
                                        <img src={img.dataUrl} alt="" style={{width:80,height:56,objectFit:"cover",borderRadius:6,border:"1px solid var(--border)"}}/>
                                        {img.label&&<div style={{fontSize:8,color:"var(--text4)",textAlign:"center",marginTop:2,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{img.label}</div>}
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}

                              <div style={{display:"flex",gap:8,marginTop:12}}>
                                <button className="btn-ghost" style={{flex:1}} onClick={()=>edit(trade)}>Edit</button>
                                <button className="btn-danger" style={{flex:1}} onClick={()=>confirmDelete(trade.id)}>Delete</button>
                              </div>
                            </div>
                          )}
                        </div>
                        </SwipeToDelete>
                      );
                    })}
                  </div>
                );
              })
            )}
          </>
        )}

        {/* ADD / EDIT */}
        {view==="add"&&(
          <div>
            <div className="section-title">{editId?"Edit Trade":"Log Trade"}</div>

            <div className="grid2">
              <div className="field-group">
                <label className="field-label">Date</label>
                <input type="date" className="field-input" value={form.date} onChange={setF("date")}/>
              </div>
              <div className="field-group">
                <label className="field-label">Instrument</label>
                <select className="field-input" value={form.instrument} onChange={setF("instrument")}>
                  {INSTRUMENTS.map(i=><option key={i.symbol} value={i.symbol}>{i.symbol} ({i.name})</option>)}
                </select>
              </div>
            </div>

            <div className="field-group">
              <label className="field-label">Direction</label>
              <div style={{display:"flex",gap:10}}>
                <button className={`dir-btn${form.direction==="Long"?" long-active":""}`} onClick={()=>setFv("direction","Long")}>▲ Long</button>
                <button className={`dir-btn${form.direction==="Short"?" short-active":""}`} onClick={()=>setFv("direction","Short")}>▼ Short</button>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 2fr",gap:12}}>
              <div className="field-group">
                <label className="field-label">Qty</label>
                <input type="number" inputMode="numeric" className="field-input" value={form.contracts}
                  onChange={e=>setFv("contracts",e.target.value===""?"":parseInt(e.target.value)||1)}
                  onBlur={e=>setFv("contracts",parseInt(e.target.value)||1)}/>
              </div>
              <div className="field-group">
                <label className="field-label">Entry</label>
                <NumberInput placeholder="0.00" className="field-input" value={form.entry} onChange={setF("entry")}/>
              </div>
              <div className="field-group">
                <label className="field-label">Stop</label>
                <NumberInput placeholder="0.00" className="field-input" value={form.stop} onChange={setF("stop")}/>
              </div>
            </div>

            {/* Take Profit levels */}
            <div className="field-group">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <label className="field-label" style={{margin:0}}>Take Profit</label>
                {(form.tps||[]).length < 5 && (
                  <button onClick={()=>setForm(f=>({...f,tps:[...(f.tps||[]),{price:"",contracts:""}]}))}
                    style={{background:"none",border:"1px solid var(--accent-dim)",borderRadius:6,padding:"3px 10px",color:"var(--accent)",fontSize:11,fontFamily:"'DM Mono',monospace",cursor:"pointer"}}>
                    + Add TP
                  </button>
                )}
              </div>
              {(form.tps||[{price:"",contracts:""}]).map((tp,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                  {(form.tps||[]).length>1&&<div style={{width:28,fontSize:10,color:"var(--text4)",letterSpacing:"0.05em",flexShrink:0}}>TP{i+1}</div>}
                  <NumberInput placeholder="Price" className="field-input" style={{flex:2}}
                    value={tp.price} onChange={e=>setForm(f=>({...f,tps:(f.tps||[]).map((t,j)=>j===i?{...t,price:e.target.value}:t)}))}/>
                  {(form.tps||[]).length>1&&(
                    <>
                      <input type="number" inputMode="numeric" placeholder="Qty" className="field-input" style={{flex:1}}
                        value={tp.contracts} onChange={e=>setForm(f=>({...f,tps:(f.tps||[]).map((t,j)=>j===i?{...t,contracts:e.target.value}:t)}))}/>
                      <button onClick={()=>setForm(f=>({...f,tps:f.tps.filter((_,j)=>j!==i)}))}
                        style={{background:"none",border:"none",color:"var(--text5)",fontSize:18,cursor:"pointer",padding:"0 4px",flexShrink:0}} onMouseEnter={e=>e.target.style.color="#ff4d6d"} onMouseLeave={e=>e.target.style.color="var(--text5)"}>×</button>
                    </>
                  )}
                </div>
              ))}
              {(form.tps||[]).length>1&&(()=>{
                const inst=INSTRUMENTS.find(i=>i.symbol===form.instrument);
                const filledTps=(form.tps||[]).filter(tp=>tp.price&&tp.contracts);
                if(!inst||filledTps.length<2) return null;
                const total=filledTps.reduce((s,tp)=>s+(parseInt(tp.contracts)||0),0);
                const wAvg=filledTps.reduce((s,tp)=>s+(parseFloat(tp.price)||0)*(parseInt(tp.contracts)||0),0)/total;
                return <div style={{fontSize:10,color:"var(--text4)",marginTop:4}}>Avg exit: <span style={{color:"var(--text2)"}}>{wAvg.toFixed(2)}</span> across {total} contracts</div>;
              })()}
            </div>

            <div className="field-group">
              <label className="field-label">Outcome</label>
