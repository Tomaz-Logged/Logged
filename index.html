<script id="app-source" type="text/babel-source">
const { useState, useEffect, useMemo, useRef } = React;

const INSTRUMENTS = [
  { symbol:"ES", name:"E-mini S&P 500", tickSize:0.25, tickValue:12.5 },
  { symbol:"MES", name:"Micro E-mini S&P", tickSize:0.25, tickValue:1.25 },
  { symbol:"NQ", name:"E-mini Nasdaq-100", tickSize:0.25, tickValue:5 },
  { symbol:"MNQ", name:"Micro Nasdaq-100", tickSize:0.25, tickValue:0.5 },
  { symbol:"YM", name:"E-mini Dow Jones", tickSize:1, tickValue:5 },
  { symbol:"MYM", name:"Micro E-mini Dow", tickSize:1, tickValue:0.5 },
  { symbol:"GC", name:"Gold", tickSize:0.10, tickValue:10 },
  { symbol:"MGC", name:"Micro Gold", tickSize:0.10, tickValue:1 },
  { symbol:"CL",  name:"Crude Oil",       tickSize:0.01, tickValue:10 },
  { symbol:"MCL", name:"Micro Crude Oil",  tickSize:0.01, tickValue:1  },
  { symbol:"SI", name:"Silver", tickSize:0.005, tickValue:25 },
];
const STRATEGIES = ["Breakout","Trend Continuation","Mean Reversion","VWAP Reclaim","Opening Range","Failed Auction","News Catalyst","Other"];
const SESSIONS = ["Asia","London","New York"];
const TRADE_TYPES = ["Scalp","Day Trade","Swing","News Play"];
const SETUPS = ["A+","A","B","C"];
const EMOTIONS = ["😌 Calm","💪 Confident","😰 Anxious","😤 Frustrated","🤑 Greedy","😨 FOMO","😡 Revenge","🎯 Focused"];
const STORAGE_KEY = "logged_v1";
const BALANCE_KEY = "logged_balance_v1";
const ACCOUNTS_KEY = "logged_accounts_v1";

const DEFAULT_ACCOUNT = {id:"default", name:"Main Account", colour:"#00e5a0"};
const ACCOUNT_COLOURS = ["#00e5a0","#f6ad55","#a78bfa","#ff4d6d","#60a5fa"];
const CURRENCY_KEY = "logged_currency_v1";
const THEME_KEY = "logged_theme_v1";
const GOAL_COLOUR_KEY = "logged_goal_colour_v1";
const GOALS_KEY = "logged_goals_v1";
const CURRENCIES = [
  {code:"USD", symbol:"$", locale:"en-US"},
  {code:"GBP", symbol:"£", locale:"en-GB"},
  {code:"EUR", symbol:"€", locale:"de-DE"},
];

function calc(t) {
  const inst = INSTRUMENTS.find(i=>i.symbol===t.instrument);
  if(!inst||!t.entry) return {pnl:0,ticks:0,r:null,avgExit:null};
  const dir = t.direction==="Long"?1:-1;

  // SL outcome — use stop price
  if(t.outcome==="SL"&&t.stop&&parseFloat(t.stop)) {
    const ticks = dir*(parseFloat(t.stop)-parseFloat(t.entry))/inst.tickSize;
    const contracts = parseFloat(t.contracts)||1;
    const pnl = ticks*inst.tickValue*contracts;
    const r = -1;
    return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:parseFloat(t.stop)};
  }

  // Breakeven outcome
  if(t.outcome==="BE") {
    return {pnl:0, ticks:0, r:0, avgExit:parseFloat(t.entry)};
  }

  const contracts = parseFloat(t.contracts)||1;
  const tps = (t.tps||[]).filter(tp=>tp.price).map(tp=>({
    ...tp,
    contracts: parseFloat(tp.contracts)||contracts
  }));

  // Legacy: old trade with exit field
  if(!tps.length && t.exit) {
    const ticks = dir*(parseFloat(t.exit)-parseFloat(t.entry))/inst.tickSize;
    const pnl = ticks*inst.tickValue*(parseInt(t.contracts)||1);
    const st = t.stop ? Math.abs(parseFloat(t.entry)-parseFloat(t.stop))/inst.tickSize : null;
    const r = st ? Math.round(ticks/st*100)/100 : null;
    return {pnl, ticks:Math.round(ticks*10)/10, r, avgExit:parseFloat(t.exit)};
  }
  if(!tps.length) {
    // No TP price entered yet — can't calculate
    return {pnl:0,ticks:0,r:null,avgExit:null};
  }

  // Weighted average exit across all TPs
  const totalContracts = tps.reduce((s,tp)=>s+(parseFloat(tp.contracts)||0),0);
  const weightedExit = totalContracts>0 ? tps.reduce((s,tp)=>s+(parseFloat(tp.price)||0)*(parseFloat(tp.contracts)||0),0) / totalContracts : parseFloat(tps[0].price)||0;
  const ticks = dir*(weightedExit-parseFloat(t.entry))/inst.tickSize;
  const gross = tps.reduce((s,tp)=>{
    const tpTicks = dir*(parseFloat(tp.price)-parseFloat(t.entry))/inst.tickSize;
    return s + tpTicks*inst.tickValue*(parseFloat(tp.contracts)||1);
  },0);
  const pnl = gross;
  const st = t.stop ? Math.abs(parseFloat(t.entry)-parseFloat(t.stop))/inst.tickSize : null;
  const r = st ? Math.round(ticks/st*100)/100 : null;
  // Risk/Reward: how many R is the TP target (always positive — it's the potential)
  const tp1Ticks = tps[0] ? Math.abs(dir*(parseFloat(tps[0].price)-parseFloat(t.entry))/inst.tickSize) : null;
  const rr = st && tp1Ticks ? Math.round(tp1Ticks/st*100)/100 : null;
  return {pnl, ticks:Math.round(ticks*10)/10, r, rr, avgExit:Math.round(weightedExit*100)/100};
}

function exportExcel(trades) {
  const headers = ["Date","Time","Instrument","Direction","Contracts","Entry","TP1","TP1 Qty","TP2","TP2 Qty","TP3","TP3 Qty","Avg Exit","Stop","Ticks","P&L","R","Outcome","Strategy","Session","Trade Type","Setup","Duration","Notes"];
  const rows = trades.map(t => {
    const {pnl,ticks,r,avgExit} = calc(t);
    const tps = t.tps||[];
    return [t.date,t.time||"—",t.instrument,t.direction,t.contracts,t.entry,
      (tps[0]&&tps[0].price)||"",(tps[0]&&tps[0].contracts)||"",
      (tps[1]&&tps[1].price)||"",(tps[1]&&tps[1].contracts)||"",
      (tps[2]&&tps[2].price)||"",(tps[2]&&tps[2].contracts)||"",
      avgExit!==null&&avgExit!==undefined?avgExit:"",t.stop||"",ticks,pnl.toFixed(2),r||"",
      t.outcome||"TP",t.strategy,t.session,t.tradeType||"",t.setup,t.duration||"",t.notes||""
    ];
  });

  // Build CSV — works on all platforms including iOS Safari
  const escape = v => {
    const s = String(v==null?"":v).replace(/"/g,'').replace(/\r/g,' ');
    return s.includes(",")||s.includes('"') ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const csv = [headers, ...rows].map(row=>row.map(escape).join(",")).join("");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "logged-trades.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function getStreak(trades) {
  const sorted = [...trades].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length) return {count:0,type:"—"};
  // Skip BE trades to find the first decisive result
  const decisive = sorted.filter(t=>calc(t).pnl!==0);
  if(!decisive.length) return {count:0,type:"—"};
  const first = calc(decisive[0]).pnl;
  const type = first>0?"W":"L";
  let count=0;
  for(const t of sorted){
    const p=calc(t).pnl;
    if(p===0) continue; // skip BE — doesn't break or extend streak
    if((type==="W"&&p>0)||(type==="L"&&p<0)) count++;
    else break;
  }
  return {count,type};
}

/* ── Lightbox ── */
function Lightbox({images,start,onClose}){
  const [idx,setIdx]=useState(typeof start==="number"?start:0);
  const [zoomed,setZoomed]=useState(false);
  const [dragStart,setDragStart]=useState(null);

  const goNext=()=>{ if(idx<images.length-1){setIdx(idx+1);setZoomed(false);} };
  const goPrev=()=>{ if(idx>0){setIdx(idx-1);setZoomed(false);} };

  useEffect(()=>{
    const h=e=>{
      if(e.key==="Escape") onClose();
      if(e.key==="ArrowRight") setIdx(x=>Math.min(x+1,images.length-1));
      if(e.key==="ArrowLeft") setIdx(x=>Math.max(x-1,0));
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[]);

  const onTouchStart=e=>setDragStart(e.touches[0].clientX);
  const onTouchEnd=e=>{
    if(dragStart===null) return;
    const dx=e.changedTouches[0].clientX-dragStart;
    if(dx<-50) goNext();
    else if(dx>50) goPrev();
    setDragStart(null);
  };

  const img=images[idx]||images[0];
  if(!img||!img.dataUrl) return null;

  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"#000",display:"flex",flexDirection:"column"}}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",paddingTop:"calc(16px + env(safe-area-inset-top))",background:"linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%)",position:"absolute",top:0,left:0,right:0,zIndex:2,pointerEvents:"none"}}>
        <div style={{pointerEvents:"auto"}}>
          {img.label&&<div style={{fontSize:13,fontWeight:600,color:"#fff",fontFamily:"DM Mono,monospace",letterSpacing:"0.04em"}}>{img.label}</div>}
          {images.length>1&&<div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:2}}>{idx+1} of {images.length}</div>}
        </div>
        <button onClick={onClose} style={{pointerEvents:"auto",background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"50%",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",fontSize:18,lineHeight:1}}>&#x2715;</button>
      </div>

      {/* Image area */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
        <img
          src={img.dataUrl}
          alt={img.label||"chart"}
          onClick={()=>setZoomed(z=>!z)}
          style={{
            maxWidth:zoomed?"200%":"95vw",
            maxHeight:zoomed?"200%":"82vh",
            objectFit:"contain",
            borderRadius:zoomed?0:8,
            cursor:zoomed?"zoom-out":"zoom-in",
            boxShadow:zoomed?"none":"0 8px 40px rgba(0,0,0,0.6)",
          }}
        />
        {images.length>1&&idx>0&&(
          <button onClick={goPrev} style={{position:"absolute",left:0,top:0,bottom:0,width:"22%",background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:36,display:"flex",alignItems:"center",justifyContent:"flex-start",paddingLeft:8}}>&#8249;</button>
        )}
        {images.length>1&&idx<images.length-1&&(
          <button onClick={goNext} style={{position:"absolute",right:0,top:0,bottom:0,width:"22%",background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:36,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:8}}>&#8250;</button>
        )}
      </div>

      {/* Footer dots */}
      {images.length>1&&(
        <div style={{display:"flex",justifyContent:"center",gap:6,padding:"14px",paddingBottom:"calc(14px + env(safe-area-inset-bottom))"}}>
          {images.map((_,n)=>(
            <div key={n} onClick={()=>{setIdx(n);setZoomed(false);}}
              style={{width:n===idx?18:6,height:6,borderRadius:3,background:n===idx?"#fff":"rgba(255,255,255,0.3)",transition:"all 0.2s",cursor:"pointer"}}/>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Equity SVG ── */
function EquityCurve({equity, totalPnl, balance, curr}){
  if(equity.length<2) return <div style={{color:"var(--text4)",fontSize:12,textAlign:"center",padding:"30px 0"}}>Log more trades to see your curve</div>;
  const sym = (curr&&curr.symbol)||"$";
  const startBal = balance||0;
  // If balance set, show absolute account value. Otherwise show P&L delta.
  const vals = startBal>0 ? equity.map(e=>startBal+e.eq) : equity.map(e=>e.eq);
  const mn=vals.length?Math.min(...vals, startBal||0):(startBal||0);
  const mx=vals.length?Math.max(...vals, startBal||0):(startBal||0)+1;
  const rng=mx-mn||1;
  const W=300,H=80;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/rng)*H}`).join(" ");
  // baseline = starting balance line if balance set, else zero line
  const baselineVal = startBal>0 ? startBal : 0;
  const zy = H-((baselineVal-mn)/rng)*H;
  const col = totalPnl>=0?"var(--accent)":"#ff4d6d";
  const fmtV = v => {
    if(Math.abs(v)>=1000000) return `${sym}${(v/1000000).toFixed(1)}M`;
    if(Math.abs(v)>=1000) return `${sym}${(v/1000).toFixed(1)}k`;
    return `${sym}${v.toFixed(0)}`;
  };
  return(
    <div>
      {/* Y axis labels */}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:9,color:"var(--text4)"}}>{fmtV(mx)}</span>
        {startBal>0&&<span style={{fontSize:9,color:"#a78bfa"}}>Start: {fmtV(startBal)}</span>}
        <span style={{fontSize:9,color:"var(--text4)"}}>{fmtV(mn)}</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:90,overflow:"visible"}}>
        {/* Baseline */}
        <line x1={0} y1={zy} x2={W} y2={zy} stroke="var(--text5)" strokeWidth={0.8} strokeDasharray="3,3"/>
        {/* Starting balance line */}
        {startBal>0&&<line x1={0} y1={zy} x2={W} y2={zy} stroke="#a78bfa" strokeWidth={1.5} strokeDasharray="6,3" opacity={0.7}/>}
        {startBal>0&&<text x={W-4} y={zy-4} fontSize={8} fill="#a78bfa" fillOpacity={0.9} textAnchor="end">Start</text>}
        {/* Fill area under curve */}
        <polygon points={`0,${H} ${pts} ${W},${H}`} fill={col} fillOpacity={0.06}/>
        {/* Curve */}
        <polyline points={pts} fill="none" stroke={col} strokeWidth={2} strokeLinejoin="round"/>
        {/* Dots */}
        {vals.map((v,i)=>(
          <circle key={i} cx={(i/(vals.length-1))*W} cy={H-((v-mn)/rng)*H} r={2.5} fill={col} opacity={0.6}/>
        ))}
        {/* Start and end labels */}
        <text x={4} y={H-((vals[0]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.7}>{fmtV(vals[0])}</text>
        <text x={W-4} y={H-((vals[vals.length-1]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.7} textAnchor="end">{fmtV(vals[vals.length-1])}</text>
      </svg>
      {/* Summary row */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        <div style={{fontSize:10,color:"var(--text4)"}}>
          {startBal>0?`Start: ${fmtV(startBal)}`:"P&L curve"}
        </div>
        <div style={{fontSize:10,color:totalPnl>=0?"var(--accent)":"#ff4d6d",fontWeight:500}}>
          {totalPnl>=0?"+":""}{sym}{Math.abs(totalPnl).toFixed(2)} ({totalPnl>=0?"+":""}{startBal>0?((totalPnl/startBal)*100).toFixed(2):"—"}%)
        </div>
        <div style={{fontSize:10,color:"var(--text4)"}}>
          {startBal>0?`Now: ${fmtV(startBal+totalPnl)}`:""}
        </div>
      </div>
    </div>
  );
}

/* ── Image Uploader ── */
function ImageUploader({images,onChange,onImageClick}){
  const ref=useRef();
  const [drag,setDrag]=useState(false);

  const process=files=>{
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/"))return;
      const reader = new FileReader();
      reader.onload = e => {
        onChange(p=>[...p,{id:Date.now()+Math.random(),dataUrl:e.target.result,label:f.name.replace(/\.[^.]+$/,"")}]);
      };
      reader.readAsDataURL(f);
    });
  };
  return(
    <div>
      <div className={`upload-zone${drag?" drag":""}`}
        onClick={e=>{if(e.target.closest('.thumb-wrap'))return;ref.current.click();}}
        onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files);}}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}>
        {images.length===0&&(
          <>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text4)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:4}}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <div style={{fontSize:12,color:"var(--text4)"}}>Tap to add chart screenshots</div>
            <div style={{fontSize:10,color:"var(--text5)",marginTop:3}}>PNG · JPG · WEBP</div>
          </>
        )}
        {images.length>0&&(
          <>
            <div className="thumb-row" style={{marginBottom:10}}>
              {images.map((img)=>(
                <div key={img.id} className="thumb-wrap">
                  <img src={img.dataUrl} alt="" onClick={e=>{e.stopPropagation();onImageClick&&onImageClick(images,images.indexOf(img));}}/>
                  <div className="thumb-overlay"/>
                  {img.label&&<div className="thumb-label">{img.label}</div>}
                  <button className="thumb-del" onClick={e=>{e.stopPropagation();onChange(p=>p.filter(x=>x.id!==img.id));}}>&#x2715;</button>
                </div>
              ))}
            </div>
            <div style={{fontSize:10,color:"var(--text4)",textAlign:"center"}}>
              + tap to add more · {images.length} image{images.length!==1?"s":""}
            </div>
          </>
        )}
        <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>process(e.target.files)}/>
      </div>
    </div>
  );
}

        LOGGED IT. LEARNED IT. OWNED IT.

function getInitials(name){ return (name||"").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,3); }
function getInitialsFontSize(initials, size="sm"){ 
  const sizes = {sm:[16,13,10], md:[20,15,12], lg:[22,17,13]};
  const s = sizes[size]||sizes.sm;
  return initials.length===1?s[0]:initials.length===2?s[1]:s[2];
}
function InitialAvatar({name, size=28, fontSize="sm", onClick, style={}}){
  const initials = getInitials(name);
  const fs = getInitialsFontSize(initials, fontSize);
  return(
    <div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",background:"var(--accent-bg)",border:"1px solid var(--accent-dim)",display:"flex",alignItems:"center",justifyContent:"center",cursor:onClick?"pointer":"default",flexShrink:0,...style}}>
      <span style={{fontSize:fs,fontFamily:"Syne,sans-serif",fontWeight:800,color:"var(--accent)"}}>{initials}</span>
    </div>
  );
}
function PinScreen({onUnlock}){
  const profile = useMemo(()=>{try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||"null")}catch{return null}},[]);
  const isSetup = !profile;
  const [step, setStep] = useState(isSetup?"name":"pin");
  const [name, setName] = useState("");
  const [pin, setPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [entered, setEntered] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);
  const [success, setSuccess] = useState(false);

  const triggerError = () => {
    if(navigator.vibrate) navigator.vibrate([40,30,40]);
    setError(true); setShake(true);
    setTimeout(()=>{setEntered("");setError(false);setShake(false);},500);
  };

  const haptic = () => { if(navigator.vibrate) navigator.vibrate(8); };

  const pressDigit = (d) => {
    haptic();
    if(step==="pin"){
      const next = entered+d;
      if(next.length>4) return;
      setEntered(next);
      if(next.length===4){
        if(next===profile.pin){
          setSuccess(true);
          setTimeout(()=>onUnlock(profile.name),280);
        } else {
          triggerError();
        }
      }
    } else if(step==="setpin"){
      const next = pin+d;
      if(next.length>4) return;
      setPin(next);
      if(next.length===4) setStep("confirm");
    } else if(step==="confirm"){
      const next = confirmPin+d;
      if(next.length>4) return;
      setConfirmPin(next);
      if(next.length===4){
        if(next===pin){
          localStorage.setItem(PROFILE_KEY, JSON.stringify({name:name.trim(), pin:next}));
          setSuccess(true);
          setTimeout(()=>onUnlock(name.trim()),280);
        } else {
          setTimeout(()=>{setConfirmPin(""); setPin(""); setStep("setpin"); triggerError();},50);
        }
      }
    }
  };

  const pressDelete = () => {
    haptic();
    if(step==="pin") setEntered(e=>e.slice(0,-1));
    else if(step==="setpin") setPin(p=>p.slice(0,-1));
    else if(step==="confirm") setConfirmPin(p=>p.slice(0,-1));
  };

  const currentEntry = step==="pin"?entered:step==="setpin"?pin:confirmPin;
  const DIGITS = ["1","2","3","4","5","6","7","8","9","*","0","⌫"];

  return(
    <div className="pin-screen" style={{background:"radial-gradient(ellipse at 0% 0%,#1a0a2e 0%,transparent 60%),radial-gradient(ellipse at 100% 100%,#00251a 0%,transparent 60%),#080b12"}}>
      <div style={{textAlign:"center",marginBottom:8}}>
        <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:28,color:"var(--text)",letterSpacing:"-0.02em"}}>LOGGED</div>
        <div style={{fontSize:9,letterSpacing:"0.15em",color:"var(--text4)",textTransform:"uppercase",marginTop:2}}>futures journal</div>
        <div style={{fontSize:11,color:"var(--text3)",marginTop:8,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"Syne,sans-serif",fontWeight:700}}>LOGGED IT. LEARNED IT. OWNED IT.</div>
      </div>

      {step==="name"&&(
        <div style={{width:"100%",maxWidth:280,marginTop:32}}>
          <div style={{fontSize:13,color:"var(--text3)",textAlign:"center",marginBottom:20,lineHeight:1.6}}>What is your name?</div>
          <input className="pin-name-input" placeholder="Your name..." value={name} onChange={e=>setName(e.target.value)} autoFocus
            onKeyDown={e=>{if(e.key==="Enter"&&name.trim())setStep("setpin");}}/>
          <button className="btn-primary" style={{marginTop:16}} disabled={!name.trim()}
            onClick={()=>setStep("setpin")}>Continue →</button>
        </div>
      )}

      {(step==="setpin"||step==="confirm"||step==="pin")&&(
        <>
          <div style={{fontSize:13,color:"var(--text3)",textAlign:"center",marginTop:24,lineHeight:1.6}}>
            {step==="pin"&&<>
              <InitialAvatar name={profile.name} size={48} fontSize="md" style={{margin:"0 auto 8px",background:"var(--accent-bg)",border:"1px solid #00e5a030"}}/>
              <span style={{color:"var(--text2)",fontWeight:500}}>{profile.name}</span><br/>Enter your PIN
            </>}
            {step==="setpin"&&<span>Set a 4-digit PIN</span>}
            {step==="confirm"&&<span>Confirm your PIN</span>}
          </div>

          {/* Dots */}
          <div className="pin-dots" style={{animation:shake?"shake 0.4s ease":undefined}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{
                width:14,height:14,borderRadius:"50%",
                transition:"all 0.15s ease",
                background: error?"#ff4d6d":success?"var(--accent)":currentEntry.length>i?"var(--accent)":"transparent",
                border: error?"2px solid #ff4d6d":success?"2px solid var(--accent)":currentEntry.length>i?"2px solid var(--accent)":"2px solid var(--border3)",
                transform: currentEntry.length>i?"scale(1.15)":"scale(1)",
                boxShadow: (currentEntry.length>i&&!error)?"0 0 8px var(--accent-dim)":undefined,
              }}/>
            ))}
          </div>

          {/* Keypad */}
          <div className="pin-pad">
            {DIGITS.map((d,i)=>(
              d==="*"?(
                <button key={i} className="pin-btn del" style={{color:"var(--text5)",cursor:"default"}} onClick={()=>{}}>＃</button>
              ):d==="⌫"?(
                <button key={i} className="pin-btn del" onClick={pressDelete}
                  style={{fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
                  </svg>
                </button>
              ):(
                <button key={i} className="pin-btn" onClick={()=>pressDigit(d)}>{d}</button>
              )
            ))}
          </div>
        </>
      )}

      <style>{`
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        .pin-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;}
        .pin-btn:active{background:var(--accent-bg)!important;border-color:var(--accent-dim)!important;transform:scale(0.93);}
      `}</style>
    </div>
  );
}

/* ── Calendar View ── */
function CalendarView({trades, fmt, calc, curr}){
  const today = new Date();
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [selectedDay, setSelectedDay] = useState(null);

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Build day map for current month
  const dayMap = useMemo(()=>{
    const map = {};
    trades.forEach(t=>{
      const d = new Date(t.date);
      if(d.getFullYear()===calYear && d.getMonth()===calMonth){
        const key = t.date;
        if(!map[key]) map[key]={pnl:0,count:0,trades:[]};
        map[key].pnl += calc(t).pnl;
        map[key].count++;
        map[key].trades.push(t);
      }
    });
    return map;
  },[trades, calYear, calMonth]);

  // Monthly summary
  const monthPnl = Object.values(dayMap).reduce((s,d)=>s+d.pnl,0);
  const greenDays = Object.values(dayMap).filter(d=>d.pnl>0).length;
  const redDays = Object.values(dayMap).filter(d=>d.pnl<0).length;

  // Build calendar grid
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const prevMonth = ()=>{ if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); setSelectedDay(null); };
  const nextMonth = ()=>{ if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); setSelectedDay(null); };

  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const selKey = selectedDay ? `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(selectedDay).padStart(2,"0")}` : null;
  const selData = selKey ? dayMap[selKey] : null;

  return(
    <>
      {/* Month header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",color:"var(--text3)",fontSize:20,cursor:"pointer",padding:"4px 8px"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20,color:"var(--text)",lineHeight:1.3,paddingBottom:2}}>{MONTHS[calMonth]}</div>
          <div style={{fontSize:11,color:"var(--text4)"}}>{calYear}</div>
        </div>
        <button onClick={nextMonth} style={{background:"none",border:"none",color:"var(--text3)",fontSize:20,cursor:"pointer",padding:"4px 8px"}}>›</button>
      </div>

      {/* Monthly summary */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[
          {l:"Month P&L",v:fmt(monthPnl),c:monthPnl>=0?"var(--accent)":"#ff4d6d"},
          {l:"Green Days",v:greenDays,c:"#00e5a0"},
          {l:"Red Days",v:redDays,c:"#ff4d6d"},
        ].map(s=>(
          <div key={s.l} className="stat-card" style={{flex:1,padding:"10px 12px"}}>
            <div className="stat-label">{s.l}</div>
            <div style={{fontSize:16,fontWeight:500,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {DAYS.map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:9,letterSpacing:"0.1em",color:"var(--text4)",textTransform:"uppercase",padding:"4px 0"}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:16}}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const key = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const data = dayMap[key];
          const isToday = key===todayStr;
          const isSelected = day===selectedDay;
          const bg = data ? (data.pnl>0?"var(--accent)":"#ff4d6d") : "transparent";
          const intensity = data&&data.pnl>0 ? Math.min(0.35, 0.08 + Math.abs(data.pnl)/500*0.2) : 0;
          const isRed = data&&data.pnl<0;
          return(
            <div key={day} onClick={()=>setSelectedDay(day===selectedDay?null:day)}
              style={{aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:data?"pointer":"default",
                background:isRed?"transparent":data?`${bg}${Math.round(intensity*255).toString(16).padStart(2,"0")}`:"var(--surface2)",
                border:isSelected?"2px solid "+(data?bg:"var(--accent)"):isRed?"2px solid #ff4d6d":isToday?"2px solid var(--accent)":"2px solid transparent",
                transition:"all 0.15s",position:"relative"}}>
              <div style={{fontSize:11,fontWeight:isToday?700:400,color:data?(data.pnl>0?"var(--accent)":"#ff4d6d"):"var(--text4)"}}>{day}</div>
              {data&&<div style={{fontSize:8,color:data.pnl>0?"var(--accent)":"#ff4d6d",opacity:0.7,letterSpacing:"-0.02em",textAlign:"center"}}>
                {curr.symbol}{Math.abs(data.pnl)>=1000?`${(Math.abs(data.pnl)/1000).toFixed(1)}k`:Math.abs(data.pnl).toFixed(0)}
              </div>}
            </div>
          );
        })}
      </div>

      {/* Selected day detail */}
      {selectedDay&&(
        <div className="stat-card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",lineHeight:1.3,paddingBottom:2}}>{MONTHS[calMonth]} {selectedDay}</div>
            {selData&&<div style={{fontSize:18,fontWeight:500,color:selData.pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(selData.pnl)}</div>}
          </div>
          {!selData?(
            <div style={{fontSize:12,color:"var(--text4)",textAlign:"center",padding:"16px 0"}}>No trades on this day</div>
          ):(
            <>
              {/* Win/loss ratio row */}
              {selData.trades.length>0&&(()=>{
                const wins=selData.trades.filter(t=>calc(t).pnl>0).length;
                const losses=selData.trades.filter(t=>calc(t).pnl<0).length;
                const bes=selData.trades.filter(t=>calc(t).pnl===0).length;
                return(
                  <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,padding:"3px 8px",borderRadius:6,background:"var(--accent-bg)",color:"var(--accent)",fontFamily:"DM Mono,monospace"}}>{wins}W · {losses}L{bes>0?" · "+bes+"BE":""}</span>
                    <span style={{fontSize:10,padding:"3px 8px",borderRadius:6,background:"var(--surface2)",color:"var(--text3)",fontFamily:"DM Mono,monospace"}}>{selData.trades.length} trade{selData.trades.length!==1?"s":""}</span>
                  </div>
                );
              })()}
              {selData.trades.map(t=>{
                const {pnl,ticks,r}=calc(t);
                return(
                  <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                    <div>
                      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                        <span style={{fontSize:14,fontWeight:800,color:"var(--text)",fontFamily:"Syne,sans-serif",letterSpacing:"-0.01em"}}>{t.instrument}</span>
                        <span style={{fontSize:11,color:t.direction==="Long"?"var(--accent)":"#ff4d6d"}}>{t.direction==="Long"?"▲":"▼"} {t.direction}</span>
                        {(t.emotion||[]).length>0&&<span style={{fontSize:11}}>{(Array.isArray(t.emotion)?t.emotion:[t.emotion]).map(e=>e.split(" ")[0]).join("")}</span>}
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <span className="tag">{t.strategy}</span>
                        <span className="tag">{t.outcome||"TP"}</span>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:15,fontWeight:500,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</div>
                      <div style={{fontSize:11,color:"var(--text4)"}}>{ticks>=0?"+":""}{ticks} ticks{r!==null?" · "+(r>=0?"+":"")+r+"R":""}</div>
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </div>
      )}

      {/* Goals shortcut */}
    </>
  );
}

function GoalsView({trades, goals, setGoals, fmt, calc, goalColour, setShareGoal, shareCardStyle, setShareCardStyle, traderName}){
  const [localShareGoal, setLocalShareGoal] = useState(null);
  const [showAddGoal, setShowAddGoal] = useState(false);
  const [editGroupId, setEditGroupId] = useState(null);
  const [groupForm, setGroupForm] = useState({title:"", period:"Daily", targets:[]});
  const [newTarget, setNewTarget] = useState({type:"PnL", amount:""});

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const todayStr = now.toISOString().split("T")[0];

  const getPeriodTrades = (period, dateFrom, dateTo) => trades.filter(t=>{
    const d = new Date(t.date);
    if(period==="Daily") return t.date===todayStr;
    if(period==="Weekly") return d>=weekStart;
    if(period==="Monthly") return d>=monthStart;
    if(period==="Custom") {
      if(dateFrom && t.date < dateFrom) return false;
      if(dateTo && t.date > dateTo) return false;
      return true;
    }
    return true;
  });

  const getProgress = (type, period, dateFrom, dateTo) => {
    const pt = getPeriodTrades(period, dateFrom, dateTo);
    switch(type){
      case "PnL": return pt.reduce((s,t)=>s+calc(t).pnl,0);
      case "WinRate": { const w=pt.filter(t=>calc(t).pnl>0).length; return pt.length?Math.round(w/pt.length*100):0; }
      case "Trades": return pt.length;
      case "AvgR": { const rt=pt.filter(t=>calc(t).r!==null); return rt.length?Math.round(rt.reduce((s,t)=>s+calc(t).r,0)/rt.length*100)/100:0; }
      case "MaxLoss": return pt.length?Math.abs(Math.min(...pt.map(t=>calc(t).pnl),0)):0;
      default: return 0;
    }
  };

  const TYPES = [
    {k:"PnL",l:"Profit Target",unit:"$"},
    {k:"WinRate",l:"Win Rate",unit:"%"},
    {k:"Trades",l:"No. of Trades",unit:""},
    {k:"AvgR",l:"Avg R",unit:"R"},
    {k:"MaxLoss",l:"Max Loss",unit:"$"},
  ];

  const fmtVal = (type, val) => {
    switch(type){
      case "PnL": return fmt(val);
      case "WinRate": return `${val}%`;
      case "Trades": return `${val}`;
      case "AvgR": return `${val>=0?"+":""}${val}R`;
      case "MaxLoss": return `$${Math.abs(val).toFixed(0)}`;
      default: return val;
    }
  };

  const fmtTarget = (type, amt) => {
    switch(type){
      case "PnL": case "MaxLoss": return `$${amt}`;
      case "WinRate": return `${amt}%`;
      case "AvgR": return `${amt}R`;
      default: return `${amt}`;
    }
  };

  const getColor = (type, pct, progress) => {
    if(type==="MaxLoss") return pct<=100?"var(--accent)":"#ff4d6d";
    if(type==="PnL") return progress>=0?"var(--accent)":"#ff4d6d";
    // simple = just green/red, traffic = green/amber/red
    if(goalColour==="traffic"){
      return pct>=100?"#00e5a0":pct>=60?"#f6ad55":"#ff4d6d";
    }
    return pct>=100?"var(--accent)":"#ff4d6d";
  };

  const openNew = () => {
    setGroupForm({title:"", period:"Daily", targets:[]});
    setNewTarget({type:"PnL", amount:""});
    setEditGroupId(null);
    setShowAddGoal(true);
  };

  const addTargetToForm = () => {
    if(!newTarget.amount||isNaN(parseFloat(newTarget.amount))) return;
    setGroupForm(f=>({...f, targets:[...f.targets, {...newTarget, amount:parseFloat(newTarget.amount), id:Date.now()}]}));
    setNewTarget({type:"PnL", amount:""});
  };

  const saveGroup = () => {
    if(!groupForm.title||!groupForm.targets.length) return;
    if(editGroupId){
      setGoals(g=>g.map(gi=>gi.id===editGroupId?{...groupForm,id:editGroupId}:gi));
    } else {
      setGoals(g=>[...g,{...groupForm,id:Date.now()}]);
    }
    setShowAddGoal(false);
  };

  return(
    <>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
        <div className="section-title" style={{marginBottom:0}}>Goals</div>
        <button className="btn-ghost" style={{width:"auto",padding:"8px 18px",fontSize:11}} onClick={openNew}>+ Add Goals</button>
      </div>

      {goals.length===0?(
        <div className="empty">
          <div style={{marginBottom:16}}>
                <svg width="72" height="72" viewBox="0 0 72 72" fill="none" style={{opacity:0.5}}>
                  {/* Podium steps */}
                  <rect x="24" y="34" width="24" height="30" rx="2" stroke="#00e5a0" strokeWidth="1.8" fill="#00e5a0" fillOpacity="0.15"/>
                  <rect x="4" y="44" width="20" height="20" rx="2" stroke="#00e5a0" strokeWidth="1.8" fill="#00e5a0" fillOpacity="0.1" opacity="0.7"/>
                  <rect x="48" y="50" width="20" height="14" rx="2" stroke="#00e5a0" strokeWidth="1.8" fill="#00e5a0" fillOpacity="0.1" opacity="0.5"/>

/* ── Number Input with comma formatting ── */
function NumberInput({value, onChange, placeholder, className, style, step}){
  const [display, setDisplay] = React.useState(value||"");

  React.useEffect(()=>{
    if(document.activeElement!==inputRef.current){
      setDisplay(value?Number(value).toLocaleString("en-GB"):"");
    }
  },[value]);

  const inputRef = React.useRef(null);

  const handleChange = (e) => {
    const raw = e.target.value.replace(/,/g,"");
    if(raw===""||raw==="-"||/^-?\d*\.?\d*$/.test(raw)){
      setDisplay(raw);
      onChange({target:{value:raw}});
    }
  };

  const handleBlur = () => {
    const num = parseFloat(display.replace(/,/g,""));
    if(!isNaN(num)) setDisplay(num.toLocaleString("en-GB"));
  };

  const handleFocus = () => {
    setDisplay(display.replace(/,/g,""));
  };

  return(
    <input
      ref={inputRef}
      type="text"
      inputMode="decimal"
      placeholder={placeholder}
      className={className}
      style={style}
      value={display}
      onChange={handleChange}
      onBlur={handleBlur}
      onFocus={handleFocus}
    />
  );
}

/* ── Swipe Actions ── */
function SwipeToDelete({children, onDelete, onEdit}){
  const [offset, setOffset] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const startX = useRef(0);
  const startY = useRef(0);
  const isDragging = useRef(false);
  const THRESHOLD = 80;

  const onTouchStart = e => {
    if(offset !== 0) { setOffset(0); setSwiping(false); return; }
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    isDragging.current = false;
  };

  const onTouchMove = e => {
    const dx = e.touches[0].clientX - startX.current;
    const dy = e.touches[0].clientY - startY.current;
    if(!isDragging.current && Math.abs(dy) > Math.abs(dx)) return;
    isDragging.current = true;
    setSwiping(true);
    // Only allow left swipe (negative offset)
    setOffset(Math.max(-140, Math.min(0, dx)));
    e.preventDefault();
  };

  const onTouchEnd = () => {
    if(offset < -THRESHOLD){
      setOffset(-140);
      setTimeout(()=>{ onDelete(); setOffset(0); setSwiping(false); }, 200);
    } else {
      setOffset(0);
      setSwiping(false);
    }
    isDragging.current = false;
  };

  return(
    <div className="swipe-wrap">
      {/* Delete bg (left swipe only) */}
      <div className="swipe-delete-bg">
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
          <span style={{fontSize:9,color:"white",letterSpacing:"0.1em",textTransform:"uppercase"}}>Delete</span>
        </div>
      </div>
      {/* Card */}
      <div className="swipe-card"
        style={{transform:"translateX("+offset+"px)",transition:swiping?"none":"transform 0.25s ease"}}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}>
        {children}
      </div>
    </div>
  );
}

/* ── Duration Picker — infinite continuous roll ── */
function DurationPicker({value, onChange}){
  const totalMins = parseInt(value)||0;
  const [open, setOpen] = React.useState(false);
  const [selH, setSelH] = React.useState(Math.floor(totalMins/60));
  const [selM, setSelM] = React.useState(totalMins%60);
  const hRef = React.useRef(null);
  const mRef = React.useRef(null);
  const hAdj = React.useRef(false);
  const mAdj = React.useRef(false);

  const ITEM_H = 48;
  const H_LIST = Array.from({length:24},(_,i)=>i);
  const M_LIST = Array.from({length:60},(_,i)=>i);
  const REPS = 9; // enough repetitions to feel truly infinite

  // Build repeated arrays once
  const hItems = Array.from({length:REPS*H_LIST.length},(_,i)=>H_LIST[i%H_LIST.length]);
  const mItems = Array.from({length:REPS*M_LIST.length},(_,i)=>M_LIST[i%M_LIST.length]);

  function initCol(ref, list, idx){
    if(!ref.current) return;
    const mid = Math.floor(REPS/2);
    ref.current.scrollTop = (mid * list.length + idx - 2) * ITEM_H;
  }

  React.useEffect(()=>{
    if(open){
      const h=Math.floor((parseInt(value)||0)/60);
      const m=(parseInt(value)||0)%60;
      setSelH(h); setSelM(m);
      // Two rAF to ensure the DOM is rendered before scrolling
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        initCol(hRef,H_LIST,h);
        initCol(mRef,M_LIST,m);
      }));
    }
  },[open]);

  function handleScroll(ref, list, setter, adjRef){
    const el=ref.current; if(!el) return;
    const len=list.length, band=len*ITEM_H;
    // Silent wrap — jump to middle when approaching either end
    if(!adjRef.current && el.scrollTop < band){
      adjRef.current=true;
      el.scrollTop += band * Math.floor(REPS/2);
      setTimeout(()=>{ adjRef.current=false; },30);
    } else if(!adjRef.current && el.scrollTop >= band*(REPS-1)){
      adjRef.current=true;
      el.scrollTop -= band * Math.floor(REPS/2);
      setTimeout(()=>{ adjRef.current=false; },30);
    }
    // Debounced snap + state update
    clearTimeout(ref._snap);
    ref._snap=setTimeout(()=>{
      const idx=(Math.round(el.scrollTop/ITEM_H)+2)%len;
      setter(idx);
      const absIdx=Math.round(el.scrollTop/ITEM_H)+2;
      el.scrollTop=(absIdx-2)*ITEM_H;
    },160);
  }

  function handleConfirm(){
    const h=hRef.current?(Math.round(hRef.current.scrollTop/ITEM_H)+2)%H_LIST.length:selH;
    const m=mRef.current?(Math.round(mRef.current.scrollTop/ITEM_H)+2)%M_LIST.length:selM;
    onChange(h*60+m);
    setOpen(false);
  }

  const display=totalMins===0?"— Tap to set":
    (Math.floor(totalMins/60)>0?Math.floor(totalMins/60)+"h ":"")+
    (totalMins%60>0?String(totalMins%60).padStart(2,"0")+"m":
     (Math.floor(totalMins/60)>0?"":"—"));

  const colStyle={
    height:ITEM_H*5,
    overflowY:"scroll",
    scrollSnapType:"y mandatory",
    WebkitOverflowScrolling:"touch",
    position:"relative",
    flex:1,
  };

  const itemStyle=()=>({
    height:ITEM_H,
    display:"flex",
    alignItems:"center",
    justifyContent:"center",
    scrollSnapAlign:"center",
    fontSize:20,
    fontFamily:"DM Mono,monospace",
    fontWeight:500,
    color:"var(--text)",
    letterSpacing:"0.02em",
    userSelect:"none",
    opacity:0.9,
  });

  return(<>
    <div onClick={()=>setOpen(true)} className="field-input" style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",userSelect:"none"}}>
      <span style={{color:totalMins>0?"var(--text)":"var(--text3)",fontFamily:"DM Mono,monospace",fontSize:14}}>{display}</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text4)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>

    {open&&(
      <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget){setOpen(false);}}}>
        <div style={{background:"rgba(0,0,0,0.6)",position:"absolute",inset:0}} onClick={()=>setOpen(false)}/>
        <div style={{position:"relative",background:"var(--surface)",borderRadius:"20px 20px 0 0",paddingBottom:38,boxShadow:"0 -12px 48px #00000070"}}>

          {/* Header */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 6px"}}>
            <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",color:"var(--text3)",fontFamily:"DM Mono,monospace",fontSize:12,cursor:"pointer",padding:"6px 8px",letterSpacing:"0.04em"}}>Cancel</button>
            <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",letterSpacing:"-0.02em"}}>Duration</div>
            <button onClick={handleConfirm} style={{background:"none",border:"none",color:"var(--accent)",fontFamily:"DM Mono,monospace",fontSize:12,fontWeight:600,cursor:"pointer",padding:"6px 8px",letterSpacing:"0.04em"}}>Done</button>
          </div>

          {/* Column labels */}
          <div style={{display:"flex",padding:"0 40px",marginBottom:2}}>
            <div style={{flex:1,textAlign:"center",fontSize:9,color:"var(--text3)",fontFamily:"DM Mono,monospace",letterSpacing:"0.14em",fontWeight:500,textTransform:"uppercase"}}>Hours</div>
            <div style={{width:32}}/>
            <div style={{flex:1,textAlign:"center",fontSize:9,color:"var(--text3)",fontFamily:"DM Mono,monospace",letterSpacing:"0.14em",fontWeight:500,textTransform:"uppercase"}}>Minutes</div>
          </div>

          {/* Drum rolls */}
          <div style={{position:"relative",margin:"0 20px"}}>
            {/* Centre highlight band */}
            <div style={{position:"absolute",top:ITEM_H*2,left:0,right:0,height:ITEM_H,background:"var(--accent)",opacity:0.09,borderRadius:12,pointerEvents:"none",zIndex:1}}/>
            <div style={{position:"absolute",top:ITEM_H*2,left:0,right:0,height:ITEM_H,border:"1px solid var(--accent)",opacity:0.3,borderRadius:12,pointerEvents:"none",zIndex:1}}/>
            {/* Top fade */}
            <div style={{position:"absolute",top:0,left:0,right:0,height:ITEM_H*2,background:"linear-gradient(to bottom,var(--surface) 20%,transparent 100%)",pointerEvents:"none",zIndex:2,borderRadius:"12px 12px 0 0"}}/>
            {/* Bottom fade */}
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:ITEM_H*2,background:"linear-gradient(to top,var(--surface) 20%,transparent 100%)",pointerEvents:"none",zIndex:2}}/>

            <div style={{display:"flex"}}>
              {/* Hours roll */}
              <div ref={hRef} className="dur-col" style={colStyle} onScroll={()=>handleScroll(hRef,H_LIST,setSelH,hAdj)}>
                {hItems.map((h,i)=>(
                  <div key={i} style={itemStyle()}>{String(h).padStart(2,"0")}</div>
                ))}
              </div>

              {/* Colon separator */}
              <div style={{width:32,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,color:"var(--accent)",fontWeight:800,opacity:0.5,paddingBottom:2,zIndex:3,pointerEvents:"none"}}>:</div>

              {/* Minutes roll */}
              <div ref={mRef} className="dur-col" style={colStyle} onScroll={()=>handleScroll(mRef,M_LIST,setSelM,mAdj)}>
                {mItems.map((m,i)=>(
                  <div key={i} style={itemStyle()}>{String(m).padStart(2,"0")}</div>
                ))}
              </div>
            </div>
          </div>

          {/* Live preview */}
          <div style={{textAlign:"center",marginTop:12,display:"flex",alignItems:"baseline",justifyContent:"center",gap:4}}>
            {selH>0&&<span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20,color:"var(--text2)",letterSpacing:"-0.02em"}}>{selH}<span style={{fontFamily:"DM Mono,monospace",fontWeight:400,fontSize:11,color:"var(--text4)",marginLeft:2}}>h</span></span>}
            <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20,color:"var(--text2)",letterSpacing:"-0.02em"}}>{String(selM).padStart(2,"0")}<span style={{fontFamily:"DM Mono,monospace",fontWeight:400,fontSize:11,color:"var(--text4)",marginLeft:2}}>m</span></span>
          </div>
        </div>
      </div>
    )}
  </>);
}


/* ── Custom Date Picker ── */
function DatePicker({value, onChange}){
  const [open, setOpen] = useState(false);
  const [viewDate, setViewDate] = useState(()=>{
    const d = value?new Date(value+"T12:00:00"):new Date();
    return {year:d.getFullYear(), month:d.getMonth()};
  });

  const selected = value?new Date(value+"T12:00:00"):null;
  const today = new Date();
  const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const getDays = (year, month) => {
    const first = new Date(year, month, 1);
    const last = new Date(year, month+1, 0);
    const startDay = (first.getDay()+6)%7; // Mon=0
    const days = [];
    for(let i=0; i<startDay; i++) days.push(null);
    for(let i=1; i<=last.getDate(); i++) days.push(i);
    return days;
  };

  const days = getDays(viewDate.year, viewDate.month);
  const fmt = (d) => {
    if(!d) return "";
    return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
  };

  const selectDay = (day) => {
    const m = String(viewDate.month+1).padStart(2,"0");
    const d = String(day).padStart(2,"0");
    onChange(viewDate.year+"-"+m+"-"+d);
    setOpen(false);
  };

  const prevMonth = (e) => { e.stopPropagation(); setViewDate(v=>v.month===0?{year:v.year-1,month:11}:{...v,month:v.month-1}); };
  const nextMonth = (e) => { e.stopPropagation(); setViewDate(v=>v.month===11?{year:v.year+1,month:0}:{...v,month:v.month+1}); };

  const isSelected = (day) => selected&&selected.getFullYear()===viewDate.year&&selected.getMonth()===viewDate.month&&selected.getDate()===day;
  const isToday = (day) => today.getFullYear()===viewDate.year&&today.getMonth()===viewDate.month&&today.getDate()===day;

  return(
    <div style={{position:"relative"}}>
      <div onClick={()=>setOpen(v=>!v)} className="field-input"
        style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",userSelect:"none",borderColor:open?"var(--accent)":"var(--border2)"}}>
        <span style={{color:value?"var(--text)":"var(--text4)",fontSize:16}}>{value?fmt(new Date(value+"T12:00:00")):"Select date"}</span>
      </div>
      {open&&(
        <>
          <div style={{position:"fixed",inset:0,zIndex:199,background:"rgba(0,0,0,0.5)"}} onClick={()=>setOpen(false)}/>
          <div style={{position:"fixed",left:16,right:16,bottom:110,background:"var(--surface)",borderRadius:12,padding:"20px",zIndex:200,boxShadow:"0 -8px 40px rgba(0,0,0,0.5)",border:"1px solid var(--border)"}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <button onClick={prevMonth} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:26,padding:"0 12px",lineHeight:1}}>‹</button>
              <span style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18,color:"var(--text)"}}>{MONTHS[viewDate.month]} {viewDate.year}</span>
              <button onClick={nextMonth} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:26,padding:"0 12px",lineHeight:1}}>›</button>
            </div>
            {/* Day headers */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:8}}>
              {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:"var(--text4)",letterSpacing:"0.05em",paddingBottom:6}}>{d}</div>)}
            </div>
            {/* Days */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
              {days.map((day,i)=>(
                <div key={i} onClick={day?()=>selectDay(day):undefined}
                  style={{
                    textAlign:"center",padding:"12px 2px",borderRadius:10,cursor:day?"pointer":"default",fontSize:16,
                    background:isSelected(day)?"var(--accent)":isToday(day)?"var(--accent-bg)":"transparent",
                    color:isSelected(day)?"var(--bg)":isToday(day)?"var(--accent)":day?"var(--text)":"transparent",
                    fontWeight:isSelected(day)||isToday(day)?700:400,
                    transition:"all 0.15s",
                    WebkitTapHighlightColor:"transparent"
                  }}>
                  {day||""}
                </div>
              ))}
            </div>
            {/* Today shortcut */}
            <button onClick={()=>{
              const t = new Date();
              const m = String(t.getMonth()+1).padStart(2,"0");
              const d = String(t.getDate()).padStart(2,"0");
              onChange(t.getFullYear()+"-"+m+"-"+d);
              setOpen(false);
            }} style={{marginTop:16,width:"100%",background:"var(--accent-bg)",border:"1px solid var(--accent-dim)",borderRadius:10,padding:"12px",color:"var(--accent)",fontFamily:"DM Mono,monospace",fontSize:13,cursor:"pointer",fontWeight:500}}>
              Today
            </button>
          </div>
        </>
      )}
    </div>
  );
}

function AIReport({trades, stats, fmt, curr, apiKey}){
  const {useState, useEffect} = React;
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [period, setPeriod] = useState("week");

  const getPeriodTrades = () => {
    const now = new Date();
    const cutoff = new Date();
    if(period==="week") cutoff.setDate(now.getDate()-7);
    else if(period==="month") cutoff.setMonth(now.getMonth()-1);
    else return trades;
    return trades.filter(t=>new Date(t.date)>=cutoff);
  };

  const generate = async () => {
    if(!apiKey){ setError("Add your Anthropic API key in Settings → Data & Privacy."); return; }
    const pt = getPeriodTrades();
    if(!pt.length){ setError("No trades in this period."); return; }
    setLoading(true); setError(null); setReport(null);

    const sanitise = s => (s||"").replace(/[\x00-\x1F\x7F]/g," ").replace(/`/g,"'").trim();

    const tradeSummary = pt.map(t=>{
      const {pnl,ticks,r} = calc(t);
      return `${t.date}${t.time?" "+t.time:""} | ${t.instrument} | ${t.direction} | ${t.contracts} contracts | Entry: ${t.entry} | Outcome: ${t.outcome} | P&L: ${fmt(pnl)} | R: ${r!==null?r+"R":"—"} | Strategy: ${sanitise(t.strategy)} | Session: ${t.session}${t.tradeType?" | Type: "+sanitise(t.tradeType):""} | Notes: ${sanitise(t.notes)||"none"}`;
    }).join("");

    const wins = pt.filter(t=>calc(t).pnl>0);
    const losses = pt.filter(t=>calc(t).pnl<0);
    const totalPnl = pt.reduce((s,t)=>s+calc(t).pnl,0);
    const bes = pt.filter(t=>calc(t).pnl===0);
    const winRate = (wins.length+losses.length)>0?(wins.length/(wins.length+losses.length)*100).toFixed(1):0;

    const prompt = `You are a trading coach. Analyse this performance:

Period: ${period}
Trades: ${pt.length} (${winRate}% win rate)
Net P&L: ${fmt(totalPnl)}
Wins: ${wins.length}, Losses: ${losses.length}, BE: ${bes.length}
Avg R: ${stats.avgR!==undefined?stats.avgR.toFixed(2):"n/a"}
Profit Factor: ${stats.pf?stats.pf.toFixed(2):"n/a"}

Give 2-3 key strengths from this data and 2-3 areas to improve.`;;

    try {
      const requestBody = {
        model:"claude-haiku-4-5-20251001",
        max_tokens:1024,
        messages:[{role:"user",content:prompt}]
      };
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey.trim(),
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify(requestBody)
      });
      let data;
      try { data = await res.json(); }
      catch(jsonErr){ throw new Error("Could not parse API response (status "+res.status+")"); }
      if(!res.ok){
        const errType = data.error&&data.error.type;
        const errMsg = data.error&&data.error.message;
        if(res.status===401) throw new Error("Invalid API key — check it in Settings.");
        if(res.status===429) throw new Error("Rate limit — wait a moment and try again.");
        throw new Error("API "+res.status+(errType?" · "+errType:"")+(errMsg?" · "+errMsg:""));
      }
      const text = data.content&&data.content[0]&&data.content[0].text;
      if(!text) throw new Error("Empty response (status "+res.status+") — try again.");
      setReport(text);
    } catch(e) {
      setError(e.message||"Failed to generate report. Please try again.");
    }
    setLoading(false);
  };

  const renderReport = (text) => {
    return text.split("").map((line, i) => {
      if(line.startsWith("**")&&line.endsWith("**")) {
        return <div key={i} style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--accent)",fontFamily:"Syne,sans-serif",fontWeight:700,marginTop:i>0?16:0,marginBottom:6}}>{line.replace(/\*\*/g,"")}</div>;
      }
      if(line.match(/^\d+\.\s\*\*/)) {
        const title = line.match(/\*\*([^*]+)\*\*/)[1];
        const rest = line.replace(/^\d+\.\s\*\*[^*]+\*\*\s*-?\s*/,"");
        return <div key={i} style={{marginTop:i>0?14:0}}>
          <div style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--accent)",fontFamily:"Syne,sans-serif",fontWeight:700,marginBottom:6}}>{title}</div>
          {rest&&<div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6}}>{rest}</div>}
        </div>;
      }
      if(line.trim()) return <div key={i} style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,marginTop:6}}>{line}</div>;
      return null;
    });
  };

  return(
    <div>
      {/* Period selector */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[{k:"week",l:"This Week"},{k:"month",l:"This Month"},{k:"all",l:"All Time"}].map(p=>(
          <button key={p.k} onClick={()=>{setPeriod(p.k);setReport(null);}}
            style={{flex:1,padding:"8px 4px",border:"1px solid "+(period===p.k?"var(--accent)":"var(--border2)"),borderRadius:8,cursor:"pointer",fontSize:10,fontFamily:"DM Mono,monospace",background:period===p.k?"var(--accent-bg)":"var(--surface2)",color:period===p.k?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{p.l}</button>
        ))}
      </div>

      {/* Trade count for period */}
      <div style={{fontSize:11,color:"var(--text4)",marginBottom:14,textAlign:"center"}}>
        {getPeriodTrades().length} trade{getPeriodTrades().length!==1?"s":""}  in period
      </div>

      {/* Generate button */}
      {!report&&!loading&&(
        <><button onClick={generate} disabled={!getPeriodTrades().length||!apiKey}
          style={{width:"100%",background:apiKey?"var(--accent)":"var(--surface2)",color:apiKey?"var(--bg)":"var(--text4)",border:apiKey?"none":"1px solid var(--border2)",borderRadius:10,padding:"14px",fontFamily:"DM Mono,monospace",fontSize:13,fontWeight:500,letterSpacing:"0.1em",textTransform:"uppercase",cursor:apiKey?"pointer":"default",opacity:(getPeriodTrades().length&&apiKey)?1:0.5}}>
          {apiKey?"Generate AI Report":"API Key Required"}
        </button></>

      {/* Loading */}
      {loading&&(
        <div style={{textAlign:"center",padding:"40px 0"}}>
          <div style={{width:32,height:32,border:"3px solid var(--border)",borderTopColor:"var(--accent)",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 12px"}}/>

function getTraderRank(totalR){
  if(totalR <= 0)  return {label:"Rookie Trader",     icon:"🌱", col:"#718096"};
  if(totalR < 5)   return {label:"Developing Trader", icon:"⚡", col:"#a78bfa"};
  if(totalR < 15)  return {label:"Consistent Trader", icon:"📈", col:"#60a5fa"};
  if(totalR < 30)  return {label:"Skilled Trader",    icon:"🔥", col:"#f6ad55"};
  if(totalR < 50)  return {label:"Elite Trader",      icon:"💎", col:"#00e5a0"};
  return           {label:"Legendary Trader",          icon:"🏆", col:"#ffd700"};
}

// ── Shared chart components (used in both share overlays) ────
const C_BULL="#00e5a0", C_BEAR="#ff4d6d";
const Candle=({x,o,h,l,c,bw,color,op=1,glow=false})=>{
  const up=c<=o;// screen coords: bullish = close higher up = smaller y
  // If no explicit color passed, colour by candle direction (TradingView style)
  const col = color || (up?C_BULL:C_BEAR);
  const top=Math.min(o,c), bot=Math.max(o,c), bH=Math.max(2.5,bot-top);
  return(<g opacity={op}>
    {glow&&<rect x={x-bw/2-1.5} y={top-1.5} width={bw+3} height={bH+3} rx="2.5" fill={col} opacity="0.18"/>}
    <line x1={x} y1={h} x2={x} y2={top} stroke={col} strokeWidth="1" strokeLinecap="round" opacity="0.65"/>
    <line x1={x} y1={bot} x2={x} y2={l} stroke={col} strokeWidth="1" strokeLinecap="round" opacity="0.65"/>
    <rect x={x-bw/2} y={top} width={bw} height={bH} rx="1.5"
      fill={col+"e6"} stroke={col} strokeWidth="1.3"/>
  </g>);
};
const yS=(price,minP,maxP,padT,cH)=>padT+cH-((price-minP)/(maxP-minP||1))*cH;
// Entry marker — a small arrow + dashed line showing where price entered the setup
const EntryMark=({x,y,col,dir})=>{
  const up=dir==="up";
  return(<g>
    <circle cx={x} cy={y} r="3" fill={col} opacity="0.9"/>
    <circle cx={x} cy={y} r="5.5" fill="none" stroke={col} strokeWidth="1" opacity="0.4"/>
  </g>);
};
function Chart3BR({isWin:_dir,col}){
  const isWin=!_dir;  // flip: badge stays correct in wrapper, drawing matches direction
  const W=260,H=160,pL=14,pR=14,pT=18,pB=16;
  const cH=H-pT-pB;
  // 7 candles: 2 down, the pivot, the reversal, then 3 continuation
  const bull=[
    {o:50,h:46,l:54,c:53},{o:53,h:49,l:62,c:60},
    {o:60,h:57,l:74,c:72},   // 1 - strong down
    {o:72,h:69,l:78,c:74},   // 2 - pivot bar at the low
    {o:74,h:52,l:76,c:54},   // 3 - reversal up
    {o:54,h:40,l:56,c:42},{o:42,h:28,l:44,c:30},
  ];
  const bear=bull.map(c=>({o:120-c.o,h:120-c.l,l:120-c.h,c:120-c.c}));
  const candles=isWin?bull:bear;
  const mn=Math.min(...candles.flatMap(c=>[c.h,c.l]))-5;
  const mx=Math.max(...candles.flatMap(c=>[c.h,c.l]))+5;
  const Y=p=>yS(p,mn,mx,pT,cH);
  const n=candles.length, slot=(W-pL-pR)/n, bw=slot*0.46;
  const b1=2,b2=3,b3=4;
  const entryY=Y(candles[b3].c);
  return(<svg width={W} height={H} viewBox={"0 0 "+W+" "+H} style={{display:"block"}}>
    <rect width={W} height={H} fill="#080b14" rx="4"/>
    {[0.25,0.5,0.75].map((f,i)=><line key={i} x1={pL} y1={pT+f*cH} x2={W-pR} y2={pT+f*cH} stroke="#ffffff" strokeWidth="0.3" opacity="0.04"/>)}
    <rect x={pL+b1*slot-1} y={pT} width={3*slot+2} height={cH} fill="#ffffff" opacity="0.05" rx="3"/>
    {[b1,b2,b3].map((bi,k)=>(
      <text key={k} x={pL+(bi+0.5)*slot} y={pT-5} textAnchor="middle" fontSize="8" fill="#ffffff" opacity="0.55" fontFamily="monospace" fontWeight="bold">{k+1}</text>
    ))}
    {candles.map((c,i)=>{
      const x=pL+(i+0.5)*slot;
      const inSetup=i>=b1&&i<=b3;
      return <Candle key={i} x={x} o={Y(c.o)} h={Y(c.h)} l={Y(c.l)} c={Y(c.c)} bw={inSetup?bw+1:bw} op={inSetup?1:0.4} glow={i===b3}/>;
    })}
    <EntryMark x={pL+(b3+0.5)*slot} y={entryY} col={col} dir={isWin?"up":"down"}/>
  </svg>);
}

function ChartFVG({isWin:_dir,col}){
  const isWin=!_dir;  // flip: badge stays correct in wrapper, drawing matches direction
  const W=260,H=160,pL=14,pR=14,pT=18,pB=16;
  const cH=H-pT-pB;
  // 7 candles: 1 setup, 3-candle impulse (gap), retrace, entry, continuation
  const bull=[
    {o:80,h:76,l:84,c:78},
    {o:78,h:68,l:80,c:70},   // 1 impulse
    {o:70,h:58,l:72,c:60},   // 2 impulse (gap)
    {o:60,h:50,l:62,c:52},   // 3 impulse
    {o:52,h:50,l:66,c:64},   // retrace into gap
    {o:64,h:54,l:66,c:56},   // entry react
    {o:56,h:42,l:58,c:44},
  ];
  const bear=bull.map(c=>({o:120-c.o,h:120-c.l,l:120-c.h,c:120-c.c}));
  const candles=isWin?bull:bear;
  const mn=Math.min(...candles.flatMap(c=>[c.h,c.l]))-5;
  const mx=Math.max(...candles.flatMap(c=>[c.h,c.l]))+5;
  const Y=p=>yS(p,mn,mx,pT,cH);
  const n=candles.length, slot=(W-pL-pR)/n, bw=slot*0.46;
  // gap between candle1 high and candle3 low
  const gapA=isWin?Y(candles[1].h):Y(candles[1].l);
  const gapB=isWin?Y(candles[3].l):Y(candles[3].h);
  const gapTop=Math.min(gapA,gapB), gapBot=Math.max(gapA,gapB);
  const gapLeft=pL+1*slot-bw/2;
  const entryIdx=5;
  const entryY=Y(candles[entryIdx].c);
  return(<svg width={W} height={H} viewBox={"0 0 "+W+" "+H} style={{display:"block"}}>
    <rect width={W} height={H} fill="#080b14" rx="4"/>
    {[0.25,0.5,0.75].map((f,i)=><line key={i} x1={pL} y1={pT+f*cH} x2={W-pR} y2={pT+f*cH} stroke="#ffffff" strokeWidth="0.3" opacity="0.04"/>)}
    <rect x={gapLeft} y={gapTop} width={W-pR-gapLeft} height={gapBot-gapTop} fill={col} opacity="0.16" rx="2"/>
    <line x1={gapLeft} y1={gapTop} x2={W-pR} y2={gapTop} stroke={col} strokeWidth="0.8" strokeDasharray="3,2" opacity="0.55"/>
    <line x1={gapLeft} y1={gapBot} x2={W-pR} y2={gapBot} stroke={col} strokeWidth="0.8" strokeDasharray="3,2" opacity="0.55"/>
    <text x={isWin?W-pR-3:pL+3} y={gapTop-4} textAnchor={isWin?"end":"start"} fontSize="7.5" fill={col} opacity="0.95" fontFamily="monospace" fontWeight="bold">FVG</text>
    {candles.map((c,i)=>{

function ChartIRLERL({isWin:_dir,col}){
  const isWin=!_dir;
  const W=260,H=160,pL=14,pR=44,pT=20,pB=18;
  const cH=H-pT-pB;
  // IRL -> ERL: price ranges inside the IRL band, then is drawn OUT to the ERL line. Curved arrow shows draw direction.
  // Long: ERL line at TOP, IRL band lower; price breaks up out of the band toward ERL.
  const longData=[
    {o:74,h:68,l:88,c:72},   // dip to lower IRL edge
    {o:72,h:62,l:76,c:64},   // up inside band
    {o:64,h:58,l:72,c:70},   // pull back
    {o:70,h:60,l:74,c:62},   // up
    {o:62,h:50,l:66,c:64},   // tag lower? ranging
    {o:64,h:42,l:68,c:46},   // break up out of band
    {o:46,h:30,l:50,c:34},   // impulse toward ERL
    {o:34,h:24,l:38,c:28},   // tag ERL
  ];
  const shortData=longData.map(c=>({o:120-c.o,h:120-c.l,l:120-c.h,c:120-c.c}));
  const candles=isWin?longData:shortData;
  const mn=Math.min(...candles.flatMap(c=>[c.h,c.l]))-6;
  const mx=Math.max(...candles.flatMap(c=>[c.h,c.l]))+6;
  const Y=p=>yS(p,mn,mx,pT,cH);
  const n=candles.length, slot=(W-pL-pR)/n, bw=slot*0.42;
  const erlY=Y(isWin?27:93);
  // IRL band edges (the internal range price oscillates in)
  const bandHi=Y(isWin?60:78);
  const bandLo=Y(isWin?78:60);
  const arrowUp=isWin;
  return(<svg width={W} height={H} viewBox={"0 0 "+W+" "+H} style={{display:"block"}}>
    <rect width={W} height={H} fill="#080b14" rx="4"/>
    {/* ERL single dashed line + label at right */}
    <line x1={pL+1.5*slot} y1={erlY} x2={W-pR} y2={erlY} stroke="#c9d4e2" strokeWidth="1" strokeDasharray="5,3" opacity="0.85"/>
    <text x={W-pR+4} y={erlY+3} fontSize="8" fill="#c9d4e2" opacity="0.9" fontFamily="monospace" fontWeight="bold">ERL</text>
    {/* IRL band: two thin lines + label */}
    <line x1={pL} y1={bandHi} x2={W-pR} y2={bandHi} stroke={C_BEAR} strokeWidth="0.9" opacity="0.55"/>
    <line x1={pL} y1={bandLo} x2={W-pR} y2={bandLo} stroke={C_BEAR} strokeWidth="0.9" opacity="0.55"/>
    <text x={W-pR+4} y={(isWin?bandLo:bandHi)+3} fontSize="8" fill={C_BEAR} opacity="0.8" fontFamily="monospace" fontWeight="bold">IRL</text>
    {candles.map((c,i)=>{
      const x=pL+(i+0.5)*slot;
      return <Candle key={i} x={x} o={Y(c.o)} h={Y(c.h)} l={Y(c.l)} c={Y(c.c)} bw={bw} op={1} glow={i===n-1}/>;
    })}
    {/* curved draw arrow on the right */}
    {(()=>{
      const ax=W-pR+22, ayTop=pT+8, ayBot=H-pB-8;
      const path=arrowUp
        ? "M "+ax+" "+ayBot+" Q "+(ax+16)+" "+((ayTop+ayBot)/2)+" "+ax+" "+ayTop
        : "M "+ax+" "+ayTop+" Q "+(ax+16)+" "+((ayTop+ayBot)/2)+" "+ax+" "+ayBot;
      const headY=arrowUp?ayTop:ayBot;
      const dir=arrowUp?1:-1;
      return(<g stroke="#c9d4e2" fill="none" opacity="0.75">
        <path d={path} strokeWidth="1.4"/>
        <path d={"M "+(ax-4)+" "+(headY+dir*6)+" L "+ax+" "+headY+" L "+(ax+4)+" "+(headY+dir*6)} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
      </g>);
    })()}
  </svg>);
}

    {o:46,h:40,l:52,c:50},   // into IRL band

  ];

    })}
    {/* curved arrow showing the return into IRL */}
    {(()=>{
      const ax=W-pR+22, ayTop=pT+8, ayBot=H-pB-8;
      const path=arrowUp
        ? "M "+ax+" "+ayBot+" Q "+(ax+16)+" "+((ayTop+ayBot)/2)+" "+ax+" "+ayTop
        : "M "+ax+" "+ayTop+" Q "+(ax+16)+" "+((ayTop+ayBot)/2)+" "+ax+" "+ayBot;

    const DAYS_ORDER=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

                    :<svg width="7" height="7" viewBox="0 0 8 8"><polygon points="0,0 8,0 4,8" fill={col}/></svg>}
                  <span style={{fontSize:9,color:col+"90",fontFamily:"DM Mono,monospace",letterSpacing:"0.07em"}}>{t.direction.toUpperCase()} · {t.contracts}cont · {t.session}</span>
                </div>
              </div>

              <div style={{height:1,background:"linear-gradient(90deg,transparent,"+col+"20,transparent)",margin:"0 22px"}}/>

              <div style={{padding:"10px 22px 0",display:"flex"}}>
