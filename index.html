                  <div style={{fontSize:7,color:"#ffffff18",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>Entry</div>
                  <div style={{fontFamily:"DM Mono,monospace",fontSize:12,color:"#ffffff40"}}>{parseFloat(t.entry||0).toFixed(2)}</div>
                </div>
                {exitPrice&&<div style={{flex:1}}>
                  <div style={{fontSize:7,color:"#ffffff18",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>Exit</div>
                  <div style={{fontFamily:"DM Mono,monospace",fontSize:12,color:col+"80"}}>{parseFloat(exitPrice).toFixed(2)}</div>
                </div>}
                {t.stop&&<div style={{flex:1}}>
                  <div style={{fontSize:7,color:"#ffffff18",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>Stop</div>
                  <div style={{fontFamily:"DM Mono,monospace",fontSize:12,color:"#ff4d6d40"}}>{parseFloat(t.stop).toFixed(2)}</div>
                </div>}
              </div>

              <div style={{padding:"10px 22px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                <div style={{fontFamily:"Syne,sans-serif",fontSize:10,color:"#ffffff15",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>{traderName||"LOGGED"}</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  {[t.tradeType,t.session].filter(Boolean).map((tag,i)=>(
                    <span key={i} style={{fontSize:8,padding:"2px 8px",borderRadius:20,background:"#ffffff06",border:"1px solid #ffffff0e",color:"#ffffff25",letterSpacing:"0.04em"}}>{tag}</span>
                  ))}
                </div>
              </div>
            </div>

            <button onClick={()=>setShareTrade(null)} style={{marginTop:18,background:"none",border:"1px solid var(--accent-dim)",borderRadius:8,padding:"11px 32px",color:"var(--accent)",fontFamily:"DM Mono,monospace",fontSize:11,cursor:"pointer",letterSpacing:"0.08em"}}>Close</button>
          </div>
        );
      })()}


      {/* Save toast */}
      {saveToast&&(
        <div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",zIndex:400,background:"var(--surface)",border:"1px solid var(--accent-dim)",borderRadius:12,padding:"10px 20px",boxShadow:"0 8px 32px rgba(0,0,0,0.4)",display:"flex",alignItems:"center",gap:8,animation:"fadeSlideIn 0.2s ease",whiteSpace:"nowrap"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span style={{fontSize:12,color:"var(--accent)",fontFamily:"DM Mono,monospace",letterSpacing:"0.05em"}}>{saveToast}</span>
        </div>
      )}

      {/* Save confirm sheet */}
      {showSaveConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,display:"flex",alignItems:"flex-end"}} onClick={()=>{setShowSaveConfirm(false);setView("journal");}}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px 16px",paddingBottom:"calc(20px + env(safe-area-inset-bottom))",animation:"fadeSlideIn 0.2s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"var(--accent-bg)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div>
                <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:15,color:"var(--text)"}}>Trade logged</div>
                <div style={{fontSize:11,color:"var(--text4)",marginTop:1}}>What would you like to do next?</div>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>{const inst=form.instrument;const sess=form.session;setShowSaveConfirm(false);setForm({...blankFormWithDefaults(),instrument:inst,session:sess});setView("add");}}
                style={{width:"100%",background:"var(--accent-bg)",border:"1px solid var(--accent-dim)",borderRadius:12,padding:"14px 16px",color:"var(--accent)",fontFamily:"DM Mono,monospace",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontWeight:500}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Log Another Trade
              </button>
              <button onClick={()=>{setShowSaveConfirm(false);setView("journal");}}
                style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:12,padding:"14px 16px",color:"var(--text3)",fontFamily:"DM Mono,monospace",fontSize:13,cursor:"pointer"}}>
                View Journal
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Milestone toast */}
      {milestoneMsg&&(
        <div style={{position:"fixed",top:80,left:16,right:16,zIndex:400,background:"var(--surface)",border:"1px solid var(--accent-dim)",borderRadius:12,padding:"14px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.4)",animation:"fadeSlideIn 0.3s ease",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"var(--accent-bg)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"var(--accent)",fontFamily:"Syne,sans-serif",fontWeight:700,letterSpacing:"0.05em",marginBottom:2}}>MILESTONE</div>
            <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.5}}>{milestoneMsg}</div>
          </div>
        </div>
      )}

      {/* Share Equity Curve */}
      {shareCurve&&(()=>{
        const sym = (curr&&curr.symbol)||"$";
        const startBal = balance||0;
        const vals = startBal>0 ? stats.equity.map(e=>startBal+e.eq) : stats.equity.map(e=>e.eq);
        const mn = Math.min(...vals, startBal||0);
        const mx = Math.max(...vals, startBal||0);
        const rng = mx-mn||1;
        const W=280, H=100;
        const pts = vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/rng)*H}`).join(" ");
        const zy = H-((startBal-mn)/rng)*H;
        const col = stats.totalPnl>=0?"#00e5a0":"#ff4d6d";
        const fmtV = v => {
          if(Math.abs(v)>=1000) return `${sym}${(v/1000).toFixed(1)}k`;
          return `${sym}${v.toFixed(0)}`;
        };
        const retPct = startBal>0?((stats.totalPnl/startBal)*100).toFixed(2):null;
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:300,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setShareCurve(false)}>
            
            <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:320,background:"#0c0f14",borderRadius:20,overflow:"hidden",border:"1px solid #1c2230"}}>
              <div style={{height:3,background:"linear-gradient(90deg,"+col+","+col+"40)"}}/>
              <div style={{padding:"20px 20px 16px"}}>
                {/* Header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                  <div>
                    <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:18,color:"#ffffff",lineHeight:1}}>Performance</div>
                    <div style={{fontSize:10,color:"var(--text5)",marginTop:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>{stats.total} trades</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:20,fontWeight:500,color:col}}>{stats.totalPnl>=0?"+":""}{sym}{Math.abs(stats.totalPnl).toFixed(0)}</div>
                    {retPct&&<div style={{fontSize:10,color:col+"80",marginTop:2}}>{retPct>=0?"+":""}{retPct}% return</div>}
                  </div>
                </div>
                {/* Curve */}
                <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:110,overflow:"visible",marginBottom:12}}>
                  {startBal>0&&<line x1={0} y1={zy} x2={W} y2={zy} stroke="#a78bfa" strokeWidth={1} strokeDasharray="4,3" opacity={0.4}/>}
                  <polygon points={"0,"+H+" "+pts+" "+W+","+H} fill={col} fillOpacity={0.08}/>
                  <polyline points={pts} fill="none" stroke={col} strokeWidth={2} strokeLinejoin="round"/>
                  {vals.map((v,i)=>(
                    <circle key={i} cx={(i/(vals.length-1))*W} cy={H-((v-mn)/rng)*H} r={2.5} fill={col} opacity={0.5}/>
                  ))}
                  <text x={4} y={H-((vals[0]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.6}>{fmtV(vals[0])}</text>
                  <text x={W-4} y={H-((vals[vals.length-1]-mn)/rng)*H-6} fontSize={8} fill={col} fillOpacity={0.9} textAnchor="end">{fmtV(vals[vals.length-1])}</text>
                </svg>
                {/* Key stats row */}
                <div style={{height:1,background:"#1c2230",marginBottom:12}}/>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  {[
                    {l:"Win Rate",v:stats.winRate.toFixed(1)+"%"},
                    {l:"Avg R",v:stats.avgR?(stats.avgR>=0?"+":"")+stats.avgR.toFixed(2)+"R":"—"},
                    {l:"Profit Factor",v:stats.pf===Infinity?"∞":stats.pf>0?stats.pf.toFixed(2):"—"},
                  ].map((s,i)=>(
                    <div key={i} style={{textAlign:"center"}}>
                      <div style={{fontSize:8,color:"var(--text5)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>{s.l}</div>
                      <div style={{fontFamily:"DM Mono,monospace",fontSize:13,color:"var(--text3)"}}>{s.v}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{padding:"10px 20px",borderTop:"1px solid #1c2230",display:"flex",justifyContent:"space-between"}}>
                {/* trader name in footer */}
                <div style={{fontFamily:"Syne,sans-serif",fontSize:9,color:"var(--text5)",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>{traderName||"LOGGED"}</div>
                <div style={{fontSize:9,color:"#1c2230",letterSpacing:"0.1em"}}>logged.app</div>
              </div>
            </div>
            <button onClick={()=>setShareCurve(false)} style={{marginTop:16,background:"none",border:"1px solid var(--accent-dim)",borderRadius:8,padding:"10px 24px",color:"var(--accent)",fontFamily:"DM Mono,monospace",fontSize:11,cursor:"pointer"}}>Close</button>
          </div>
        );
      })()}

      {/* Content */}
      <div className="content" ref={contentRef} onTouchStart={e=>{pullStartY.current=e.touches[0].clientY;pullActive.current=(contentRef.current&&contentRef.current.scrollTop)===0;}} onTouchMove={e=>{if(!pullActive.current)return;const dy=e.touches[0].clientY-pullStartY.current;if(dy>60&&(contentRef.current&&contentRef.current.scrollTop)===0){setPullRefresh(true);}}} onTouchEnd={()=>{if(pullRefresh){setTimeout(()=>setPullRefresh(false),800);}pullActive.current=false;}}>

        {/* Pull to refresh indicator */}
        {pullRefresh&&(
          <div style={{textAlign:"center",padding:"8px 0 4px",color:"var(--accent)",fontSize:11,letterSpacing:"0.1em",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{animation:"spin 0.8s linear infinite"}}>
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Refreshing...
          </div>
        )}

        {/* JOURNAL */}
        {view==="journal"&&(
          <>
            {showInstall&&(
              <div className="install-banner">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                <p>
                  {isIOS
                    ? <>Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong> to install Logged as an app.</>
                    : <>Tap <strong>Install</strong> to add Logged to your home screen.</>
                  }
                </p>
                {!isIOS&&deferredPrompt&&(
                  <button onClick={async()=>{deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==="accepted")dismissInstall();}}>Install</button>
                )}
                {isIOS&&<button onClick={dismissInstall}>Got it</button>}
              </div>
            )}

            <div className="section-title">Trade Log</div>

            <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:12,marginTop:-8}}>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {/* Sort dropdown */}
                <div style={{position:"relative",display:"flex",alignItems:"center",background:"none",border:"1px solid var(--accent-dim)",borderRadius:8,overflow:"hidden",height:36}}>
                  <span style={{fontSize:11,color:"var(--text4)",fontFamily:"DM Mono,monospace",padding:"0 8px 0 12px",flexShrink:0}}>Sort</span>
                  <div style={{width:1,height:20,background:"var(--accent-dim)"}}/>
                  <select value={sortOrder} onChange={e=>setSortOrder(e.target.value)} style={{background:"transparent",border:"none",padding:"0 28px 0 8px",color:"var(--accent)",fontSize:11,fontFamily:"DM Mono,monospace",cursor:"pointer",outline:"none",appearance:"none",WebkitAppearance:"none",height:36}}>
                    <option value="date">Date</option>
                    <option value="pnl">P&amp;L</option>
                    <option value="r">R</option>
                  </select>
                  <svg style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" color="var(--text4)"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <button onClick={()=>setShowSearch(s=>!s)} style={{background:showSearch?"var(--accent-bg)":"none",border:"1px solid var(--accent-dim)",borderRadius:8,height:36,padding:"0 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:"var(--accent)",transition:"all 0.15s",position:"relative"}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <span style={{fontSize:11,fontFamily:"DM Mono,monospace"}}>Filter</span>
                  {(filterOutcome!=="All"||filterInstrument!=="All"||filterDirection!=="All"||searchQuery)&&<div style={{position:"absolute",top:-3,right:-3,width:8,height:8,borderRadius:"50%",background:"var(--accent)"}}/>}
                </button>
              </div>
            </div>

            {trades.length>0&&(()=>{
              const recent=[...trades].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
              const scores=recent.map(t=>calcDisciplineScore(t));
              const avg=Math.round(scores.reduce((s,x)=>s+x,0)/scores.length*10)/10;
              const col=avg>=8?"#00e5a0":avg>=6?"#f6ad55":"#ff4d6d";
              const label=avg>=8?"Excellent":avg>=6?"Good":avg>=4?"Needs work":"Poor";
              const C=2*Math.PI*28;
              const dash=(avg/10)*C;
              return(
                <div className="stat-card" style={{marginBottom:16,background:"linear-gradient(135deg,"+col+"08 0%,transparent 60%)",border:"1px solid "+col+"30",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,"+col+","+col+"40,transparent)"}}/>
                  <div style={{display:"flex",alignItems:"center",gap:16}}>
                    <div style={{position:"relative",flexShrink:0,width:72,height:72}}>
                      <svg width="72" height="72" viewBox="0 0 72 72">
                        <circle cx="36" cy="36" r="28" fill="none" stroke="var(--border2)" strokeWidth="5"/>
                        <circle cx="36" cy="36" r="28" fill="none" stroke={col} strokeWidth="5"
                          strokeDasharray={dash+" "+(C-dash)}
                          strokeDashoffset={C*0.25}
                          strokeLinecap="round"/>
                      </svg>
                      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                        <div style={{fontFamily:"Syne,sans-serif",fontWeight:900,fontSize:20,color:col,lineHeight:1}}>{avg}</div>
                        <div style={{fontSize:7,color:"var(--text5)",letterSpacing:"0.1em"}}>/10</div>
                      </div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,color:"var(--text)"}}>Discipline Score</div>
                        <div style={{fontSize:10,color:col,background:col+"15",border:"1px solid "+col+"30",borderRadius:6,padding:"2px 8px",letterSpacing:"0.06em"}}>{label}</div>
                      </div>
                      <div style={{fontSize:11,color:"var(--text4)",marginBottom:8}}>Last {recent.length} trades</div>
                      <div style={{display:"flex",gap:3,alignItems:"flex-end",height:24}}>
                        {scores.map((sc,i)=>{
                          const bc=sc>=8?"#00e5a0":sc>=6?"#f6ad55":"#ff4d6d";
                          return(<div key={i} title={"Trade "+(recent.length-i)+": "+sc+"/10"} style={{flex:1,height:(sc/10*24)+"px",background:bc,borderRadius:"2px 2px 0 0",opacity:0.7,minHeight:3}}/>);
                        })}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:12}}>
                    {[
                      {l:"Checklist",v:Math.round(recent.filter(t=>(t.checklist||[]).length>0).length/recent.length*100)+"%"},
                      {l:"Notes",v:Math.round(recent.filter(t=>(t.notes||"").length>20).length/recent.length*100)+"%"},
                      {l:"Emotion",v:Math.round(recent.filter(t=>(t.emotion||[]).length>0).length/recent.length*100)+"%"},
                    ].map(({l,v})=>(
                      <div key={l} style={{background:"var(--surface2)",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                        <div style={{fontSize:14,fontWeight:600,color:"var(--text)",fontFamily:"DM Mono,monospace"}}>{v}</div>
                        <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.08em",textTransform:"uppercase",marginTop:2}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* Search & Filter panel */}
            {showSearch&&(
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px",marginBottom:14}}>
                {/* Search */}
                <input className="field-input" placeholder="Search notes, instrument, strategy..." value={searchQuery}
                  onChange={e=>setSearchQuery(e.target.value)}
                  style={{marginBottom:10,fontSize:16,padding:"10px 12px"}}/>

                {/* Outcome filter */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Outcome</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {["All","TP","SL","BE","Partial"].map(o=>(
                      <button key={o} onClick={()=>setFilterOutcome(o)} style={{padding:"5px 12px",border:"1px solid "+(filterOutcome===o?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"DM Mono,monospace",background:filterOutcome===o?"var(--accent-bg)":"var(--input-bg)",color:filterOutcome===o?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{o}</button>
                    ))}
                  </div>
                </div>

                {/* Instrument filter */}
                <div>
                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Instrument</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button onClick={()=>setFilterInstrument("All")} style={{padding:"5px 12px",border:"1px solid "+(filterInstrument==="All"?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"DM Mono,monospace",background:filterInstrument==="All"?"var(--accent-bg)":"var(--input-bg)",color:filterInstrument==="All"?"var(--accent)":"var(--text4)"}}>All</button>
                    {INSTRUMENTS.filter(i=>trades.some(t=>t.instrument===i.symbol)).map(i=>(
                      <button key={i.symbol} onClick={()=>setFilterInstrument(i.symbol)} style={{padding:"5px 12px",border:"1px solid "+(filterInstrument===i.symbol?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"DM Mono,monospace",background:filterInstrument===i.symbol?"var(--accent-bg)":"var(--input-bg)",color:filterInstrument===i.symbol?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{i.symbol}</button>
                    ))}
                  </div>
                </div>

                {/* Direction filter */}
                <div>
                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Direction</div>
                  <div style={{display:"flex",gap:6}}>
                    {["All","Long","Short"].map(d=>(
                      <button key={d} onClick={()=>setFilterDirection(d)} style={{padding:"5px 12px",border:"1px solid "+(filterDirection===d?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"DM Mono,monospace",background:filterDirection===d?"var(--accent-bg)":"var(--input-bg)",color:filterDirection===d?"var(--accent)":d==="Long"?"#00e5a0aa":d==="Short"?"#ff4d6daa":"var(--text4)",transition:"all 0.15s"}}>{d}</button>
                    ))}
                  </div>
                </div>

                {(searchQuery||filterOutcome!=="All"||filterInstrument!=="All"||filterDirection!=="All")&&(
                  <button onClick={()=>{setSearchQuery("");setFilterOutcome("All");setFilterInstrument("All");setFilterDirection("All");setSortOrder("date");}} style={{marginTop:10,background:"none",border:"none",color:"var(--text4)",fontSize:11,fontFamily:"DM Mono,monospace",cursor:"pointer",textDecoration:"underline"}}>Clear all</button>
                )}
              </div>
            )}

            {/* Daily goal progress banner */}
            {(()=>{
              const todayStr = new Date().toISOString().split("T")[0];
              const todayPnl = trades.filter(t=>t.date===todayStr).reduce((s,t)=>s+calc(t).pnl,0);
              const dailyGoals = goals.filter(g=>g.period==="Daily"&&g.targets&&g.targets.length>0);
              if(!dailyGoals.length) return null;
              const g = dailyGoals[0];
              const pnlTarget = g.targets.find(t=>t.type==="PnL");
              if(!pnlTarget) return null;
              const target = parseFloat(pnlTarget.amount)||0;
              if(!target) return null;
              const pct = Math.min(100, Math.max(0, (todayPnl/target)*100));
              const met = todayPnl>=target;
              const col = met?"#00e5a0":todayPnl<0?"#ff4d6d":"#f6ad55";
              return(
                <div style={{background:"var(--surface)",border:"1px solid "+(met?"#00e5a030":"var(--border)"),borderRadius:10,padding:"11px 14px",marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                    <div style={{fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--text4)",fontFamily:"DM Mono,monospace"}}>{g.title||"Daily Target"}</div>
                    <div style={{fontSize:12,color:col,fontFamily:"DM Mono,monospace",fontWeight:500}}>{fmt(todayPnl)} <span style={{color:"var(--text5)"}}>/ {curr.symbol}{target.toLocaleString()}</span></div>
                  </div>
                  <div style={{height:4,borderRadius:2,background:"var(--surface2)",overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",borderRadius:2,background:col,transition:"width 0.4s ease"}}/>
                  </div>
                  <div style={{fontSize:9,color:col,marginTop:5,letterSpacing:"0.06em",fontFamily:"DM Mono,monospace"}}>
                    {met
                      ? "✓ Target reached"
                      : todayPnl<0
                        ? fmt(todayPnl)+" behind · need "+fmt(target-todayPnl)+" to recover"
                        : fmt(target-todayPnl)+" to go"
                    }
                  </div>
                </div>
              );
            })()}

            {/* Consecutive loss warning */}
            {stats.streak.type==="L"&&stats.streak.count>=2&&(
              <div style={{background:"#ff4d6d12",border:"1px solid #ff4d6d30",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f6ad55" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <div>
                  <div style={{fontSize:13,color:"#ff4d6d",fontWeight:500,marginBottom:2}}>{stats.streak.count} losses in a row</div>
                  <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>Consider stepping away. Protect your capital.</div>
                </div>
              </div>
            )}

            {/* Daily trade limit warning */}
            {dailyTradeLimit>0&&(()=>{
              const todayTrades = trades.filter(t=>t.date===new Date().toISOString().split("T")[0]);
              if(todayTrades.length>=dailyTradeLimit) return(
                <div style={{background:"#f6ad5512",border:"1px solid #f6ad5530",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff4d6d" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                  <div>
                    <div style={{fontSize:13,color:"#f6ad55",fontWeight:500,marginBottom:2}}>Daily trade limit reached</div>
                    <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>You've hit your {dailyTradeLimit} trade limit for today.</div>
                  </div>
                </div>
              );
              return null;
            })()}

            {/* Max daily loss warning */}
            {maxDailyLoss>0&&(()=>{
              const todayPnl = trades.filter(t=>t.date===new Date().toISOString().split("T")[0]).reduce((s,t)=>s+calc(t).pnl,0);
              if(todayPnl<=-maxDailyLoss) return(
                <div style={{background:"#ff4d6d12",border:"1px solid #ff4d6d40",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff4d6d" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                  <div>
                    <div style={{fontSize:13,color:"#ff4d6d",fontWeight:500,marginBottom:2}}>Max daily loss hit — STOP TRADING</div>
                    <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>You've lost {curr.symbol}{Math.abs(todayPnl).toFixed(0)} today. Walk away.</div>
                  </div>
                </div>
              );
              return null;
            })()}

            {trades.length===0?(
              <div className="empty">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style={{marginBottom:16,opacity:0.4}}>
                  <rect x="4" y="44" width="10" height="16" rx="2" fill="#00e5a0"/>
                  <rect x="20" y="30" width="10" height="30" rx="2" fill="#00e5a0" opacity="0.7"/>
                  <rect x="36" y="18" width="10" height="42" rx="2" fill="#00e5a0" opacity="0.5"/>
                  <rect x="52" y="8" width="10" height="52" rx="2" fill="#00e5a0" opacity="0.3"/>
                  <polyline points="9,36 25,22 41,28 57,8" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                  <circle cx="9" cy="36" r="3" fill="#00e5a0"/>
                  <circle cx="25" cy="22" r="3" fill="#00e5a0"/>
                  <circle cx="41" cy="28" r="3" fill="#00e5a0"/>
                  <circle cx="57" cy="8" r="3" fill="#00e5a0"/>
                </svg>
                <div className="empty-title">Clean slate</div>
                <div className="empty-sub">Log your first trade and start building your edge.</div>
                <button className="btn-ghost" style={{width:"auto",padding:"12px 32px",marginTop:8}} onClick={()=>setView("add")}>+ Log Trade</button>
              </div>
            ):groupedTrades.length===0?(
              (searchQuery||filterOutcome!=="All"||filterInstrument!=="All")?(
                <div className="empty">
                  <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style={{marginBottom:16,opacity:0.4}}>
                    <circle cx="24" cy="24" r="16" stroke="#00e5a0" strokeWidth="2.5"/>
                    <line x1="35" y1="35" x2="50" y2="50" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round"/>
                    <line x1="18" y1="24" x2="30" y2="24" stroke="#00e5a0" strokeWidth="2" strokeLinecap="round"/>
                  </svg>
                  <div className="empty-title">No matches</div>
                  <div className="empty-sub">
                    {searchQuery?"No trades matching \""+searchQuery+"\"":
                     filterInstrument!=="All"&&filterOutcome!=="All"?"No "+filterOutcome+" trades on "+filterInstrument:
                     filterInstrument!=="All"?"No trades on "+filterInstrument:
                     "No "+filterOutcome+" trades yet"}
                  </div>
                  <button className="btn-ghost" style={{width:"auto",padding:"10px 24px",marginTop:8}} onClick={()=>{setSearchQuery("");setFilterOutcome("All");setFilterInstrument("All");setFilterDirection("All");setSortOrder("date");}}>Clear filters</button>
                </div>
              ):(
                <div className="empty">
                  <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style={{marginBottom:16,opacity:0.3}}>
                    <rect x="8" y="16" width="40" height="30" rx="4" stroke="#00e5a0" strokeWidth="2"/>
                    <line x1="8" y1="24" x2="48" y2="24" stroke="#00e5a0" strokeWidth="2"/>
                    <line x1="20" y1="8" x2="20" y2="20" stroke="#00e5a0" strokeWidth="2" strokeLinecap="round"/>
                    <line x1="36" y1="8" x2="36" y2="20" stroke="#00e5a0" strokeWidth="2" strokeLinecap="round"/>
                  </svg>
                  <div className="empty-title">No trades yet</div>
                  <div className="empty-sub">Nothing logged for this period.</div>
                </div>
              )
            ):(
              groupedTrades.map(([date, dayTrades])=>{
                const dp=dayPnl(dayTrades);
                return(
                  <div key={date}>
                    <div className="date-sep">
                      <span>{formatDate(date)}</span>
                      <span style={{color:dp>=0?"#00e5a060":"#ff4d6d60",fontSize:11}}>{fmt(dp)}</span>
                    </div>
                    {dayTrades.map(trade=>{
                      const {pnl,ticks,r}=calc(trade);
                      const imgs=trade.images||[];
                      const isExp=expanded===trade.id;
                      return(
                        <SwipeToDelete key={trade.id} onDelete={()=>confirmDelete(trade.id)} onEdit={()=>edit(trade)}>
                        <div className="trade-card" style={(()=>{const sc=calcDisciplineScore(trade);return sc<=4?{borderColor:"#f6ad5530",boxShadow:"inset 0 0 0 1px #f6ad5515"}:sc<=6?{borderColor:"#f6ad5518"}:{};})()} >
                          <div className="trade-card-header" style={{padding:compactCards?"10px 14px 8px":"14px 14px 12px"}} onClick={()=>setExpanded(isExp?null:trade.id)}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                                <span style={{fontSize:compactCards?13:14,fontWeight:800,color:"var(--text)",fontFamily:"Syne,sans-serif",letterSpacing:"-0.01em"}}>{trade.instrument}</span>
                                <span style={{fontSize:11,color:trade.direction==="Long"?"var(--accent)":"#ff4d6d"}}>{trade.direction==="Long"?"▲ Long":"▼ Short"}</span>
                                <span style={{fontSize:11,color:"var(--text3)"}}>×{trade.contracts}</span>
                                {trade.outcome&&<span style={{fontSize:9,letterSpacing:"0.08em",padding:"2px 6px",borderRadius:4,background:
                                  trade.outcome==="SL"?"#ff4d6d20":trade.outcome==="BE"?"#71809620":"var(--accent-bg)",
                                  color:trade.outcome==="SL"?"#ff4d6d":trade.outcome==="BE"?"var(--text3)":"var(--accent)"}}>
                                  {trade.outcome==="SL"?"● SL":trade.outcome==="BE"?"● BE":"● TP"}
                                </span>}
                                {imgs.length>0&&<span style={{fontSize:10,color:"var(--text3)",display:"flex",alignItems:"center",gap:2}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>{imgs.length}</span>}
                                {(trade.emotion||[]).length>0&&<span style={{fontSize:10,color:"var(--text3)"}}>{(Array.isArray(trade.emotion)?trade.emotion:[trade.emotion]).map(e=>e.split(" ")[0]).join(" ")}</span>}
                                {showCheckScore&&trade.checklist&&trade.checklist.length>0&&(
                                  <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background: trade.checklist.length===checklistItems.length?"#00e5a020":"var(--border)",color:trade.checklist.length===checklistItems.length?"var(--accent)":"var(--text3)",letterSpacing:"0.05em"}}>
                                    ✓ {trade.checklist.length}/{checklistItems.length}
                                  </span>
                                )}
                              </div>
                              {/* Discipline score on its own line */}
                              {(()=>{
                                const sc=calcDisciplineScore(trade);
                                const dc=sc>=8?"#00e5a0":sc>=6?"#f6ad55":"#ff4d6d";
                                const missing=[];
                                if(checklistItems.length>0&&(trade.checklist||[]).length<checklistItems.length) missing.push("checklist");
                                if((trade.notes||"").trim().length<20) missing.push("notes");
                                if(!(trade.emotion||[]).length) missing.push("emotion");
                                if(!(trade.images||[]).length) missing.push("chart");
                                const hint = sc<8&&missing.length ? "missing: "+missing.slice(0,2).join(", ") : "";
                                return(
                                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6,marginTop:2}}>
                                    <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:9,color:dc,fontFamily:"DM Mono,monospace",fontWeight:600}}>
                                      <span style={{width:6,height:6,borderRadius:"50%",background:dc,display:"inline-block",flexShrink:0}}/>
                                      {sc}/10
                                    </span>
                                    {hint&&<span style={{fontSize:9,color:"var(--text5)",fontFamily:"DM Mono,monospace",letterSpacing:"0.03em"}}>· {hint}</span>}
                                  </div>
                                );
                              })()}
                              <div style={{display:"flex",gap:16}}>
                                <div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>P&amp;L</div>
                                  <div style={{fontSize:compactCards?14:16,fontWeight:500,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</div>
                                </div>
                                <div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Ticks</div>
                                  <div style={{fontSize:compactCards?14:16,color:ticks>0?"var(--accent)":ticks<0?"#ff4d6d":"var(--text3)"}}>{ticks>=0?"+":""}{ticks}</div>
                                </div>
                                {r!==null&&<div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>R</div>
                                  <div style={{fontSize:compactCards?14:16,fontWeight:600,color:r>=0?"var(--accent)":"#ff4d6d"}}>{r>=0?"+":""}{r}R</div>
                                </div>}
                                {balance>0&&(()=>{const ret=(pnl/balance*100);return(<div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Return</div>
                                  <div style={{fontSize:compactCards?14:16,color:ret>=0?"var(--accent)":"#ff4d6d"}}>{ret>=0?"+":""}{ret.toFixed(2)}%</div>
                                </div>);})()}
                                {(()=>{const {rr}=calc(trade); return rr?(<div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>RR</div>
                                  <div style={{fontSize:16,color:"var(--text3)"}}>1:{rr}</div>
                                </div>):null;})()}
                              </div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text5)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transition:"transform 0.2s",transform:isExp?"rotate(180deg)":"rotate(0deg)"}}><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                          </div>

                          {isExp&&(
                            <div className="trade-card-body" style={{paddingTop:14}}>
                              <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
                                {/* Multi-entry fills */}
                                {(trade.entries&&trade.entries.length>0)?(
                                  <>
                                    {trade.entries.map((en,i)=>(
                                      <div key={i} style={{flex:1,minWidth:60}}>
                                        <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>E{i+1} {en.contracts&&<span style={{color:"var(--text5)"}}>({en.contracts}ct)</span>}</div>
                                        <div style={{fontSize:13,color:"var(--text2)"}}>{parseFloat(en.price).toFixed(2)}</div>
                                      </div>
                                    ))}
                                    <div style={{flex:1,minWidth:60}}>
                                      <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Avg Entry</div>
                                      <div style={{fontSize:13,color:"var(--text2)",fontWeight:500}}>{parseFloat(trade.entry).toFixed(2)}</div>
                                    </div>
                                  </>
                                ):(
                                  <div style={{flex:1,minWidth:60}}>
                                    <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Entry</div>
                                    <div style={{fontSize:13,color:"var(--text2)"}}>{parseFloat(trade.entry).toFixed(2)}</div>
                                  </div>
                                )}
                                {(trade.tps||[]).filter(tp=>tp.price).map((tp,i)=>(
                                  <div key={i} style={{flex:1,minWidth:60}}>
                                    <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>TP{i+1}{i===(trade.tps.filter(tp=>tp.price).length-1)?" (Final)":""}</div>
                                    <div style={{fontSize:13,color:"var(--accent-dim)"}}>{parseFloat(tp.price).toFixed(2)}</div>
                                    <div style={{fontSize:10,color:"var(--text4)"}}>{tp.contracts} cont</div>
                                  </div>
                                ))}
                                {/* Legacy single exit */}
                                {(!trade.tps||trade.tps.length===0)&&trade.exit&&(
                                  <div style={{flex:1,minWidth:60}}>
                                    <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Take Profit</div>
                                    <div style={{fontSize:13,color:"var(--text2)"}}>{parseFloat(trade.exit).toFixed(2)}</div>
                                  </div>
                                )}
                                {trade.stop&&<div style={{flex:1,minWidth:60}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Stop</div>
                                  <div style={{fontSize:13,color:"#ff4d6d80"}}>{parseFloat(trade.stop).toFixed(2)}</div>
                                </div>}
                              </div>

                              <div className="trade-meta">
                                {trade.strategy&&<span className="tag">{trade.strategy}</span>}
                                {trade.setup&&<span className="tag">{trade.setup}</span>}
                                {trade.session&&<span className="tag">{trade.session}{trade.time&&<span style={{color:"var(--text4)",marginLeft:4}}>{trade.time}</span>}</span>}
                                {trade.tradeType&&<span className="tag">{trade.tradeType}</span>}
                                {(trade.emotion||[]).length>0&&(Array.isArray(trade.emotion)?trade.emotion:[trade.emotion]).map((e,i)=><span key={i} className="tag">{e}</span>)}
                              </div>

                              {trade.notes&&<div style={{marginTop:10,fontSize:12,color:"var(--text2)",lineHeight:1.6}}>{trade.notes}</div>}

                              {trade.checklist&&trade.checklist.length>0&&(
                                <div style={{marginTop:10}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Pre-Trade Checklist</div>
                                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                                    {checklistItems.map((item,i)=>{
                                      const checked=(trade.checklist||[]).includes(item);
                                      return(
                                        <span key={i} style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:checked?"var(--accent-bg)":"var(--surface2)",color:checked?"#00e5a0":"var(--text5)",border:"1px solid "+(checked?"#00e5a030":"var(--border)")}}>
                                          {checked?"✓":"✗"} {item}
                                        </span>
                                      );
                                    })}
                                  </div>
                                </div>
                              )}

                              {imgs.length>0&&(
                                <div style={{marginTop:12}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Charts</div>
                                  {imgs.length===1?(
                                    <div className="thumb-featured" onClick={()=>setLightbox({images:imgs,start:0})}>
                                      <img src={imgs[0].dataUrl} alt=""/>
                                      <div className="thumb-overlay"/>
                                      {imgs[0].label&&<div className="thumb-label">{imgs[0].label}</div>}
                                      <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",borderRadius:6,padding:"3px 7px",fontSize:9,color:"rgba(255,255,255,0.8)",fontFamily:"DM Mono,monospace",backdropFilter:"blur(4px)",letterSpacing:"0.04em"}}>tap to expand</div>
                                    </div>
                                  ):(
                                    <div>
                                      <div className="thumb-featured" onClick={()=>setLightbox({images:imgs,start:0})} style={{marginBottom:8}}>
                                        <img src={imgs[0].dataUrl} alt=""/>
                                        <div className="thumb-overlay"/>
                                        {imgs[0].label&&<div className="thumb-label">{imgs[0].label}</div>}
                                        <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",borderRadius:6,padding:"3px 7px",fontSize:9,color:"rgba(255,255,255,0.8)",fontFamily:"DM Mono,monospace",backdropFilter:"blur(4px)",letterSpacing:"0.04em"}}>1 / {imgs.length}</div>
                                      </div>
                                      <div className="thumb-row">
                                        {imgs.slice(1).map((img,i)=>(
                                          <div key={img.id} className="thumb-wrap" onClick={()=>setLightbox({images:imgs,start:i+1})}>
                                            <img src={img.dataUrl} alt=""/>
                                            <div className="thumb-overlay"/>
                                            {img.label&&<div className="thumb-label">{img.label}</div>}
                                            <div className="thumb-idx">{i+2}/{imgs.length}</div>
                                          </div>
                                        ))}
                                      </div>
                                    </div>
                                  )}
                                </div>
                              )}

                              <div style={{display:"flex",gap:8,marginTop:12}}>
                                <button className="btn-ghost" style={{flex:1}} onClick={()=>edit(trade)}>Edit</button>
                                <button className="btn-ghost" style={{flex:1}} onClick={()=>setShareTrade(trade)}>
                                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4}}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                                  Share
                                </button>
                                <button className="btn-danger" style={{flex:1}} onClick={()=>confirmDelete(trade.id)}>Delete</button>
                              </div>
                            </div>
                          )}
                        </div>
                        </SwipeToDelete>
                      );
                    })}
                  </div>
                );
              })
            )}
          </>
        )}

        {/* ADD / EDIT */}
        {view==="add"&&(
          <div>
            <div className="section-title">{editId?"Edit Trade":"Log Trade"}</div>

            {/* Trading hours warning */}

                    if(filled.length<2) return null;

                          value={tp.contracts} onChange={e=>setForm(f=>({...f,tps:(f.tps||[]).map((t,j)=>j===i?{...t,contracts:e.target.value}:t)}))}/>

                      <button onClick={()=>setForm(f=>({...f,tps:f.tps.filter((_,j)=>j!==i)}))}

                    </>
                  )}

                if(!inst||filledTps.length<2) return null;
                const totalTPCt=filledTps.reduce((s,tp)=>s+(parseFloat(tp.contracts)||0),0);
                const tradeCt=parseFloat(form.contracts)||1;
                const wAvg=filledTps.reduce((s,tp)=>s+(parseFloat(tp.price)||0)*(parseFloat(tp.contracts)||0),0)/totalTPCt;
                const mismatch = Math.abs(totalTPCt - tradeCt) > 0.001;
                return(

                    <div style={{fontSize:10,color:"var(--text4)",marginTop:4}}>Avg exit: <span style={{color:"var(--text2)"}}>{wAvg.toFixed(2)}</span> across {totalTPCt} contracts</div>

                    value={form.setup} onChange={setF("setup")} autoFocus/>

                  <option value="">— Select —</option>

              if(!todayTrades.length) return null;
              const lastTrade=todayTrades[todayTrades.length-1];
              const lastPnl=calc(lastTrade).pnl;
              const lastContracts=parseFloat(lastTrade.contracts)||1;

            {(formForCalc.entry&&(form.tps||[]).some(tp=>tp.price&&tp.contracts))||(filledFormEntries.length>0&&(form.tps||[]).some(tp=>tp.price&&tp.contracts))?(

                  <label>Est. P&amp;L</label>

                {(()=>{const {rr}=calc(formForCalc); return rr?(<div className="pnl-box">

                  <span style={{color:"var(--text)"}}>1:{rr}</span>

                {balance>0&&formForCalc.stop&&formForCalc.entry&&(()=>{
                  const {pnl}=calc({...formForCalc,outcome:"SL"});

                    {[{k:"stats",l:"Performance"},{k:"calendar",l:"Calendar"},{k:"ai",l:"AI Report"}, ...(accounts.length>1?[{k:"all",l:"All Accounts"}]:[])].map(opt=>(
                      <button key={opt.k} onClick={()=>{setStatsTab(opt.k);setShowStatsMenu(false);}}

            </div>

            {statsTab==="calendar"&&<CalendarView trades={trades} fmt={fmt} calc={calc} curr={curr}/>}

            {statsTab==="ai"&&<AIReport trades={trades} stats={stats} fmt={fmt} curr={curr} apiKey={anthropicKey}/>}

            {statsTab==="all"&&(()=>{
              const allTrades = accounts.flatMap(acc=>{
                const key = acc.id==="default"?STORAGE_KEY:"logged_trades_"+acc.id;
                try{ const raw=localStorage.getItem(key); return raw?JSON.parse(raw).map(t=>({...t,_account:acc})):[];}catch{return[];}
              });
              const allPnl = allTrades.reduce((s,t)=>s+calc(t).pnl,0);
              const allWins = allTrades.filter(t=>calc(t).pnl>0);
              const allLosses = allTrades.filter(t=>calc(t).pnl<0);
              const allWr = (allWins.length+allLosses.length)>0?Math.round(allWins.length/(allWins.length+allLosses.length)*100):0;
              const allPf = allLosses.length>0?Math.abs(allWins.reduce((s,t)=>s+calc(t).pnl,0)/allLosses.reduce((s,t)=>s+calc(t).pnl,0)):allWins.length>0?Infinity:0;
              const rVals = allTrades.map(t=>calc(t).r).filter(r=>r!==null);
              const avgR = rVals.length?Math.round(rVals.reduce((s,r)=>s+r,0)/rVals.length*100)/100:0;
              return(
                <>
                  <div className="stat-grid" style={{marginBottom:12}}>
                    {[
                      {l:"Total P&L",v:fmt(allPnl),c:allPnl>=0?"var(--accent)":"#ff4d6d"},
                      {l:"Win Rate",v:allWr+"%",c:allWr>=50?"var(--accent)":"#ff4d6d"},
                      {l:"Total Trades",v:allTrades.length,c:"var(--text)"},
                      {l:"Profit Factor",v:allPf===Infinity?"∞":allPf>0?allPf.toFixed(2):"—",c:allPf>=1?"var(--accent)":"#ff4d6d"},
                      {l:"Avg R",v:avgR?(avgR>=0?"+":"")+avgR+"R":"—",c:avgR>=0?"var(--accent)":"#ff4d6d"},
                      {l:"Accounts",v:accounts.length,c:"var(--text)"},
                    ].map(s=>(
                      <div key={s.l} className="stat-card">
                        <div className="stat-label">{s.l}</div>
                        <div className="stat-value" style={{fontSize:18,color:s.c}}>{s.v}</div>
                      </div>
                    ))}
                  </div>

                  <div className="stat-card" style={{marginBottom:12}}>
                    <div className="stat-label" style={{marginBottom:14}}>By Account</div>
                    {accounts.map(acc=>{
                      const key = acc.id==="default"?STORAGE_KEY:"logged_trades_"+acc.id;
                      let accTrades=[];
                      try{ const raw=localStorage.getItem(key); accTrades=raw?JSON.parse(raw):[];}catch{}
                      const pnl = accTrades.reduce((s,t)=>s+calc(t).pnl,0);
                      const accWins=accTrades.filter(t=>calc(t).pnl>0).length;
                      const accLosses=accTrades.filter(t=>calc(t).pnl<0).length;
                      const wr = (accWins+accLosses)>0?Math.round(accWins/(accWins+accLosses)*100):0;
                      // Per-account max drawdown
                      let peak=0,maxDD=0,running=0;
                      [...accTrades].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
                        running+=calc(t).pnl;
                        if(running>peak) peak=running;
                        const dd=peak-running;
                        if(dd>maxDD) maxDD=dd;
                      });
                      const maxPnl = Math.max(...accounts.map(a=>{
                        const k=a.id==="default"?STORAGE_KEY:"logged_trades_"+a.id;
                        try{const r=localStorage.getItem(k);return r?Math.abs(JSON.parse(r).reduce((s,t)=>s+calc(t).pnl,0)):0;}catch{return 0;}
                      }),1);
                      return(
                        <div key={acc.id} style={{marginBottom:16}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            <div style={{width:10,height:10,borderRadius:"50%",background:acc.colour,flexShrink:0}}/>
                            <span style={{flex:1,fontSize:13,color:"var(--text)",fontWeight:500}}>{acc.name}</span>
                            <span style={{fontSize:11,color:"var(--text4)"}}>{accTrades.length} trades</span>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>P&amp;L</span>
                            <span style={{fontSize:12,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</span>
                          </div>
                          <div style={{height:4,background:"var(--tag-bg)",borderRadius:4,overflow:"hidden",marginBottom:6}}>
                            <div style={{height:"100%",width:Math.min(100,Math.abs(pnl)/maxPnl*100)+"%",background:acc.colour,borderRadius:2,opacity:0.8}}/>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Win Rate</span>
                            <span style={{fontSize:12,color:wr>=50?"var(--accent)":"#ff4d6d"}}>{wr}%</span>
                          </div>
                          <div style={{height:4,background:"var(--tag-bg)",borderRadius:4,overflow:"hidden",marginBottom:6}}>
                            <div style={{height:"100%",width:wr+"%",background:wr>=50?"var(--accent)":"#ff4d6d",borderRadius:2}}/>
                          </div>
                          {maxDD>0&&<div style={{display:"flex",justifyContent:"space-between"}}>
                            <span style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Max Drawdown</span>
                            <span style={{fontSize:12,color:"#ff4d6d"}}>-{fmts(maxDD)}</span>
                          </div>}
                        </div>
                      );
                    })}
                  </div>

                  {/* Cross-account daily breakdown */}
                  {(()=>{
                    const days=[...new Set(allTrades.map(t=>t.date))].sort((a,b)=>b.localeCompare(a)).slice(0,14);
                    if(!days.length) return null;
                    return(
                      <div className="stat-card" style={{marginBottom:12}}>
                        <div className="stat-label" style={{marginBottom:14}}>By Day · All Accounts</div>
                        {days.map(d=>{
                          const dayTrades=allTrades.filter(t=>t.date===d);
                          const dayPnl=dayTrades.reduce((s,t)=>s+calc(t).pnl,0);
                          const dayWins=dayTrades.filter(t=>calc(t).pnl>0).length;
                          const dayLosses=dayTrades.filter(t=>calc(t).pnl<0).length;
                          const col=dayPnl>0?"var(--accent)":dayPnl<0?"#ff4d6d":"var(--text4)";
                          return(
                            <div key={d} style={{marginBottom:10}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <span style={{fontSize:11,color:"var(--text2)",fontFamily:"DM Mono,monospace"}}>{formatDate(d)}</span>
                                  <span style={{fontSize:9,color:"var(--text4)"}}>{dayTrades.length}T · {dayWins}W/{dayLosses}L</span>
                                </div>
                                <span style={{fontSize:12,color:col,fontFamily:"DM Mono,monospace"}}>{dayPnl>=0?"+":""}{fmt(dayPnl)}</span>
                              </div>
                              <div style={{display:"flex",gap:2,height:4}}>
                                {accounts.map(acc=>{
                                  const aTrades=allTrades.filter(t=>t.date===d&&t._account&&t._account.id===acc.id);
                                  if(!aTrades.length) return null;
                                  const aPnl=aTrades.reduce((s,t)=>s+calc(t).pnl,0);
                                  return <div key={acc.id} title={acc.name+": "+fmt(aPnl)} style={{flex:1,height:4,borderRadius:2,background:aPnl>0?acc.colour:aPnl<0?"#ff4d6d":"var(--border)",opacity:0.8}}/>;
                                })}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </>
              );
            })()}

            {statsTab==="stats"&&(<>
            {stats.total===0?(
              <div className="empty">
                <svg width="100" height="64" viewBox="0 0 100 64" fill="none" style={{marginBottom:16,opacity:0.6}}>
                  <line x1="0" y1="60" x2="100" y2="60" stroke="#1c2230" strokeWidth="1"/>
                  <polygon points="0,60 6,60 22,42 38,54 50,60 64,34 76,46 88,14 88,60 0,60" fill="#00e5a0" opacity="0.08"/>
                  <polyline points="0,60 6,60 22,42 38,54 50,60 64,34 76,46 88,14" stroke="#00e5a0" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                  <polyline points="22,42 64,34 88,14" stroke="#00e5a0" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="3 3" opacity="0.3"/>
                  <circle cx="38" cy="54" r="2" fill="#00e5a0" opacity="0.2"/>
                  <circle cx="76" cy="46" r="2" fill="#00e5a0" opacity="0.25"/>
                  <circle cx="22" cy="42" r="2.5" fill="#00e5a0" opacity="0.4"/>
                  <circle cx="64" cy="34" r="3" fill="#00e5a0" opacity="0.6"/>
                  <circle cx="88" cy="14" r="4" fill="#00e5a0"/>
                  <circle cx="88" cy="14" r="10" fill="#00e5a0" opacity="0.08"/>
                  <circle cx="88" cy="14" r="18" fill="#00e5a0" opacity="0.03"/>
                  <polyline points="84,20 88,13 92,20" stroke="#00e5a0" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.5"/>
                </svg>
                <div className="empty-title">Nothing to analyse</div>
                <div className="empty-sub">Your stats will build as you log trades. Every trade tells a story.</div>
              </div>
            ):(
              <>
                {/* Export buttons moved to Settings */}

                <div className="stat-card" style={{marginBottom:12,padding:"16px"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div className="stat-label" style={{margin:0}}>Equity Curve</div>
                    {stats.equity.length>=2&&<button className="btn-ghost" style={{padding:"4px 10px",fontSize:10}} onClick={()=>setShareCurve(true)}>Share</button>}
                  </div>
                  <EquityCurve equity={stats.equity} totalPnl={stats.totalPnl} balance={balance} curr={curr}/>
                </div>

                <div className="stat-grid">
                  {[
                    {l:"Net P&L",v:fmt(stats.totalPnl),c:stats.totalPnl>=0?"var(--accent)":"#ff4d6d"},
                    {l:"Win Rate",v:`${stats.winRate.toFixed(1)}%`,s:`${stats.wins}W / ${stats.losses}L`},
                    ...(balance>0?[
                      {l:"Total Return",v:`${stats.totalPnl>=0?"+":""}${(balance>0?((stats.totalPnl/balance)*100).toFixed(2):"—")}%`,c:stats.totalPnl>=0?"var(--accent)":"#ff4d6d"},
                      {l:"Avg Risk/Trade",v:stats.total>0?`${(Math.abs(stats.avgLoss)/balance*100).toFixed(2)}%`:"—",c:"#f6ad55"},
                    ]:[]),
                    {l:"Profit Factor",v:stats.pf===Infinity?"∞":stats.pf>0?stats.pf.toFixed(2):"—"},
                    {l:"Avg R",v:stats.avgR?`${stats.avgR>=0?"+":""}${stats.avgR.toFixed(2)}R`:"—",c:stats.avgR>=0?"var(--accent)":"#ff4d6d"},
                    {l:"Total R",v:(()=>{const rT=trades.filter(t=>calc(t).r!==null);const tot=Math.round(rT.reduce((s,t)=>s+(calc(t).r||0),0)*100)/100;return rT.length?`${tot>=0?"+":""}${tot}R`:"—";})(),c:(()=>{const rT=trades.filter(t=>calc(t).r!==null);const tot=rT.reduce((s,t)=>s+(calc(t).r||0),0);return tot>=0?"var(--accent)":"#ff4d6d";})()},
                    {l:"Avg Win",v:fmts(stats.avgWin),c:"#00e5a0"},
                    {l:"Avg Loss",v:fmts(stats.avgLoss),c:"#ff4d6d"},
                    {l:"Best Trade",v:fmt(stats.best),c:"#00e5a0"},
                    {l:"Worst Trade",v:fmt(stats.worst),c:"#ff4d6d"},
                    {l:"Total Trades",v:stats.total},
                    {l:"Current Streak",v:`${stats.streak.count}${stats.streak.type}`,c:stats.streak.type==="W"?"var(--accent)":"#ff4d6d"},
                    {l:"Max Drawdown",v:stats.maxDD>0?"-"+fmts(stats.maxDD):"—",c:stats.maxDD>0?"#ff4d6d":"var(--accent)"},
                    {l:"Avg Duration",v:stats.avgDuration>0?`${stats.avgDuration}m`:"—",c:"var(--text)"},
                  ].map(s=>(
                    <div key={s.l} className="stat-card">
                      <div className="stat-label">{s.l}</div>
                      <div className="stat-value" style={{color:s.c||"var(--text)"}}>{s.v}</div>
                      {s.s&&<div className="stat-sub">{s.s}</div>}
                    </div>
                  ))}
                </div>

                {/* By Day of Week */}
                {trades.length>0&&(()=>{
                  const rows = Object.entries(stats.byDay).filter(([,d])=>d.count>0);
                  if(!rows.length) return null;
                  const maxAbs = Math.max(...rows.map(r=>Math.abs(r[1].pnl)),1);
                  const shortDay = d=>d.slice(0,3);
                  return(
                    <div className="stat-card" style={{marginBottom:12}}>
                      <div className="stat-label" style={{marginBottom:14}}>By Day of Week</div>
                      {/* Bar chart row */}
                      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:12}}>
                        {["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(day=>{
                          const d = stats.byDay[day];
                          const pct = d.count ? Math.min(100,Math.abs(d.pnl)/maxAbs*100) : 0;
                          const col = d.pnl>0?"#00e5a0":d.pnl<0?"#ff4d6d":"var(--border3)";
                          const wr = d.count?Math.round(d.wins/d.count*100):0;
                          return(
                            <div key={day} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                              {/* Bar */}
                              <div style={{height:60,display:"flex",alignItems:"flex-end",width:"100%"}}>
                                <div style={{width:"100%",height:(Math.max(pct,d.count?4:0))+"%",background:col,borderRadius:"3px 3px 0 0",opacity:d.count?1:0.2,minHeight:d.count?4:0}}/>
                              </div>
                              {/* Day label */}
                              <div style={{fontSize:8,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.05em"}}>{shortDay(day)}</div>
                              {/* Win rate */}
                              {d.count>0&&<div style={{fontSize:8,color:col,fontWeight:500}}>{wr}%</div>}
                              {/* Trade count */}
                              {d.count>0&&<div style={{fontSize:8,color:"var(--text4)"}}>{d.count}t</div>}
                            </div>
                          );
                        })}
                      </div>
                      {/* Best/worst day */}
                      {rows.length>0&&(()=>{
                        const sorted = [...rows].sort((a,b)=>b[1].pnl-a[1].pnl);

                      if("Notification" in window){
                        Notification.requestPermission().then(p=>{
                          if(p==="granted"){setNotifEnabled(true);localStorage.setItem("logged_notif","1");}
                        });
                      }
                    } else {
                      setNotifEnabled(false);localStorage.removeItem("logged_notif");
                    }
                  }}>
                    <div className="toggle-thumb" style={{left:notifEnabled?22:3}}/>
                  </div>
                </div>
                {notifEnabled&&(
                  <div style={{marginTop:12}}>
                    <div className="settings-row-label" style={{marginBottom:6}}>Reminder Time</div>
                    <input type="time" className="field-input" value={notifTime} onChange={e=>{setNotifTime(e.target.value);localStorage.setItem("logged_notif_time",e.target.value);}}/>
                  </div>
                )}
              </div>
            </SettingsSection>

            {/* ── POINTERS ── */}
            <SettingsSection title="Journaling Pointers" icon="pointers">
              <PointersCard/>
            </SettingsSection>
            {/* ── DATA & PRIVACY ── */}
            <SettingsSection title="Data & Privacy" icon="privacy">
              <div style={{marginBottom:14}}>
                <div className="settings-row-label" style={{marginBottom:6}}>Anthropic API Key</div>
                <div style={{fontSize:11,color:"var(--text4)",marginBottom:8,lineHeight:1.5}}>Required for AI Report. Get your key at console.anthropic.com — reports cost ~$0.01–0.05 each.</div>
                <input className="field-input" type="password" placeholder="sk-ant-..."
                  value={anthropicKey} onChange={e=>{setAnthropicKey(e.target.value);localStorage.setItem("logged_anthropic_key",e.target.value);}}/>
                {anthropicKey&&<div style={{fontSize:10,color:"var(--accent)",marginTop:4}}>✓ Key saved</div>}
              </div>
              <div style={{height:1,background:"var(--border)",marginBottom:14}}/>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontSize:13,color:"var(--text)"}}>Export Backup</div>
                  <div style={{fontSize:11,color:"var(--text4)",marginTop:2}}>Download all data as JSON</div>
                </div>
                <button onClick={()=>{
                  const data={trades,goals,balance,currency,theme,checklistItems};
                  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                  const a=document.createElement("a");
                  a.href=URL.createObjectURL(blob);
                  a.download="logged-backup-"+new Date().toISOString().split("T")[0]+".json";
                  a.click();
                }} style={{background:"none",border:"1px solid var(--border3)",borderRadius:6,padding:"7px 14px",color:"var(--text3)",fontFamily:"DM Mono,monospace",fontSize:11,cursor:"pointer",flexShrink:0}}>Export</button>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#ff4d6d08",border:"1px solid #ff4d6d20",borderRadius:8}}>
                <div>
                  <div style={{fontSize:13,color:"#ff4d6d"}}>Clear All Data</div>
                  <div style={{fontSize:11,color:"var(--text4)",marginTop:2}}>Permanently delete everything</div>
                </div>
                <button onClick={()=>setShowClearConfirm(true)} style={{background:"none",border:"1px solid #ff4d6d40",borderRadius:6,padding:"7px 14px",color:"#ff4d6d80",fontFamily:"DM Mono,monospace",fontSize:11,cursor:"pointer",flexShrink:0}}>Clear</button>
              </div>
            </SettingsSection>

            {showClearConfirm&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
                <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:24,width:"100%",maxWidth:320,textAlign:"center"}}>
                  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#f6ad55" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:12}}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                  <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,color:"var(--text)",marginBottom:8}}>Clear All Data?</div>
                  <div style={{fontSize:12,color:"var(--text4)",marginBottom:24,lineHeight:1.6}}>This will permanently delete all your trades, goals and settings. This cannot be undone.</div>
                  <div style={{display:"flex",gap:10}}>
                    <button className="btn-ghost" style={{flex:1}} onClick={()=>setShowClearConfirm(false)}>Cancel</button>
                    <button onClick={()=>{
                      Object.keys(localStorage).filter(k=>k.startsWith("logged")).forEach(k=>localStorage.removeItem(k));
                      window.location.reload();
                    }} style={{flex:1,background:"#ff4d6d",color:"#fff",border:"none",borderRadius:8,padding:"12px",fontFamily:"DM Mono,monospace",fontSize:12,cursor:"pointer",fontWeight:500}}>Delete Everything</button>
                  </div>
                </div>
              </div>
            )}

            <div style={{marginTop:32,textAlign:"center",paddingBottom:8}}>
              <div style={{fontSize:9,letterSpacing:"0.12em",color:"var(--text4)",textTransform:"uppercase"}}>Logged · Futures Journal</div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:8,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"Syne,sans-serif",fontWeight:700}}>LOGGED IT. LEARNED IT. OWNED IT.</div>
              <div style={{fontSize:9,color:"var(--text5)",marginTop:4}}>v1.0</div>
            </div>
          </>
        )}

        {/* GOALS */}
        {view==="goals"&&<GoalsView trades={trades} goals={goals} setGoals={setGoals} fmt={fmt} calc={calc} goalColour={goalColour} setShareGoal={setShareGoal} shareCardStyle={shareCardStyle} setShareCardStyle={setShareCardStyle} traderName={traderName}/> }
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav">
        <button className={`nav-item${view==="journal"?" active":""}`} onClick={()=>{setShowSaveConfirm(false);setView("journal");}}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          Journal
        </button>
        <button className={`nav-item${view==="stats"?" active":""}`} onClick={()=>{setShowSaveConfirm(false);setView("stats");}}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            </svg>
          </div>
          Stats
        </button>
        <button className={`nav-item${view==="add"?" active":""}`} onClick={()=>{setForm(blankFormWithDefaults());setEditId(null);setShowEmotion(false);setShowChecklist(false);setShowTradeType(false);setShowSaveConfirm(false);setCustomStrategy(false);setCustomSetup(false);setView("add");}}>
          <div className="nav-icon-wrap">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </div>
          Log
        </button>
        <button className={`nav-item${view==="goals"?" active":""}`} onClick={()=>{setShowSaveConfirm(false);setView("goals");}}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
            </svg>
          </div>
          Goals
        </button>
        <button className={`nav-item${view==="settings"?" active":""}`} onClick={()=>{setShowSaveConfirm(false);setView("settings");}}>
          <div className="nav-icon-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </div>
          Settings
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
