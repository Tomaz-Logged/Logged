      const key = activeAccountId==="default"?STORAGE_KEY:"logged_trades_"+activeAccountId;
      const raw = localStorage.getItem(key);
      if(!raw) return [];
      const saved = JSON.parse(raw);
      if(!Array.isArray(saved)) return [];
      return saved.map(t=>({...t, tps: (t.tps&&t.tps.length>0) ? t.tps : t.exit ? [{price:t.exit, contracts:t.contracts}] : [{price:"",contracts:""}]}));
    }catch(e){console.error("Trade load error:",e);return[]}
  });
  const [view,setView]=useState("journal");
  const [form,setForm]=useState(()=>({
    date:new Date().toISOString().split("T")[0],
    instrument:localStorage.getItem("logged_def_inst")||"NQ",
    direction:"Long",
    contracts:parseInt(localStorage.getItem("logged_def_contracts")||"1")||1,
    entry:"",stop:"",outcome:"TP",emotion:"",
    tps:[{price:"",contracts:""}],
    strategy:"Breakout",
    session:localStorage.getItem("logged_def_session")||"New York",
    setup:"A",notes:"",images:[],checklist:[]
  }));
  const [editId,setEditId]=useState(null);
  const [expanded,setExpanded]=useState(null);
  const [lightbox,setLightbox]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null); // trade id to delete
  const [showInstall,setShowInstall]=useState(false);
  const [deferredPrompt,setDeferredPrompt]=useState(null);

  useEffect(()=>{localStorage.setItem(activeStorageKey,JSON.stringify(trades));},[trades, activeStorageKey]);
  useEffect(()=>{if(balance>0)localStorage.setItem(activeBalanceKey,balance.toString());},[balance, activeBalanceKey]);
  useEffect(()=>{localStorage.setItem(ACCOUNTS_KEY,JSON.stringify(accounts));},[accounts]);
  useEffect(()=>{localStorage.setItem("logged_active_account",activeAccountId);},[activeAccountId]);

  const switchAccount = (id) => {
    localStorage.setItem(activeStorageKey, JSON.stringify(trades));
    if(balance>0) localStorage.setItem(activeBalanceKey, balance.toString());
    const newKey = id==="default"?STORAGE_KEY:"logged_trades_"+id;
    const newBalKey = id==="default"?BALANCE_KEY:"logged_balance_"+id;
    try{
      const raw = localStorage.getItem(newKey);
      const saved = raw?JSON.parse(raw):[];
      setTrades(Array.isArray(saved)?saved.map(t=>({...t,tps:(t.tps&&t.tps.length>0)?t.tps:t.exit?[{price:t.exit,contracts:t.contracts}]:[{price:"",contracts:""}]})): []);
    }catch{setTrades([]);}
    const newBal = parseFloat(localStorage.getItem(newBalKey)||"0")||0;
    setBalance(newBal);
    setActiveAccountId(id);
    setShowAccountMenu(false);
    setView("journal");
  };
  useEffect(()=>{localStorage.setItem(CURRENCY_KEY,currency);},[currency]);
  useEffect(()=>{localStorage.setItem(THEME_KEY,theme);},[theme]);
  useEffect(()=>{localStorage.setItem(GOAL_COLOUR_KEY,goalColour);},[goalColour]);
  useEffect(()=>{localStorage.setItem("logged_def_inst",defaultInstrument);},[defaultInstrument]);
  useEffect(()=>{localStorage.setItem("logged_def_contracts",defaultContracts);},[defaultContracts]);
  useEffect(()=>{localStorage.setItem("logged_def_session",defaultSession);},[defaultSession]);
  useEffect(()=>{localStorage.setItem("logged_risk_pct",riskPercent);},[riskPercent]);
  useEffect(()=>{localStorage.setItem("logged_daily_limit",dailyTradeLimit);},[dailyTradeLimit]);
  useEffect(()=>{localStorage.setItem("logged_max_loss",maxDailyLoss);},[maxDailyLoss]);
  useEffect(()=>{localStorage.setItem("logged_hours_start",tradingHoursStart);},[tradingHoursStart]);
  useEffect(()=>{localStorage.setItem("logged_hours_end",tradingHoursEnd);},[tradingHoursEnd]);
  useEffect(()=>{localStorage.setItem("logged_date_fmt",dateFormat);},[dateFormat]);
  useEffect(()=>{localStorage.setItem("logged_compact",compactCards);},[compactCards]);
  useEffect(()=>{localStorage.setItem("logged_check_score",showCheckScore);},[showCheckScore]);

  useEffect(()=>{
    const handler=e=>{e.preventDefault();setDeferredPrompt(e);setShowInstall(true);};
    window.addEventListener("beforeinstallprompt",handler);
    if(navigator.standalone===false&&/iPhone|iPad|iPod/.test(navigator.userAgent)) setShowInstall(true);
    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);

  const setF=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const setFv=(k,v)=>setForm(f=>({...f,[k]:v}));

  const submit=()=>{
    const outcome = form.outcome||"TP";
    const filledTps=(form.tps||[]).filter(tp=>tp.price);
    // SL and BE don't need a TP price
    if(!form.entry) return;
    if((outcome==="TP"||outcome==="Partial")&&!filledTps.length) return;
    const normalisedTps = filledTps.map(tp=>({...tp, contracts: tp.contracts||form.contracts}));
    const tradeToSave = {...form, outcome, tps: normalisedTps};
    if(editId!==null){
      setTrades(t=>t.map(tr=>tr.id===editId?{...tradeToSave,id:editId}:tr));
      setEditId(null);
    } else {
      setTrades(t=>[...t,{...tradeToSave,id:Date.now()}]);
    }
    setForm(blankFormWithDefaults());
    setView("journal");
  };

  const confirmDelete=(id)=>setConfirmDel(id);
  const doDelete=()=>{
    setTrades(t=>t.filter(tr=>tr.id!==confirmDel));
    if(expanded===confirmDel)setExpanded(null);
    setConfirmDel(null);
  };

  const edit=trade=>{
    const tps = (trade.tps&&trade.tps.length>0) ? trade.tps : trade.exit ? [{price:trade.exit,contracts:trade.contracts}] : [{price:"",contracts:""}];
    setForm({...blankFormWithDefaults(),...trade,images:trade.images||[],tps});
    setEditId(trade.id);setView("add");
  };

  const [searchQuery, setSearchQuery] = useState("");
  const [filterOutcome, setFilterOutcome] = useState("All");
  const [filterInstrument, setFilterInstrument] = useState("All");

  // Group trades by date
  const groupedTrades = useMemo(()=>{
    if(!trades||!trades.length) return [];
    let filtered = [...trades];

    // Only filter if explicitly set
    if(filterOutcome&&filterOutcome!=="All"){
      filtered = filtered.filter(t=>{
        const o = t.outcome||"TP";
        return o===filterOutcome;
      });
    }
    if(filterInstrument&&filterInstrument!=="All"){
      filtered = filtered.filter(t=>t.instrument===filterInstrument);
    }
    const q = (searchQuery||"").trim().toLowerCase();
    if(q){
      filtered = filtered.filter(t=>
        (t.notes||"").toLowerCase().includes(q)||
        (t.instrument||"").toLowerCase().includes(q)||
        (t.strategy||"").toLowerCase().includes(q)||
        (t.session||"").toLowerCase().includes(q)||
        (t.emotion||"").toLowerCase().includes(q)
      );
    }

    // Sort newest first
    filtered.sort((a,b)=>(b.date||"").localeCompare(a.date||""));

    // Group by date
    const groups={};
    filtered.forEach(t=>{
      const key = t.date||"Unknown";
      if(!groups[key]) groups[key]=[];
      groups[key].push(t);
    });

    return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
  },[trades, filterOutcome, filterInstrument, searchQuery]);

  const stats=useMemo(()=>{
    const c=trades.map(t=>({...t,...calc(t)}));
    const wins=c.filter(t=>t.pnl>0),losses=c.filter(t=>t.pnl<0);
    const totalPnl=c.reduce((s,t)=>s+t.pnl,0);
    const winRate=c.length?(wins.length/c.length)*100:0;
    const avgWin=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((s,t)=>s+t.pnl,0)/losses.length:0;
    const pf=Math.abs(avgLoss)>0?avgWin/Math.abs(avgLoss):0;
    const best=c.length?Math.max(...c.map(t=>t.pnl)):0;
    const worst=c.length?Math.min(...c.map(t=>t.pnl)):0;
    const rT=c.filter(t=>t.r!==null);
    const avgR=rT.length?rT.reduce((s,t)=>s+t.r,0)/rT.length:0;
    let run=0;
    const equity=[...trades].sort((a,b)=>a.date.localeCompare(b.date)).map(t=>{run+=calc(t).pnl;return{eq:run};});

    // By session
    const bySess={};
    trades.forEach(t=>{const{pnl}=calc(t);if(!bySess[t.session])bySess[t.session]={pnl:0,count:0,wins:0};bySess[t.session].pnl+=pnl;bySess[t.session].count++;if(pnl>0)bySess[t.session].wins++;});

    // By strategy
    const bySt={};
    trades.forEach(t=>{const{pnl}=calc(t);if(!bySt[t.strategy])bySt[t.strategy]={pnl:0,count:0,wins:0};bySt[t.strategy].pnl+=pnl;bySt[t.strategy].count++;if(pnl>0)bySt[t.strategy].wins++;});

    const DAYS_ORDER=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    const byDay={};
    DAYS_ORDER.forEach(d=>byDay[d]={pnl:0,count:0,wins:0});
    trades.forEach(t=>{
      const d=new Date(t.date+"T12:00:00");
      const day=DAYS_ORDER[d.getDay()===0?6:d.getDay()-1];
      const{pnl}=calc(t);
      byDay[day].pnl+=pnl;
      byDay[day].count++;
      if(pnl>0)byDay[day].wins++;
    });

    const streak=getStreak(trades);
    const byInst={};
    trades.forEach(t=>{const{pnl}=calc(t);if(!byInst[t.instrument])byInst[t.instrument]={pnl:0,count:0,wins:0};byInst[t.instrument].pnl+=pnl;byInst[t.instrument].count++;if(pnl>0)byInst[t.instrument].wins++;});

    return{totalPnl,winRate,wins:wins.length,losses:losses.length,total:c.length,avgWin,avgLoss,pf,best,worst,avgR,equity,bySess,bySt,byDay,byInst,streak};
  },[trades]);

  const TICKER_KEY = "logged_ticker_v1";
  const CHECKLIST_KEY = "logged_checklist_v1";
  const DEFAULT_CHECKLIST = ["Waited for confirmation","Stop loss placed","Trading with the trend","Risk is within my limit","Not revenge trading"];
  const ALL_STATS = ["Net P&L","Win Rate","Return","Profit Factor","Avg R","Total R","Trades","Streak","Avg Win","Avg Loss","Best Trade","Worst Trade"];
  const [tickerStats, setTickerStats] = useState(()=>{try{return JSON.parse(localStorage.getItem("logged_ticker_v1")||'["Net P&L","Win Rate","Avg R","Trades"]')}catch{return ["Net P&L","Win Rate","Avg R","Trades"]}});
  const [checklistItems, setChecklistItems] = useState(()=>{try{return JSON.parse(localStorage.getItem(CHECKLIST_KEY)||JSON.stringify(DEFAULT_CHECKLIST))}catch{return DEFAULT_CHECKLIST}});
  const [newCheckItem, setNewCheckItem] = useState("");
  const [goals, setGoals] = useState(()=>{try{
    const saved = JSON.parse(localStorage.getItem(GOALS_KEY)||"[]");
    return saved.filter(g=>Array.isArray(g.targets));
  }catch{return[]}});
  const [showSearch, setShowSearch] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [pullRefresh, setPullRefresh] = useState(false);
  const contentRef = useRef(null);
  const pullStartY = useRef(0);
  const pullActive = useRef(false);
  const [statsTab, setStatsTab] = useState("stats");

  // Force filters to All on first mount
  useEffect(()=>{
    setFilterOutcome("All");
    setFilterInstrument("All");
    setSearchQuery("");
  },[]);

  useEffect(()=>{localStorage.setItem(TICKER_KEY,JSON.stringify(tickerStats));},[tickerStats]);
  useEffect(()=>{localStorage.setItem(CHECKLIST_KEY,JSON.stringify(checklistItems));},[checklistItems]);
  useEffect(()=>{localStorage.setItem(GOALS_KEY,JSON.stringify(goals));},[goals]);

  const getStatVal = (key) => {
    const p = stats.totalPnl;
    switch(key){
      case "Net P&L": return {val:fmt(p),col:p>=0?"var(--accent)":"#ff4d6d"};
      case "Win Rate": return {val:`${stats.winRate.toFixed(1)}%`,col:"var(--text)"};
      case "Return": return balance>0?{val:`${p>=0?"+":""}${((p/balance)*100).toFixed(2)}%`,col:p>=0?"var(--accent)":"#ff4d6d"}:{val:"—",col:"var(--text4)"};
      case "Profit Factor": return {val:stats.pf.toFixed(2),col:"var(--text)"};
      case "Avg R": return {val:stats.avgR?`${stats.avgR>=0?"+":""}${stats.avgR.toFixed(2)}R`:"—",col:stats.avgR>=0?"var(--accent)":"#ff4d6d"};
      case "Total R": {const rT=trades.filter(t=>calc(t).r!==null);const tot=Math.round(rT.reduce((s,t)=>s+(calc(t).r||0),0)*100)/100;return {val:rT.length?`${tot>=0?"+":""}${tot}R`:"—",col:tot>=0?"var(--accent)":"#ff4d6d"};}
      case "Trades": return {val:stats.total,col:"var(--text)"};
      case "Streak": return {val:stats.streak.count>0?`${stats.streak.count}${stats.streak.type}`:"—",col:stats.streak.type==="W"?"var(--accent)":"#ff4d6d"};
      case "Avg Win": return {val:fmts(stats.avgWin),col:"#00e5a0"};
      case "Avg Loss": return {val:fmts(stats.avgLoss),col:"#ff4d6d"};
      case "Best Trade": return {val:fmt(stats.best),col:"#00e5a0"};
      case "Worst Trade": return {val:fmt(stats.worst),col:"#ff4d6d"};
      case "Balance": return balance>0?{val:`${curr.symbol}${(balance+stats.totalPnl).toLocaleString(curr.locale,{minimumFractionDigits:0,maximumFractionDigits:0})}`,col:stats.totalPnl>=0?"var(--accent)":"#ff4d6d"}:{val:"—",col:"var(--text4)"};
      default: return {val:"—",col:"var(--text4)"};
    }
  };

  const blankFormWithDefaults = () => ({
    date: new Date().toISOString().split("T")[0],
    instrument: defaultInstrument||"NQ",
    direction:"Long", contracts: defaultContracts||1,
    entry:"", stop:"", outcome:"TP", emotion:"",
    tps:[{price:"", contracts:""}],
    strategy:"Breakout", session: defaultSession||"New York", setup:"A",
    notes:"", images:[], checklist:[]
  });
  const curr = CURRENCIES.find(c=>c.code===currency)||CURRENCIES[0];
  const fmt = n=>`${n>=0?"+":"-"}${curr.symbol}${Math.abs(n).toLocaleString(curr.locale,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const fmts = n=>`${curr.symbol}${Math.abs(n).toLocaleString(curr.locale,{minimumFractionDigits:0,maximumFractionDigits:0})}`;
  const {pnl:prevPnl,ticks:prevTicks,r:prevR}=calc(form);
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent)&&!window.MSStream;

  if(showSplash) return <SplashScreen onDone={()=>setShowSplash(false)}/>;
  if(!unlocked) return <PinScreen onUnlock={name=>{setTraderName(name);setUnlocked(true);}}/>;

  const formatDate=d=>{
    const [y,m,day]=d.split("-");
    const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
  };

  const dayPnl=trades=>{
    return trades.reduce((s,t)=>s+calc(t).pnl,0);
  };

  return(
    <div id="app" className={theme==="light"?"light":""}>
      {lightbox&&<Lightbox images={lightbox.images} start={lightbox.start} onClose={()=>setLightbox(null)}/>}
      {confirmDel&&<ConfirmDelete onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>}

      {/* Header */}
      <div className="header">
        <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"var(--text)"}}>LOGGED</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {stats.streak.count>1&&(
            <div className="streak-badge" style={{color:stats.streak.type==="W"?"var(--accent)":"#ff4d6d"}}>
              {stats.streak.type==="W"?"🔥":"❄️"} {stats.streak.count}
            </div>
          )}
          {view==="add"?(
            <button className="btn-ghost" style={{padding:"6px 12px",fontSize:10}} onClick={()=>{setEditId(null);setForm(blankFormWithDefaults());setView("journal");}}>
              {editId?"Cancel":"✕"}
            </button>
          ):(
            <InitialAvatar name={traderName} size={38} fontSize="sm" onClick={()=>setShowProfile(true)}/>
          )}
        </div>
      </div>

      {/* Account Menu */}
      {showAccountMenu&&(
        <div style={{position:"fixed",inset:0,zIndex:150}} onClick={()=>setShowAccountMenu(false)}>
          <div style={{position:"absolute",top:"calc(52px + env(safe-area-inset-top))",left:16,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"8px",minWidth:200,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}} onClick={e=>e.stopPropagation()}>
              {accounts.map(acc=>(
              <div key={acc.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                <div onClick={()=>switchAccount(acc.id)}
                  style={{display:"flex",alignItems:"center",gap:10,flex:1,padding:"10px 12px",borderRadius:8,cursor:"pointer",background:acc.id===activeAccountId?"var(--accent-bg)":"transparent",transition:"all 0.15s"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:acc.colour,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:13,color:acc.id===activeAccountId?"var(--accent)":"var(--text)",fontFamily:"'DM Mono',monospace"}}>{acc.name}</span>
                  {acc.id===activeAccountId&&<span style={{fontSize:10,color:"var(--accent)"}}>✓</span>}
                </div>
                {acc.id!=="default"&&<button onClick={()=>{
                  if(acc.id===activeAccountId) switchAccount("default");
                  setAccounts(a=>a.filter(x=>x.id!==acc.id));
                  localStorage.removeItem("logged_trades_"+acc.id);
                  localStorage.removeItem("logged_balance_"+acc.id);
                }} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:14,padding:"4px 6px",flexShrink:0}} onMouseEnter={e=>e.target.style.color="#ff4d6d"} onMouseLeave={e=>e.target.style.color="var(--text5)"}>×</button>}
              </div>
            ))}
            <div style={{height:1,background:"var(--border)",margin:"6px 0"}}/>
            <div onClick={()=>{setShowAccountMenu(false);setShowAddAccount(true);setNewAccountName("");setNewAccountColour("#00e5a0");}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,cursor:"pointer",color:"var(--accent)",fontSize:13,fontFamily:"'DM Mono',monospace"}}>
              <span style={{fontSize:16}}>+</span> Add Account
            </div>
          </div>
        </div>
      )}

      {/* Add Account Sheet */}
      {showAddAccount&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"flex-end"}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowAddAccount(false);}}>
          <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px",width:"100%",paddingBottom:`calc(40px + env(safe-area-inset-bottom))`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"var(--text)"}}>Add Account</div>
              <button onClick={()=>setShowAddAccount(false)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>
            </div>
            <div className="field-group">
              <label className="field-label">Account Name</label>
              <input className="field-input" placeholder="e.g. Funded Account, Personal" value={newAccountName} onChange={e=>setNewAccountName(e.target.value)}/>
            </div>
            <div className="field-group">
              <label className="field-label">Colour</label>
              <div style={{display:"flex",gap:10}}>
                {ACCOUNT_COLOURS.map(col=>(
                  <div key={col} onClick={()=>setNewAccountColour(col)}
                    style={{width:28,height:28,borderRadius:"50%",background:col,cursor:"pointer",border:"3px solid "+(newAccountColour===col?"var(--text)":"transparent"),transition:"border 0.15s"}}/>
                ))}
              </div>
            </div>
            <button className="btn-primary" onClick={()=>{
              if(!newAccountName.trim()) return;
              const id = Date.now().toString();
              const newAcc = {id, name:newAccountName.trim(), colour:newAccountColour};
              setAccounts(a=>[...a, newAcc]);
              setShowAddAccount(false);
              switchAccount(id);
            }}>Create Account</button>
          </div>
        </div>
      )}
      {showProfile&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"flex-end"}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowProfile(false);}}>
          <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px",width:"100%",paddingBottom:`calc(20px + env(safe-area-inset-bottom))`,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:"var(--text)"}}>Profile</div>
              <button onClick={()=>setShowProfile(false)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>
            </div>

            {/* Avatar + name */}
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
              <InitialAvatar name={traderName} size={52} fontSize="lg" style={{border:"2px solid var(--accent-dim)"}}/>
              <div>
                <div style={{fontSize:18,color:"var(--text)",fontWeight:500,marginBottom:2}}>{traderName}</div>
                <div style={{fontSize:10,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Futures Trader</div>
              </div>
            </div>

            {/* Edit name */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Trader Name</div>
              <EditNameRow traderName={traderName} onSave={name=>{
                setTraderName(name);
                const profile = JSON.parse(localStorage.getItem(PROFILE_KEY)||"{}");
                localStorage.setItem(PROFILE_KEY, JSON.stringify({...profile, name}));
              }}/>
            </div>

            {/* Accounts */}
            <div style={{borderTop:"1px solid var(--border)",paddingTop:16,marginBottom:4}}>
              <div style={{fontSize:10,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Accounts</div>
              {accounts.map(acc=>(
                <div key={acc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:acc.colour,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:13,color:acc.id===activeAccountId?"var(--accent)":"var(--text)",fontFamily:"'DM Mono',monospace"}}>{acc.name}</span>
                  {acc.id===activeAccountId?
                    <span style={{fontSize:10,color:"var(--accent)"}}>✓ Active</span>:
                    <button onClick={()=>{setShowProfile(false);switchAccount(acc.id);}} style={{background:"none",border:"1px solid var(--border3)",borderRadius:6,padding:"4px 10px",color:"var(--text3)",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer"}}>Switch</button>
                  }
                  {acc.id!=="default"&&<button onClick={()=>{
                    if(acc.id===activeAccountId) switchAccount("default");
                    setAccounts(a=>a.filter(x=>x.id!==acc.id));
                    localStorage.removeItem("logged_trades_"+acc.id);
                    localStorage.removeItem("logged_balance_"+acc.id);
                  }} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:16,padding:"0 4px"}} onMouseEnter={e=>e.target.style.color="#ff4d6d"} onMouseLeave={e=>e.target.style.color="var(--text5)"}>×</button>}
                </div>
              ))}
              <button onClick={()=>{setShowProfile(false);setShowAddAccount(true);setNewAccountName("");setNewAccountColour("#00e5a0");}}
                style={{marginTop:10,background:"none",border:"1px dashed var(--border2)",borderRadius:8,padding:"8px 14px",color:"var(--accent)",fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",width:"100%"}}>
                + Add Account
              </button>
            </div>

            {/* Quick actions */}
            <div style={{borderTop:"1px solid var(--border)",paddingTop:16}}>
              <div style={{fontSize:10,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Quick Actions</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setShowProfile(false);setShowExport(true);}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px",color:"var(--text3)",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer"}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  Export
                </button>
                <button onClick={()=>{setShowProfile(false);setUnlocked(false);}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px",color:"var(--text3)",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer"}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                  Lock
                </button>
              </div>
            </div>

            {/* Change PIN */}
            <div style={{borderTop:"1px solid var(--border)",paddingTop:16,marginTop:4}}>
              <div style={{fontSize:10,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Security</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:13,color:"var(--text)",marginBottom:2}}>Edit PIN</div>
                  <div style={{fontSize:11,color:"var(--text4)"}}>Update your 4-digit PIN</div>
                </div>
                <button onClick={()=>{
                  localStorage.removeItem(PROFILE_KEY);
                  setShowProfile(false);
                  setUnlocked(false);
                }} style={{background:"none",border:"1px solid var(--border3)",borderRadius:6,padding:"7px 14px",color:"var(--text3)",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer"}}>Edit</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {showExport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"flex-end"}} onMouseDown={e=>{if(e.target===e.currentTarget)setShowExport(false);}}>
          <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"20px",width:"100%",paddingBottom:`calc(20px + env(safe-area-inset-bottom))`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:"var(--text)"}}>Export</div>
              <button onClick={()=>setShowExport(false)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>
            </div>
            <ExportSection trades={trades} balance={balance} curr={curr} stats={stats}/>
          </div>
        </div>
      )}

      {/* Ticker */}
      <div className="ticker" style={{gap:0,padding:"0",position:"relative"}}>
        <div style={{display:"flex",flex:1,overflowX:"hidden"}}>
          {/* Balance — always locked first */}
          {(()=>{
            const {val,col}=getStatVal("Balance");
            return(
              <div style={{flex:1,padding:"6px 10px",borderRight:"1px solid var(--border)",position:"relative"}}>
                <div style={{fontSize:7,letterSpacing:"0.12em",color:"var(--accent-dim)",textTransform:"uppercase",marginBottom:2,whiteSpace:"nowrap"}}>Balance</div>
                <div style={{fontSize:12,fontWeight:500,color:col,whiteSpace:"nowrap"}}>{val}</div>
              </div>
            );
          })()}
          {/* 3 custom slots */}
          {tickerStats.slice(0,4).map(key=>{
            const {val,col}=getStatVal(key);
            return(
              <div key={key} style={{flex:1,padding:"6px 10px",borderRight:"1px solid var(--border)"}}>
                <div style={{fontSize:7,letterSpacing:"0.12em",color:"var(--text4)",textTransform:"uppercase",marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{key}</div>
                <div style={{fontSize:12,fontWeight:500,color:col,whiteSpace:"nowrap"}}>{val}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Content */}
      <div className="content" ref={contentRef} onTouchStart={e=>{pullStartY.current=e.touches[0].clientY;pullActive.current=(contentRef.current&&contentRef.current.scrollTop)===0;}} onTouchMove={e=>{if(!pullActive.current)return;const dy=e.touches[0].clientY-pullStartY.current;if(dy>60&&(contentRef.current&&contentRef.current.scrollTop)===0){setPullRefresh(true);}}} onTouchEnd={()=>{if(pullRefresh){setTimeout(()=>setPullRefresh(false),800);}pullActive.current=false;}}>

        {/* Pull to refresh indicator */}
        {pullRefresh&&(
          <div style={{textAlign:"center",padding:"8px 0 4px",color:"var(--accent)",fontSize:11,letterSpacing:"0.1em",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{animation:"spin 0.8s linear infinite"}}>
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>

          </div>
        )}

        {/* JOURNAL */}
        {view==="journal"&&(
          <>
            {showInstall&&(
              <div className="install-banner">
                <div style={{fontSize:22}}>📲</div>
                <p>
                  {isIOS
                    ? <>Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong> to install Logged as an app.</>
                    : <>Tap <strong>Install</strong> to add Logged to your home screen.</>
                  }
                </p>
                {!isIOS&&deferredPrompt&&(
                  <button onClick={async()=>{deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==="accepted")setShowInstall(false);}}>Install</button>
                )}
                {isIOS&&<button onClick={()=>setShowInstall(false)}>Got it</button>}
              </div>
            )}

            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:12}}>
              <div className="section-title" style={{marginBottom:0}}>Trade Log</div>
              <button onClick={()=>setShowSearch(s=>!s)} style={{background:showSearch?"var(--accent-bg)":"none",border:"1px solid "+(showSearch?"var(--accent)":"var(--border3)"),borderRadius:8,padding:"7px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:showSearch?"var(--accent)":"var(--text4)",transition:"all 0.15s",position:"relative"}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace"}}>Filter</span>
                {(filterOutcome!=="All"||filterInstrument!=="All"||searchQuery)&&<div style={{position:"absolute",top:-3,right:-3,width:8,height:8,borderRadius:"50%",background:"var(--accent)"}}/>}
              </button>
            </div>

            {/* Search & Filter panel */}
            {showSearch&&(
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px",marginBottom:14}}>
                {/* Search */}
                <input className="field-input" placeholder="Search notes, instrument, strategy..." value={searchQuery}
                  onChange={e=>setSearchQuery(e.target.value)}
                  style={{marginBottom:10,fontSize:16,padding:"10px 12px"}}/>  

                {/* Outcome filter */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Outcome</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {["All","TP","SL","Partial","BE"].map(o=>(
                      <button key={o} onClick={()=>setFilterOutcome(o)} style={{padding:"5px 12px",border:"1px solid "+(filterOutcome===o?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:filterOutcome===o?"var(--accent-bg)":"var(--input-bg)",color:filterOutcome===o?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{o}</button>
                    ))}
                  </div>
                </div>

                {/* Instrument filter */}
                <div>
                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Instrument</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button onClick={()=>setFilterInstrument("All")} style={{padding:"5px 12px",border:"1px solid "+(filterInstrument==="All"?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:filterInstrument==="All"?"var(--accent-bg)":"var(--input-bg)",color:filterInstrument==="All"?"var(--accent)":"var(--text4)"}}>All</button>
                    {INSTRUMENTS.filter(i=>trades.some(t=>t.instrument===i.symbol)).map(i=>(
                      <button key={i.symbol} onClick={()=>setFilterInstrument(i.symbol)} style={{padding:"5px 12px",border:"1px solid "+(filterInstrument===i.symbol?"var(--accent)":"var(--border2)"),borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:filterInstrument===i.symbol?"var(--accent-bg)":"var(--input-bg)",color:filterInstrument===i.symbol?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>{i.symbol}</button>
                    ))}
                  </div>
                </div>

                {(searchQuery||filterOutcome!=="All"||filterInstrument!=="All")&&(
                  <button onClick={()=>{setSearchQuery("");setFilterOutcome("All");setFilterInstrument("All");}} style={{marginTop:10,background:"none",border:"none",color:"var(--text4)",fontSize:11,fontFamily:"'DM Mono',monospace",cursor:"pointer",textDecoration:"underline"}}>Clear all</button>
                )}
              </div>
            )}

            {/* Consecutive loss warning */}
            {stats.streak.type==="L"&&stats.streak.count>=2&&(
              <div style={{background:"#ff4d6d12",border:"1px solid #ff4d6d30",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:22}}>⚠️</span>
                <div>
                  <div style={{fontSize:13,color:"#ff4d6d",fontWeight:500,marginBottom:2}}>{stats.streak.count} losses in a row</div>
                  <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>Consider stepping away. Protect your capital.</div>
                </div>
              </div>
            )}

            {/* Daily trade limit warning */}
            {dailyTradeLimit>0&&(()=>{
              const todayTrades = trades.filter(t=>t.date===new Date().toISOString().split("T")[0]);
              if(todayTrades.length>=dailyTradeLimit) return(
                <div style={{background:"#f6ad5512",border:"1px solid #f6ad5530",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                  <span style={{fontSize:22}}>🚫</span>
                  <div>
                    <div style={{fontSize:13,color:"#f6ad55",fontWeight:500,marginBottom:2}}>Daily trade limit reached</div>
                    <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>You've hit your {dailyTradeLimit} trade limit for today.</div>
                  </div>
                </div>
              );
              return null;
            })()}

            {/* Max daily loss warning */}
            {maxDailyLoss>0&&(()=>{
              const todayPnl = trades.filter(t=>t.date===new Date().toISOString().split("T")[0]).reduce((s,t)=>s+calc(t).pnl,0);
              if(todayPnl<=-maxDailyLoss) return(
                <div style={{background:"#ff4d6d12",border:"1px solid #ff4d6d40",borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
                  <span style={{fontSize:22}}>🛑</span>
                  <div>
                    <div style={{fontSize:13,color:"#ff4d6d",fontWeight:500,marginBottom:2}}>Max daily loss hit — STOP TRADING</div>
                    <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>You've lost {curr.symbol}{Math.abs(todayPnl).toFixed(0)} today. Walk away.</div>
                  </div>
                </div>
              );
              return null;
            })()}

            {trades.length===0?(
              <div className="empty">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style={{marginBottom:16,opacity:0.4}}>
                  <rect x="4" y="44" width="10" height="16" rx="2" fill="#00e5a0"/>
                  <rect x="20" y="30" width="10" height="30" rx="2" fill="#00e5a0" opacity="0.7"/>
                  <rect x="36" y="18" width="10" height="42" rx="2" fill="#00e5a0" opacity="0.5"/>
                  <rect x="52" y="8" width="10" height="52" rx="2" fill="#00e5a0" opacity="0.3"/>
                  <polyline points="9,36 25,22 41,28 57,8" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                  <circle cx="9" cy="36" r="3" fill="#00e5a0"/>
                  <circle cx="25" cy="22" r="3" fill="#00e5a0"/>
                  <circle cx="41" cy="28" r="3" fill="#00e5a0"/>
                  <circle cx="57" cy="8" r="3" fill="#00e5a0"/>
                </svg>
                <div className="empty-title">No trades yet</div>
                <div className="empty-sub">Tap + Log to get started</div>
                <button className="btn-primary" style={{width:"auto",padding:"12px 28px"}} onClick={()=>setView("add")}>+ Log Trade</button>
              </div>
            ):groupedTrades.length===0?(
              <div className="empty">
                <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style={{marginBottom:16,opacity:0.35}}>
                  <circle cx="24" cy="24" r="16" stroke="#00e5a0" strokeWidth="2.5"/>
                  <line x1="35" y1="35" x2="50" y2="50" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round"/>
                  <line x1="18" y1="24" x2="30" y2="24" stroke="#00e5a0" strokeWidth="2" strokeLinecap="round"/>
                  <line x1="24" y1="18" x2="24" y2="30" stroke="#00e5a0" strokeWidth="2" strokeLinecap="round" opacity="0.4"/>
                </svg>
                <div className="empty-title">No matches</div>
                <div className="empty-sub">No trades match your current filters</div>
                <button className="btn-primary" style={{width:"auto",padding:"12px 28px"}} onClick={()=>{setSearchQuery("");setFilterOutcome("All");setFilterInstrument("All");}}>Clear Filters</button>
              </div>
            ):(
              groupedTrades.map(([date, dayTrades])=>{
                const dp=dayPnl(dayTrades);
                return(
                  <div key={date}>
                    <div className="date-sep">
                      <span>{formatDate(date)}</span>
                      <span style={{color:dp>=0?"#00e5a060":"#ff4d6d60",fontSize:11}}>{fmt(dp)}</span>
                    </div>
                    {dayTrades.map(trade=>{
                      const {pnl,ticks,r}=calc(trade);
                      const imgs=trade.images||[];
                      const isExp=expanded===trade.id;
                      return(
                        <SwipeToDelete key={trade.id} onDelete={()=>confirmDelete(trade.id)} onEdit={()=>edit(trade)}>
                        <div className="trade-card">
                          <div className="trade-card-header" onClick={()=>setExpanded(isExp?null:trade.id)}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                                <span style={{fontSize:13,fontWeight:500,color:"var(--text)"}}>{trade.instrument}</span>
                                <span style={{fontSize:11,color:trade.direction==="Long"?"var(--accent)":"#ff4d6d"}}>{trade.direction==="Long"?"▲ Long":"▼ Short"}</span>
                                <span style={{fontSize:11,color:"var(--text3)"}}>{trade.contracts}x</span>
                                {trade.outcome&&<span style={{fontSize:9,letterSpacing:"0.08em",padding:"2px 6px",borderRadius:4,background:
                                  trade.outcome==="SL"?"#ff4d6d20":trade.outcome==="BE"?"#71809620":trade.outcome==="Partial"?"#f6ad5520":"#00e5a020",
                                  color:trade.outcome==="SL"?"#ff4d6d":trade.outcome==="BE"?"var(--text3)":trade.outcome==="Partial"?"#f6ad55":"#00e5a0"}}>
                                  {trade.outcome==="SL"?"● SL":trade.outcome==="BE"?"● BE":trade.outcome==="Partial"?"● PARTIAL":"● TP"}
                                </span>}
                                {imgs.length>0&&<span style={{fontSize:10,color:"var(--text3)"}}>📷{imgs.length}</span>}
                                {trade.emotion&&<span style={{fontSize:10,color:"var(--text3)"}}>{trade.emotion.split(" ")[0]}</span>}
                                {trade.checklist&&trade.checklist.length>0&&(
                                  <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background: trade.checklist.length===checklistItems.length?"#00e5a020":"var(--border)",color:trade.checklist.length===checklistItems.length?"var(--accent)":"var(--text3)",letterSpacing:"0.05em"}}>
                                    ✓ {trade.checklist.length}/{checklistItems.length}
                                  </span>
                                )}
                              </div>
                              <div style={{display:"flex",gap:16}}>
                                <div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>P&L</div>
                                  <div style={{fontSize:16,fontWeight:500,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</div>
                                </div>
                                <div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Ticks</div>
                                  <div style={{fontSize:16,color:ticks>=0?"var(--accent)":"#ff4d6d"}}>{ticks>=0?"+":""}{ticks}</div>
                                </div>
                                {r!==null&&<div>
                                  <div style={{fontSize:9,color:"var(--text4)",letterSpacing:"0.1em",textTransform:"uppercase"}}>R</div>
                                  <div style={{fontSize:16,color:r>=0?"#00e5a060":"#ff4d6d60"}}>{r>=0?"+":""}{r}R</div>
                                </div>}
                              </div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontSize:10,color:"var(--text5)"}}>{isExp?"▲":"▼"}</div>
                            </div>
                          </div>

                          {isExp&&(
                            <div className="trade-card-body" style={{paddingTop:12}}>
                              <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
                                <div style={{flex:1,minWidth:60}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Entry</div>
                                  <div style={{fontSize:13,color:"var(--text2)"}}>{parseFloat(trade.entry).toFixed(2)}</div>
                                </div>
                                {(trade.tps||[]).filter(tp=>tp.price).map((tp,i)=>(
                                  <div key={i} style={{flex:1,minWidth:60}}>
                                    <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>TP{i+1}{i===(trade.tps.filter(tp=>tp.price).length-1)?" (Final)":""}</div>
                                    <div style={{fontSize:13,color:"#00e5a080"}}>{parseFloat(tp.price).toFixed(2)}</div>
                                    <div style={{fontSize:10,color:"var(--text4)"}}>{tp.contracts} ct</div>
                                  </div>
                                ))}
                                {/* Legacy single exit */}
                                {(!trade.tps||trade.tps.length===0)&&trade.exit&&(
                                  <div style={{flex:1,minWidth:60}}>
                                    <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Take Profit</div>
                                    <div style={{fontSize:13,color:"var(--text2)"}}>{parseFloat(trade.exit).toFixed(2)}</div>
                                  </div>
                                )}
                                {trade.stop&&<div style={{flex:1,minWidth:60}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Stop</div>
                                  <div style={{fontSize:13,color:"#ff4d6d80"}}>{parseFloat(trade.stop).toFixed(2)}</div>
                                </div>}
                              </div>

                              <div className="trade-meta">
                                <span className="tag">{trade.strategy}</span>
                                <span className="tag">{trade.setup}</span>
                                {trade.session&&<span className="tag">{trade.session}</span>}
                                {trade.emotion&&<span className="tag">{trade.emotion}</span>}
                              </div>

                              {trade.notes&&<div style={{marginTop:10,fontSize:12,color:"var(--text2)",lineHeight:1.7}}>{trade.notes}</div>}

                              {trade.checklist&&trade.checklist.length>0&&(
                                <div style={{marginTop:10}}>
                                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Pre-Trade Checklist</div>
                                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                                    {checklistItems.map((item,i)=>{
                                      const checked=(trade.checklist||[]).includes(item);
                                      return(
                                        <span key={i} style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:checked?"var(--accent-bg)":"var(--surface2)",color:checked?"#00e5a0":"var(--text5)",border:"1px solid "+(checked?"#00e5a030":"var(--border)")}}>
                                          {checked?"✓":"✗"} {item}
                                        </span>
                                      );
                                    })}
                                  </div>
                                </div>
                              )}

                              {imgs.length>0&&(

                      style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:checked?"var(--accent-bg)":"var(--input-bg)",border:"1px solid "+(checked?"var(--accent-dim)":"var(--border2)"),borderRadius:8,marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}>
                      <div style={{width:20,height:20,borderRadius:6,border:"2px solid "+(checked?"var(--accent)":"var(--text5)"),background:checked?"#00e5a0":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>

                {statsTab==="all"?"All Accounts":statsTab==="stats"?"Performance":"Calendar"}
              </div>
              <div style={{display:"flex",gap:2,background:"var(--surface2)",borderRadius:8,padding:3,border:"1px solid var(--border)"}}>
                <button onClick={()=>setStatsTab("stats")} style={{padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:statsTab==="stats"?"var(--accent-bg)":"transparent",color:statsTab==="stats"?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>Stats</button>
                <button onClick={()=>setStatsTab("calendar")} style={{padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:statsTab==="calendar"?"var(--accent-bg)":"transparent",color:statsTab==="calendar"?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>Cal</button>
                {accounts.length>1&&<button onClick={()=>setStatsTab("all")} style={{padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",background:statsTab==="all"?"var(--accent-bg)":"transparent",color:statsTab==="all"?"var(--accent)":"var(--text4)",transition:"all 0.15s"}}>All</button>}
              </div>

            {statsTab==="calendar"&&<CalendarView trades={trades} fmt={fmt} calc={calc} curr={curr}/>}

            {statsTab==="all"&&(()=>{
              // Load all trades from all accounts

                const key = acc.id==="default"?STORAGE_KEY:"logged_trades_"+acc.id;
                try{ const raw=localStorage.getItem(key); return raw?JSON.parse(raw).map(t=>({...t,_account:acc})):[];}catch{return[];}
              });
              const allPnl = allTrades.reduce((s,t)=>s+calc(t).pnl,0);
              const allWins = allTrades.filter(t=>calc(t).pnl>0).length;
              const allWr = allTrades.length?Math.round(allWins/allTrades.length*100):0;
              return(
                <>
                  {/* Summary */}
                  <div className="stat-grid" style={{marginBottom:12}}>
                    {[
                      {l:"Total P&L",v:fmt(allPnl),c:allPnl>=0?"var(--accent)":"#ff4d6d"},
                      {l:"Win Rate",v:allWr+"%",c:allWr>=50?"var(--accent)":"#ff4d6d"},
                      {l:"Total Trades",v:allTrades.length,c:"var(--text)"},
                    ].map(s=>(
                      <div key={s.l} className="stat-card">
                        <div className="stat-label">{s.l}</div>

                    ))}

                  {/* Per account breakdown */}
                  <div className="stat-card" style={{marginBottom:12}}>
                    <div className="stat-label" style={{marginBottom:14}}>By Account</div>
                    {accounts.map(acc=>{
                      const key = acc.id==="default"?STORAGE_KEY:"logged_trades_"+acc.id;
                      let accTrades=[];
                      try{ const raw=localStorage.getItem(key); accTrades=raw?JSON.parse(raw):[];}catch{}
                      const pnl = accTrades.reduce((s,t)=>s+calc(t).pnl,0);
                      const wr = accTrades.length?Math.round(accTrades.filter(t=>calc(t).pnl>0).length/accTrades.length*100):0;
                      const maxPnl = Math.max(...accounts.map(a=>{
                        const k=a.id==="default"?STORAGE_KEY:"logged_trades_"+a.id;
                        try{const r=localStorage.getItem(k);return r?Math.abs(JSON.parse(r).reduce((s,t)=>s+calc(t).pnl,0)):0;}catch{return 0;}
                      }),1);
                      return(
                        <div key={acc.id} style={{marginBottom:16}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            <div style={{width:10,height:10,borderRadius:"50%",background:acc.colour,flexShrink:0}}/>
                            <span style={{flex:1,fontSize:13,color:"var(--text)",fontWeight:500}}>{acc.name}</span>
                            <span style={{fontSize:11,color:"var(--text4)"}}>{accTrades.length} trades</span>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>P&L</span>
                            <span style={{fontSize:12,color:pnl>=0?"var(--accent)":"#ff4d6d"}}>{fmt(pnl)}</span>
                          </div>
                          <div style={{height:4,background:"var(--tag-bg)",borderRadius:2,overflow:"hidden",marginBottom:6}}>
                            <div style={{height:"100%",width:Math.min(100,Math.abs(pnl)/maxPnl*100)+"%",background:acc.colour,borderRadius:2,opacity:0.8}}/>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Win Rate</span>
                            <span style={{fontSize:12,color:wr>=50?"var(--accent)":"#ff4d6d"}}>{wr}%</span>
                          </div>
                          <div style={{height:4,background:"var(--tag-bg)",borderRadius:2,overflow:"hidden"}}>
                            <div style={{height:"100%",width:wr+"%",background:wr>=50?"var(--accent)":"#ff4d6d",borderRadius:2}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}

            {statsTab==="stats"&&(<>
            {stats.total===0?(
              <div className="empty">
                <svg width="80" height="48" viewBox="0 0 80 48" fill="none" style={{marginBottom:16,opacity:0.4}}>
                  {/* Flatline left */}
                  <polyline points="0,24 18,24 22,24" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  {/* ECG spike */}
                  <polyline points="22,24 26,24 30,6 34,42 38,24 42,24" stroke="#00e5a0" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

                </svg>
                <div className="empty-title">No data yet</div>
                <div className="empty-sub">Log trades to see your stats</div>
              </div>
            ):(
              <>
                {/* Export buttons moved to Settings */}

                <div className="stat-card" style={{marginBottom:12,padding:"16px"}}>

                  <EquityCurve equity={stats.equity} totalPnl={stats.totalPnl} balance={balance} curr={curr}/>
                </div>

                <div className="stat-grid">
                  {[
                    {l:"Net P&L",v:fmt(stats.totalPnl),c:stats.totalPnl>=0?"var(--accent)":"#ff4d6d"},

                    ...(balance>0?[
                      {l:"Total Return",v:`${stats.totalPnl>=0?"+":""}${(balance>0?((stats.totalPnl/balance)*100).toFixed(2):"—")}%`,c:stats.totalPnl>=0?"var(--accent)":"#ff4d6d"},
                      {l:"Avg Risk/Trade",v:stats.total>0?`${(Math.abs(stats.avgLoss)/balance*100).toFixed(2)}%`:"—",c:"#f6ad55"},
                    ]:[]),
                    {l:"Profit Factor",v:stats.pf.toFixed(2)},
                    {l:"Avg R",v:stats.avgR?`${stats.avgR>=0?"+":""}${stats.avgR.toFixed(2)}R`:"—",c:stats.avgR>=0?"var(--accent)":"#ff4d6d"},
                    {l:"Total R",v:(()=>{const rT=trades.filter(t=>calc(t).r!==null);const tot=Math.round(rT.reduce((s,t)=>s+(calc(t).r||0),0)*100)/100;return rT.length?`${tot>=0?"+":""}${tot}R`:"—";})(),c:(()=>{const rT=trades.filter(t=>calc(t).r!==null);const tot=rT.reduce((s,t)=>s+(calc(t).r||0),0);return tot>=0?"var(--accent)":"#ff4d6d";})()},
                    {l:"Avg Win",v:fmts(stats.avgWin),c:"#00e5a0"},
                    {l:"Avg Loss",v:fmts(stats.avgLoss),c:"#ff4d6d"},
                    {l:"Best Trade",v:fmt(stats.best),c:"#00e5a0"},
                    {l:"Worst Trade",v:fmt(stats.worst),c:"#ff4d6d"},
                    {l:"Total Trades",v:stats.total},
                    {l:"Current Streak",v:`${stats.streak.count}${stats.streak.type}`,c:stats.streak.type==="W"?"var(--accent)":"#ff4d6d"},

                      {s.s&&<div className="stat-sub">{s.s}</div>}
                    </div>
                  ))}
                </div>

                {/* By Day of Week */}
                {trades.length>0&&(()=>{
                  const rows = Object.entries(stats.byDay).filter(([,d])=>d.count>0);
                  if(!rows.length) return null;
                  const maxAbs = Math.max(...rows.map(r=>Math.abs(r[1].pnl)),1);
                  const shortDay = d=>d.slice(0,3);
                  return(
                    <div className="stat-card" style={{marginBottom:12}}>
                      <div className="stat-label" style={{marginBottom:14}}>By Day of Week</div>
                      {/* Bar chart row */}
                      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:12}}>
                        {["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(day=>{
                          const d = stats.byDay[day];
                          const pct = d.count ? Math.min(100,Math.abs(d.pnl)/maxAbs*100) : 0;
                          const col = d.pnl>0?"#00e5a0":d.pnl<0?"#ff4d6d":"var(--border3)";
                          const wr = d.count?Math.round(d.wins/d.count*100):0;
                          return(
                            <div key={day} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                              {/* Bar */}
                              <div style={{height:60,display:"flex",alignItems:"flex-end",width:"100%"}}>
                                <div style={{width:"100%",height:(Math.max(pct,d.count?4:0))+"%",background:col,borderRadius:"3px 3px 0 0",opacity:d.count?1:0.2,minHeight:d.count?4:0}}/>

                            </div>
                          );

                      {/* Best/worst day */}
                      {rows.length>0&&(()=>{
                        const sorted = [...rows].sort((a,b)=>b[1].pnl-a[1].pnl);
